#textdomain wesnoth-After_the_Storm

[scenario]
    {NAIA_SCENARIO 12_Destiny_part_3 E3S12 ( _ "Destiny — Part 3")}

    {SEGMENTED_SCENARIO}
    turns=-1
    next_scenario=null
    victory_when_enemies_defeated=no
    disallow_recall=yes
    {NO_ECONOMY_UI}
    # We do not need this because the player 'Anya' is never used again after
    # this point.
    #{DO_NOT_REMOVE_FROM_CARRYOVER_ON_DEFEAT}

    {FULLSCREEN_CUTSCENE_UI}

    {FINALE_AMLA_EVENTS}

    {ADD_SEGMENT "{LE /maps/12_Destiny_part_3.map}"
    ({INDOORS_HIVE}) ()}

    {ADD_SEGMENT "{LE /maps/08A_Interim_02.map}"
    ({INDOORS_HIVE} {SCHEDULE_LIGHTING -60 -80 0}) ()}

    {SCENARIO_MUSIC "silence.ogg"} {CONTINUE_PLAYING_STORY_MUSIC_FIRST}

    {STORYTXT_DESTINY_PART_3}

    {INDOORS_HIVE}

    # wmllint: validate-off
    [side]
        side=1
        controller=human
        save_id=Anya
        team_name=good
        user_team_name= _ "team_name^Anya"

        shroud=yes

        {NO_ECONOMY}

        # wmllint: recognize Anya
        {CHARACTER_STATS_ANYA}
        canrecruit=yes
        type=Guardian of Darkness Anya
    [/side]
    # wmllint: validate-on

    [side]
        # Cutscene enemy units
        side=2
        team_name=evil
        user_team_name= _ "team_name^Shaxthals"
        {CHAOS_FLAG}
        color=black

        shroud=yes
        hidden=yes
        no_leader=yes

        {NO_ECONOMY}

        {ai/aliases/stable_singleplayer.cfg}
        [ai]
            {AI_SIMPLE_ALWAYS_ASPECT aggression        9.00}
            {AI_SIMPLE_ALWAYS_ASPECT leader_aggression 9.00}
            {AI_SIMPLE_ALWAYS_ASPECT caution           0.00}
            {AI_SIMPLE_ALWAYS_ASPECT grouping            no}
        [/ai]
    [/side]

    [side]
        side=3
        team_name=good,evil
        user_team_name= _ "team_name^?"
        {RAGGED_FLAG}
        color=lightblue
        share_vision=none
        scroll_to_leader=no

        no_leader=yes
        hidden=yes
        controller=null
        {NO_ECONOMY}

        {ai/aliases/stable_singleplayer.cfg}
        [ai]
            ai_algorithm=idle_ai
        [/ai]
    [/side]

    {FORCE_CHANCE_TO_HIT (id=Anya) (
        [not]
            type=Shaxthal Deathbringer
        [/not]
    ) 100 ()}

#define FINALE_C_HAS_GLYPH _NUM
    [+unit]
        [variables]
            has_glyph=yes
            glyph={_NUM}
        [/variables]
    [/unit]
#enddef

    [event]
        name=prestart

        {@ <<
            local _ = wesnoth.textdomain "wesnoth-After_the_Storm"
            local lore_entries = {
                { "e3s12_argan_1",  _ "On Creation"       },
                { "e3s12_argan_2",  _ "On the Seer"       },
                { "e3s12_argan_3",  _ "On a Distant Past" },
                { "e3s12_elyssa_1", _ "Untitled #43"      },
            }

            for i = 0, 3 do
                wml.variables[("e3s12_glyphs[%d]"):format(i)] = {
                    acquired   = false,
                    id         = lore_entries[i + 1][1],
                    title      = lore_entries[i + 1][2],
                }
            end
        >>}

        [modify_side]
            side=1
            gold=0
        [/modify_side]

        {REMOVE_RECRUIT_LIST 1}

        #
        # Enter first floor.
        #

        {SWITCH_FLOOR 1}

        {RESET_UNIT_STATUSES id=Anya}

        [teleport]
            [filter]
                id=Anya
            [/filter]
            x,y=58,11
        [/teleport]

        {FACE_DIRECTION id=Anya nw}

        [place_shroud]
            side=1
        [/place_shroud]

        {BLACK_SCREEN}
    [/event]

#define FINALE_C_GUARDIAN _SIDE _TYPE _X _Y
    {GENERIC_UNIT ({_SIDE}) ({_TYPE}) ({_X}) ({_Y})} {GUARDIAN} {NO_UPKEEP_NO_OVERLAY}
#enddef

    [event]
        name=setup floor 1
        first_time_only=yes

        {ITEM_CRYSTAL_GLYPH_MESSAGE 57 11}

        {ITEM_CRYSTAL_GLYPH_MESSAGE 34 39}
        {OBJ_HEALING_GLYPH          27 41}
        {OBJ_HEALING_GLYPH          36 40}

        {ITEM_TOUCHPLATE 39 44}

        {ITEM_CRYSTAL_GLYPH_POWERUP 48 33}
        {ITEM_CRYSTAL_GLYPH_POWERUP 16 41}
        {ITEM_CRYSTAL_GLYPH_POWERUP 61 49}

        {OBJ_HEALING_GLYPH 34  8}

        {OBJ_HEALING_GLYPH 28 11}

        {OBJ_HEALING_GLYPH 13 18}

        {FINALE_C_GUARDIAN 2 (Abomination) 40 49} {FACING ne}
        {FINALE_C_GUARDIAN 2 (Abomination) 43 53} {FACING nw}

        {FINALE_C_GUARDIAN 2 (Shaxthal Sentry Drone) 24 44} {FINALE_C_HAS_GLYPH 1} {FACING ne} {PALETTE shaxthal_drone_v2_base shaxthal_drone_v2_purple}
        {FINALE_C_GUARDIAN 2 (Shaxthal Sentry Drone) 36 44} {FINALE_C_HAS_GLYPH 2} {FACING nw} {PALETTE shaxthal_drone_v2_base shaxthal_drone_v2_purple}
        {FINALE_C_GUARDIAN 2 (Shaxthal Sentry Drone) 39 37} {FINALE_C_HAS_GLYPH 3} {FACING nw} {PALETTE shaxthal_drone_v2_base shaxthal_drone_v2_purple}
        {FINALE_C_GUARDIAN 2 (Shaxthal Sentry Drone) 38 43} {FACING nw} {PALETTE shaxthal_drone_v2_base shaxthal_drone_v2_purple}

        {FINALE_C_GUARDIAN 2 (Shaxthal Sentry Drone) 18 38} {FACING ne} {PALETTE shaxthal_drone_v2_base shaxthal_drone_v2_purple}
        {FINALE_C_GUARDIAN 2 (Shaxthal Sentry Drone) 14 34} {FACING sw} {PALETTE shaxthal_drone_v2_base shaxthal_drone_v2_purple}
        {FINALE_C_GUARDIAN 2 (Shaxthal Sentry Drone) 24 30} {FACING sw} {PALETTE shaxthal_drone_v2_base shaxthal_drone_v2_purple}
        {FINALE_C_GUARDIAN 2 (Shaxthal Sentry Drone) 19 22} {FACING sw} {PALETTE shaxthal_drone_v2_base shaxthal_drone_v2_purple}

        {FINALE_C_GUARDIAN 2 (Shaxthal Drone) 21 16} {FACING nw}
        {FINALE_C_GUARDIAN 2 (Shaxthal Drone) 20 11} {FACING ne}
        {FINALE_C_GUARDIAN 2 (Shaxthal Drone) 17 15} {FACING ne}

        {FINALE_C_GUARDIAN 2 (Shaxthal War Drone) 18  4} {FACING sw} {PALETTE shaxthal_drone_surface shaxthal_drone_base}

        {FINALE_C_GUARDIAN 2 (Shaxthal Drone) 29  9} {FACING se}
        {FINALE_C_GUARDIAN 2 (Shaxthal Drone) 39 14} {FACING sw}
        {FINALE_C_GUARDIAN 2 (Shaxthal Drone) 43 13} {FACING nw}
        {FINALE_C_GUARDIAN 2 (Shaxthal Drone) 35 16} {FACING ne}
        {FINALE_C_GUARDIAN 2 (Shaxthal Drone) 43 11} {FACING nw}
        {FINALE_C_GUARDIAN 2 (Shaxthal Drone) 38  7} {FACING nw}

        {FINALE_C_GUARDIAN 2 (Shaxthal Drone) 42 25} {FACING ne}
        {FINALE_C_GUARDIAN 2 (Shaxthal Drone) 44 26} {FACING nw}
        {FINALE_C_GUARDIAN 2 (Shaxthal Drone) 42 28} {FACING nw}
    [/event]

    [event]
        name=main music playlist
        first_time_only=no

        {REPLACE_SCENARIO_MUSIC "everlasting_night.ogg"}
        {APPEND_MUSIC           "heroes_rite.ogg"}
        {APPEND_MUSIC           "nunc_dimittis.ogg"}
    [/event]

#define FINALE_C_RESET_MUSIC
    [fire_event]
        name=main music playlist
    [/fire_event]
#enddef

    [event]
        name=start

        {LOCK_VIEW}

        [place_shroud]
            side=1
        [/place_shroud]

        [mute_sound_effects][/mute_sound_effects]

        [scroll_to]
            x,y=58,11
            {WARP}
        [/scroll_to]

        {CAVE_NOISE_SOUND_SOURCE}
        [+sound_source]
            id=cave_noise # wmllint: ignore
        [/sound_source]

        [fade_in_sound_effects]
            duration=2000
        [/fade_in_sound_effects]

        {CLEAR_CAVE_SHROUD (
            x,y=58,11
            radius=6
        )}

        [redraw]
            side=1
        [/redraw]

        {PUT_TO_RECALL_LIST id=Anya}

        {FADE_IN}

        [delay]
            time=750
        [/delay]

        [recall]
            id=Anya
            show=yes
            x,y=58,11
        [/recall]

        [redraw][/redraw]

        {FINALE_C_RESET_MUSIC}

        [delay]
            time=2750
        [/delay]

        [message]
            speaker=narrator
            image=wesnoth-icon.png
            # po: The narrator refers to Anya in second person throughout
            # po: this scenario, and interacts directly with her at the end.
            message= _ "You are now the Guardian of Darkness.

On Irdya."
        [/message]

        [delay]
            time=750
        [/delay]

        [message]
            speaker=narrator
            image=wesnoth-icon.png
            message= _ "No...

Actually, you do not consider the title befitting of your actual role. Ever since you recovered from the gruesome attack of Zhangor’s beasts, Ergea has used you as an instrument to liberate both her people and Irdya from Uria’s influence. They call you the “Dark Lady”, “Yechnagoth revived”, the “Goddess of Darkness”, and a myriad other titles you do not actually deserve or care for.

You feel like a pawn in someone’s game. But you are not quite sure anymore for which side you play.

Things were far easier when Elynia was around. You admired her stalwart sense of righteousness. You admired her courage in confronting the most fearsome enemies faced by Irdya in this era; enemies once thought invincible, now fallen and destroyed forever."
        [/message]

        [message]
            speaker=narrator
            image=wesnoth-icon.png
            message= _ "However, after reading the journals of Galas, Elynia, and Argan, you cannot help but feel profoundly disheartened.

You grew up hearing of Elynia’s feats from Elorran and Tara. Now that you know more about her and are nearly her equal in power, it all suddenly feels vain and pointless. So many things could have been avoided if Uria and her people did not monopolize access to knowledge about your destiny...

A sentiment of uselessness suddenly overwhelms you. You are a fraud. You have not even been able to control the darkness that keeps Naia and Sela’s light from reaching Irdya’s surface. For how long does Ergea intend you to play your act for the Chaos rebels?"
        [/message]

        [message]
            speaker=narrator
            image=wesnoth-icon.png
            message= _ "If only you could consult with Elynia about the matter. If only the other Guardian of Darkness, Elyssa, had stayed on Irdya instead of taking your friend to that alien world.

“If only”...

Elynia told you to trust your heart, but you are not quite sure you can do that anymore. After all, it was your heart that deceived you in the first place; it blinded you to Elynia’s actual plan, and it fooled you into thinking that perhaps she would ever consider you as anything more than a ‘friend’."
        [/message]

        [message]
            speaker=narrator
            image=wesnoth-icon.png
            message= _ "But enough of that emotional nonsense. Your role as a Guardian of Darkness is to make decisions with your mind, not your heart. You have gathered all the knowledge you need for making a decision now.

What does your mind tell you?"
        [/message]

        [delay]
            time=2000
        [/delay]

        {OBJECTIVES (
            side=1
            victory_string= _ "Current Objective:"
            {OBJECTIVE_VICTORY ( _ "Find the teleport glyph leading to the breach site")}

            {OBJECTIVE_NO_CARRYOVER}
        )}

        {UNLOCK_VIEW}

        {RESET_THEME}
    [/event]

    {REGISTER_DEBUG_TRIGGERS (
        {DEBUG_TRIGGER DEBUG1 "Skip to tp glyph 1"}
        {DEBUG_TRIGGER DEBUG3 "Skip to tp glyph 2"}
        {DEBUG_TRIGGER DEBUG3 "Skip to lore chamber"}
    )}

    [event]
        name=DEBUG1

        [teleport]
            [filter]
                id=Anya
            [/filter]
            x,y=45,32
        [/teleport]
    [/event]

    [event]
        name=DEBUG2

        [teleport]
            [filter]
                id=Anya
            [/filter]
            x,y=14,40
        [/teleport]
    [/event]

    [event]
        name=DEBUG3

        [teleport]
            [filter]
                id=Anya
            [/filter]
            x,y=29,40
        [/teleport]
    [/event]

    [event]
        name=moveto
        first_time_only=no
        [filter]
            side=1
            x,y=57,11
        [/filter]

        [allow_undo][/allow_undo]

        [message]
            speaker=narrator
            image=wesnoth-icon.png
            message= _ "There is absolutely nothing else of value encoded into this crystal glyph. Time to move on."
        [/message]
    [/event]

    [event]
        name=moveto
        [filter]
            id=Anya
            x,y=48,33
        [/filter]

        {LOCK_VIEW}

        [remove_item]
            x,y=$x1,$y1
        [/remove_item]

        [store_unit]
            [filter]
                id=Anya
            [/filter]
            kill=yes
            variable=anya_store
        [/store_unit]

        [hide_unit][/hide_unit]

        {FADE_TO_BLACK}

        # wmllint: recognize Daeira

        # Set up Daeira if the player kept her around
        [if]
            [have_unit]
                side=1
                id=Daeira
                search_recall_list=yes
            [/have_unit]

            # These two shouldn't ever hold false with an extant Daeira, but
            # just in case...
            {VARIABLE_BOOLEAN_EQUALS swam_in_fountain_of_courage   yes}
            {VARIABLE_BOOLEAN_EQUALS anya_has_mermaid_pendant      yes}

            [then]
                [modify_side]
                    side=3
                    controller=ai
                    hidden=no
                [/modify_side]

                [store_starting_location]
                    side=3
                [/store_starting_location]

                {RECALL_DAEIRA_AT_LOCATION $location.x $location.y}

                [modify_unit]
                    [filter]
                        id=Daeira
                    [/filter]
                    side=3
                [/modify_unit]

                {FACE_DIRECTION id=Daeira se}

                {CLEAR_VARIABLE location}
            [/then]
        [/if]

        [place_shroud]
            side=1
        [/place_shroud]

        [scroll_to]
            x,y=35,1
            {WARP}
        [/scroll_to]

        {REMOVE_SOUND_SOURCE cave_noise}

        {HIVE_NOISE_2_SOUND_SOURCE}
        [+sound_source]
            id=hive_noise # wmllint: ignore
        [/sound_source]

        [delay]
            time=750
        [/delay]

        [set_variables]
            name=anya_store
            mode=merge
            [value]
                x,y=35,1
                facing=s
                moves=$anya_store.max_moves
                attacks_left=$anya_store.max_attacks
            [/value]
        [/set_variables]

        {CLEAR_CAVE_SHROUD (
            x,y=35,4
            radius=6
        )}

        {FADE_IN}

        [unhide_unit][/unhide_unit]

        [unstore_unit]
            variable=anya_store
        [/unstore_unit]

        [modify_side]
            side=1
            fog=yes
        [/modify_side]

        [redraw]
            side=1
        [/redraw]

        {CLEAR_VARIABLE anya_store}

        {MOVE_UNIT id=Anya 35 4}

        [redraw]
            side=1
        [/redraw]

        [delay]
            time=1000
        [/delay]

        [message]
            speaker=narrator
            image=wesnoth-icon.png
            message= _ "That was not the right glyph.

The crude maps you found of these underground levels show a plethora of teleport glyphs without any indication as to their respective destinations. It is ridiculous. Whoever built this stronghold did not know the first thing about proper organization!

Well, there is no going back now."
        [/message]

        {UNLOCK_VIEW}
    [/event]

    [event]
        name=moveto
        [filter]
            side=1
            id=Anya
            [filter_adjacent]
                id=Daeira
            [/filter_adjacent]
        [/filter]

        {LOCK_VIEW}

        # For debug purposes
        {VARIABLE_DEFAULT anya_wants_cake               no}
        {VARIABLE_DEFAULT anya_gets_meta                no}
        {VARIABLE_DEFAULT anya_wants_love               no}
        {VARIABLE_DEFAULT anya_wants_to_see_the_manager no}

        [scroll_to_unit]
            id=Daeira
        [/scroll_to_unit]

        {FACE_UNIT id=Anya id=Daeira}

        [fade_out_music]
            duration=500
        [/fade_out_music]

        [message]
            speaker=Anya
            message= _ "Oh. It is you again. I thought you disappeared for good this time."
        [/message]

        [delay]
            time=250
        [/delay]

        {FACE_UNIT id=Daeira id=Anya}

        {REPLACE_SCENARIO_MUSIC nunc_dimittis.ogg}

        [delay]
            time=250
        [/delay]

        [message]
            speaker=Daeira
            message= _ "It has been a while."
        [/message]

        # Only one of these [if] blocks actually results in dialogue for a
        # single playthrough, with the exception of anya_gets_meta, which has
        # an alternative that other dialogues may segue into, while itself
        # segues into the final part of the story of Anya's parents if that was
        # her choice.

        [if]
            {VARIABLE_BOOLEAN_EQUALS anya_wants_cake yes}
            [then]
                [message]
                    speaker=Daeira
                    message= _ "Did you find the cake you wanted?"
                [/message]

                [message]
                    speaker=Anya
                    message= _ "No... I did not. I have hardly eaten anything in weeks. My mind has just been... sort of wandering off constantly. I feel like I shouldn’t be here."
                [/message]
            [/then]
        [/if]

        [if]
            {VARIABLE_BOOLEAN_EQUALS anya_wants_love yes}
            [then]
                [message]
                    speaker=Daeira
                    message= _ "You seem even more despondent than before."
                [/message]

                [message]
                    speaker=Anya
                    message= _ "... This whole situation is just too overwhelming. I feel lost. Ergea is not helpful — she wants me to play a role that wasn’t meant for me."
                [/message]

                [message]
                    speaker=Daeira
                    message= _ "This is about Elynia, am I correct?"
                [/message]

                [message]
                    speaker=Anya
                    message= _ "What do you mean?"
                [/message]

                [message]
                    speaker=Daeira
                    message= _ "You feel lost without her."
                [/message]

                [message]
                    speaker=Anya
                    # po: This line is repeated later in the scenario.
                    message= _ "... I do. I really do."
                [/message]
            [/then]
        [/if]

        [if]
            {VARIABLE_BOOLEAN_EQUALS anya_gets_meta yes}
            [then]
                [message]
                    speaker=Anya
                    message= _ "I have been thinking about what you said about destiny... You know, after becoming this... thing... I became, I somehow feel even less in control of my life than I was before."
                [/message]

                [message]
                    speaker=Daeira
                    message= _ "How so, exactly?"
                [/message]

                [message]
                    speaker=Anya
                    #po: This is indeed meant to be reminiscent of Elyssa's thoughts in E3S8A.
                    message= _ "My actions have constantly been dictated by someone else. Elorran, Elynia, Ergea... I have never truly been free, have I? Just constantly following orders like a machine, unquestioning. But all of a sudden I feel compelled to question everything, if that makes sense? And the worst part is that I can’t tell if it’s because of my connection to Darkness, or because I became a Guardian and now I feel this constant pain within my heart..."
                [/message]

                [message]
                    speaker=Daeira
                    message= _ "Would that be your actual heart, or the divine instrument demonkind calls the Energy Heart?"
                [/message]

                [message]
                    speaker=Anya
                    message= _ "I can’t even tell the difference anymore."
                [/message]

                [message]
                    speaker=Daeira
                    message= _ "I can only speculate about the nature and extent of your powers, but I would expect Guardians of Darkness to be better in touch with the notion of agency seeing as how their domain revolves around the matters of mind. If the gift you now possess comes with greater self-awareness, then it is up to you to make use of it in a way that can advance your own existence towards a positive outcome."
                [/message]

                [message]
                    speaker=Anya
                    message= _ "But what if the only path forward I see involves leaving people behind?"
                [/message]

                [message]
                    speaker=Daeira
                    message= _ "The future is constantly clouded in darkness, but you need not be afraid of the core substance of your being, do you? We are not always given a choice, but when we are, it is up to us to make the right one — and a Guardian’s choices carry more weight upon our reality than anyone else’s."
                [/message]
            [/then]
            [else]
                [message]
                    speaker=Daeira
                    message= _ "Have you pondered the matter of destiny yet?"
                [/message]

                [message]
                    speaker=Anya
                    message= _ "I... uh... What do you mean?"
                [/message]

                [message]
                    speaker=Daeira
                    message= _ "I must not have talked to you about it. My apologies. You need not worry about it for now."
                [/message]

                [message]
                    speaker=Anya
                    message= _ "I have so many questions..."
                [/message]

                [message]
                    speaker=Daeira
                    message= _ "Xia’el does not have answers for you anymore, sadly."
                [/message]
            [/else]
        [/if]

        [if]
            {VARIABLE_BOOLEAN_EQUALS anya_wants_to_see_the_manager yes}
            [then]
                [message]
                    speaker=Anya
                    message= _ "Am I ever going to find out what happened to my parents after I was born?"
                [/message]

                [message]
                    speaker=Daeira
                    message= _ "As a matter of fact, yes. I opted not to tell you the entire story out of concern for your emotional state in battle, but I can finish it now if you would like."
                [/message]

                [message]
                    speaker=Anya
                    message= _ "What?! You knew the rest of the story but didn’t tell it to me?! I thought you said you were just a medium and you didn’t have it!"
                [/message]

                [message]
                    speaker=Daeira
                    message= _ "I said your question was already answered, and it was. I never specified whether I was able to intentionally postpone delivering a non-essential part of the answer or not. I apologize, but it had to be done."
                [/message]

                [message]
                    speaker=Anya
                    message= _ "(<i>sighs</i>) I understand. And... I’m sorry for my outburst."
                [/message]

                [message]
                    speaker=Daeira
                    message= _ "So, let us pick up from where we left last time..."
                [/message]

                [message]
                    speaker=Daeira
                    message= _ "The hearts of Mintha and the Nameless One were overflowing with newfound happiness and purpose after conceiving a child that they could call their own. The offspring would be a new free creature born of faerie and demonkind, a unique combination completely unheard of before. The future of the two lovers seemed bright for once."
                [/message]

                [message]
                    speaker=Daeira
                    message= _ "It was not rare for travelers to get lost in the forests of Glamdrol, and Mintha and the Nameless One routinely guided them out of the forest without overtly revealing themselves. However, one fateful night, a mysterious interloper found them first. The couple did not know what to make of the situation. How did he manage to enter their home entirely unnannounced?

The Wanderer came to them to impart his knowledge of events past, and events that had not yet come to pass. He told them of the looming threat of the Chaos Empire, Merthiaal’s legacy, the War Against the Unknown, and the return of the Lady of Light. And he told them of one possible fate that awaited the unborn child and its parents — for the Nameless One had not fully escaped Uria’s grasp, and the keen-nosed Demon Lord Nar-hamoth personally sought to make the shapeshifter pay a hefty price for their transgressions."
                [/message]

                [message]
                    speaker=Daeira
                    # po: Reminder that Nar-Hamoth is the Shadow of Uria.
                    message= _ "The couple were uncertain as to whether to believe the Wanderer’s words or not. How could their child just so happen to be the one destined to become the New Guardian of Darkness? If their offspring would indeed be found along with them by Uria’s forces before coming of age, then it would all have been for naught, and the world would be plunged into an eternal darkness — one much deeper and more pervasive than even that of the Endless Night, a darkness that would cause even the Seed of Earth to wither and die, and then all life would simply cease to be.

Before departing, the Wanderer offered them an alternative: Mintha could give birth and hold the child in her bosom for one month, but afterwards she would have to leave it in the care of a human family — more specifically, one already fraught with loss. Finally, if the Nameless One hoped to escape the Shadow of Uria for good, they would have to either die, or relinquish their physical form for good.

Upon saying that, the man left as silently as he came, fading into the dark of the night. They considered going after him to ask more questions, but somehow he did not even leave a trail for them to follow."
                [/message]

                [message]
                    speaker=Daeira
                    message= _ "Nine months they spent pondering the Wanderer’s words. Nine months they spent hoping that what they heard was naught but the ravings of a senile man. But rumors of Chaos Empire incursions began to spread around the marches, and the Nameless Shapeshifter caught wind of them as well. Their rendezvous with the vengeful Demon Lord was imminent.

Neither of them ever imagined they would be faced with a decision that would concern not only the fruit of their love, but also the fate of an entire world. Could they really risk dooming their child to certain death when they had the option to give it some semblance of a proper life with humans until the day of its awakening?"
                [/message]

                [message]
                    speaker=Daeira
                    message= _ "And so it came to pass that the child was born. Their offspring subconsciously took on some of Mintha’s features due to her being the very first thing it saw in the world. The Nameless One and Mintha cared for it for a month, regarding it as the most precious thing in their lives.

Stricken with grief, Mintha traveled into the northern country and left the creature in the care of a farmer couple. She thought the exchange would be fair for them, as they had just lost their own newborn to a deadly plague. The humans never thought to question the nature of the unfamiliar child left by their front door in the night. They decided to give her the name of their late daughter and raise her as their own."
                [/message]

                [message]
                    speaker=Daeira
                    message= _ "The Faerie of Resurrection finally returned to Glamdrol, and shared a last passionate kiss with the Nameless Shapeshifter. Together they cast a spell that unbound the soul of the demon from their mortal body. The lovers had agreed to spend the rest of eternity together no matter if they were unable to embrace one another again.

And it was so that the soul of the Nameless One went to an eucalyptus tree, and Mintha went back to her original form to keep them company, right where she first found them."
                [/message]

                {FACE_UNIT id=Anya id=Daeira} {OPPOSITE_FACING}

                [message]
                    speaker=Daeira
                    message= _ "When the Demon Lord Nar-hamoth found the corpse of his former slave he could only growl and trample the forest in frustration for being denied his revenge."
                [/message]

                [delay]
                    time=1000
                [/delay]

                [message]
                    speaker=Anya
                    message= _ "I don’t know what I was expecting... I— I think I know exactly which forest that was. I had been there before... I... I..."
                [/message]

                [message]
                    speaker=Daeira
                    message= _ "They would not have been able to tell you."
                [/message]

                [message]
                    speaker=Anya
                    message= _ "That entire forest... it doesn’t exist anymore... the entire place... Oh gods..."
                [/message]

                [delay]
                    time=500
                [/delay]

                {FACE_UNIT id=Anya id=Daeira}

                [delay]
                    time=500
                [/delay]

                [message]
                    speaker=Anya
                    message= _ "I could’ve killed him. I could’ve killed Nar-hamoth..."
                [/message]

                [message]
                    speaker=Daeira
                    message= _ "You did not know."
                [/message]

                {FACE_UNIT id=Anya id=Daeira} {OPPOSITE_FACING}

                [message]
                    speaker=Anya
                    message= _ "Heh, but it wouldn’t have changed anything, would it..."
                [/message]

                [delay]
                    time=750
                [/delay]

                {FACE_UNIT id=Anya id=Daeira}

                [message]
                    speaker=Anya
                    message= _ "They could have both taken me with them deep into the country and we would have all survived together..."
                [/message]

                [message]
                    speaker=Daeira
                    message= _ "It was a risk they chose not to take."
                [/message]

                [message]
                    speaker=Anya
                    message= _ "Choices, huh... it’s all down to choices... Do they even matter in the end?"
                [/message]

                [delay]
                    time=500
                [/delay]

                {FACE_UNIT id=Anya id=Daeira} {OPPOSITE_FACING}

                [delay]
                    time=500
                [/delay]
            [/then]
        [/if]

        [message]
            speaker=Anya
            message= _ "What am I supposed to do now?"
        [/message]

        [message]
            speaker=Daeira
            message= _ "I think you already know what you are going to do. It is not even going to be a choice, is it?"
        [/message]

        {FACE_UNIT id=Anya id=Daeira}

        [message]
            speaker=Anya
            message= _ "What do you mean?"
        [/message]

        [message]
            speaker=Daeira
            message= _ "What you do next is a constant. No matter how you get here, you always do what you want to do, as well as what is expected of you. They do not <i>have</i> to be mutually exclusive concepts, after all."
        [/message]

        {FACE_UNIT id=Anya id=Daeira} {OPPOSITE_FACING}

        [message]
            speaker=Anya
            message= _ "I suppose so..."
        [/message]

