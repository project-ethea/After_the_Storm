#textdomain wesnoth-After_the_Storm

[scenario]
    {NAIA_SCENARIO 12_Return_to_Wesmere E1S12 ( _ "Return to Wesmere")}
    #
    # Event flags are used here and in Terminus a lot:
    #
    #  A: Gates for path A
    #  B: Gates for path B
    #  C: Marker for blocking the surface exit once all player units are
    #     undeerground
    #  D: Flip marker, turns adjacent A/B gates from SE to SW
    #  E: Time area boundary marker
    #  F: (E1S12.1) Abaddon warden trigger when crossed
    #     (E1S12.2) Boss shield generator location marker
    #  G: Blocks boss chamber when crossed
    #
    {MAP 12_Return_to_Wesmere.map}
    turns=-1
    next_scenario="12_Wesmere_Terminus"
    victory_when_enemies_defeated=no
    {DO_NOT_REMOVE_FROM_CARRYOVER_ON_DEFEAT}

    {B_DEATHS}

    {SCENARIO_MUSIC       "weight_of_revenge.ogg"} {CONTINUE_PLAYING_STORY_MUSIC_FIRST}
    {EXTRA_SCENARIO_MUSIC "northerners.ogg"}
    {EXTRA_SCENARIO_MUSIC "suspense.ogg"}
    {EXTRA_SCENARIO_MUSIC "heroes_rite.ogg"}

    {STORYTXT_RETURN_TO_WESMERE}

    {INDOORS_HIVE} {SCHEDULE_LIGHTING -10 -30 30}

