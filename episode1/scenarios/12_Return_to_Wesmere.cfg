    [event]
        name=prestart

        [item]
            [not]
                [filter][/filter]
            [/not]
            [and]
                [filter]
                    id=Elynia
                [/filter]
                radius=1
            [/and]
            image="items/gohere.png"
        [/item]

        #
        # Remove Kyara and Horo from the recall list
        #

        # wmllint: recognize Kyara
        # wmllint: recognize Horo

        [kill]
            id=Kyara
            [or]
                id=Horo
            [/or]
        [/kill]

        {DISALLOW_END_TURN}

        {FACE_DIRECTION (id=Elynia) se}

        # wmllint: recognize Mal Keshar
        {RECALL_MAL_KESHAR_AT_LOCATION 10 34}
        {FACE_DIRECTION (id=Mal Keshar) se}

        [store_side]
            side=1
            variable=side1_info
        [/store_side]

        [if]
            {VARIABLE_NUMERICAL_LESS_THAN side1_info.gold 200}
            [then]
                [modify_side]
                    side=1
                    gold=200
                [/modify_side]
            [/then]
        [/if]

        [store_unit]
            [filter]
                id=Elynia
            [/filter]
            variable=elynia_store
        [/store_unit]

        [store_unit]
            [filter]
                id=Mal Keshar
            [/filter]
            variable=malin_store
        [/store_unit]

        {VARIABLE elynia_store.moves        0 }
        {VARIABLE elynia_store.attacks_left 0 }

        {VARIABLE malin_store.moves         0 }
        {VARIABLE malin_store.attacks_left  0 }

        [unstore_unit]
            variable=elynia_store
            find_vacant=no
        [/unstore_unit]

        [unstore_unit]
            variable=malin_store
            find_vacant=no
        [/unstore_unit]

        {CLEAR_VARIABLE side1_info}

        {OBJECTIVES (
            victory_string= _ "Current Objectives:"
            {OBJECTIVE_VICTORY ( _ "Recruit and/or recall six units")}

            {OBJECTIVE_DEFEAT  ( _ "Death of Elynia")}
            {OBJECTIVE_DEFEAT  ( _ "Death of Mal Keshar")}

            {OBJECTIVE_NOTE ( _ "You cannot end your first turn until you have recruited or recalled six units")}
            {OBJECTIVE_NOTE ( _ "You can recruit or recall from your starting location (you do <b>not</b> need a castle or a keep)")}
            {OBJECTIVE_NOTE ( _ "You will not be able to recall or recruit any units later until the end of the mission")}
        )}

        #
        # Setup time areas
        #

        [time_area]
            id=surface
            {SHORTDARK} {SCHEDULE_LIGHTING -10 -40 20}
            # All tiles south of the fake map order up to the flag E markers
            terrain=*^_fme
            radius=1000
            [filter_radius]
                terrain=!,*^&E
            [/filter_radius]
        [/time_area]

        [time_area]
            id=deeper_underground
            {INDOORS_HIVE} {SCHEDULE_LIGHTING -10 -50 10}
            [+time]
                lawful_bonus=-30
            [/time]
            # All tiles north of the flag E border
            x,y=1,1
            radius=1000
            [filter_radius]
                terrain=!,*^&E
            [/filter_radius]
        [/time_area]

        #
        # Configure an initial faded hive ambience sound source.
        #

        {@ <<
            local entrance = wesnoth.current.map.find({ location_id = "hive_entrance"})[1]
            wml.variables.w = wesnoth.current.map.playable_width
            wml.variables.h = wesnoth.current.map.playable_height
            -- The map diagonal used to calculate the sound source fade radius.
            -- We don't need an accurate value, so it's not a problem that we are
            -- ignoring hex ordinate shift.
            wml.variables.r = 0.5 * ((wml.variables.w - entrance.x)^2 + (wml.variables.h - entrance.y)^2)^0.5
        >>}

        {HIVE_NOISE_2_SOUND_SOURCE ID=hive_sound_source}
        [+sound_source]
            x,y=$w,$h
            fade_range,full_range=$r,$r
        [/sound_source]

        {CLEAR_VARIABLE w,h,r}

        #
        # Select player path
        #

        {RANDOM a,b}

        [_e1s12_select_path]
            path=$random
        [/_e1s12_select_path]

        {CLEAR_VARIABLE random}

        #
        # Setup gate glyph puzzle
        #
        # NOTE: expected values must match the values included in the
        # abaddon_puzzle_gate_key world lore entry
        #

        {@ << wml.array_access.set("puzzle_gate_state", {
            {
                -- Power Substation West Delta
                loc = "gate_glyph1", value = 0x74, expected = 0x2F,
            },
            {
                -- Detritus Processing Facility A7
                loc = "gate_glyph2", value = 0x21, expected = 0x97,
            },
            {
                -- Power Plant West Beta
                loc = "gate_glyph3", value = 0x06, expected = 0xE4,
            }})
        >>}

        [for]
            array=puzzle_gate_state
            [do]
                # FIXME don't hardcode the image path
                [item]
                    image=items/crystal-glyph-gate.png
                    halo={_NAIA_CRYSTAL_GLYPH_HALO}
                    location_id=$puzzle_gate_state[$i].loc
                [/item]

                [event]
                    delayed_variable_substitution=no
                    name=moveto
                    first_time_only=no
                    [filter]
                        side=1
                        [filter_location]
                            location_id=$puzzle_gate_state[$i].loc
                        [/filter_location]
                    [/filter]
                    [filter_condition]
                        {VARIABLE_NUMERICAL_NOT_EQUALS puzzle_gate_state[$i].value $|puzzle_gate_state[$i].expected}
                    [/filter_condition]

                    [gate_glyph_input]
                        variable=puzzle_gate_state[$i].value
                        min,max=0,255
                        hex=yes
                    [/gate_glyph_input]

                    # Defined much later
                    [fire_event]
                        id=puzzle_gate_check
                    [/fire_event]
                [/event]
            [/do]
        [/for]

        #
        # Deploy Shaxthal worms
        #

        [foreach]
            array=hive_worms
            [do]
                {VARIABLE_RANDOM palette    base,base,base,purple}
                {VARIABLE_RANDOM variation  a,b,c}

                [unit]
                    side=3
                    type=Shaxthal Worm
                    upkeep=loyal
                    x,y=$this_item.x,$this_item.y
                    variation=$variation
                    random_traits=yes
                    generate_name=yes
                    random_gender=yes
                    [modifications]
                        {UNIT_PALETTE_SWITCH () ("shaxthal_drone_base") ("shaxthal_drone_$palette")}
                    [/modifications]
                [/unit]
            [/do]
        [/foreach]

        {CLEAR_VARIABLE palette,variation,hive_worms}
    [/event]

    # Replace faded sound source with full-map sound source and bar the
    # surface exit (yeah this will never run if the player decides to be funny
    # and leaves a unit standing outside forever, whatever)
    [event]
        name=new turn
        [filter_condition]
            {VARIABLE_NUMERICAL_GREATER_THAN_OR_EQUAL turn_number 8}
            [not]
                [have_unit]
                    side=1
                    [filter_location]
                        area=surface
                    [/filter_location]
                [/have_unit]
            [/not]
        [/filter_condition]

        [terrain]
            [and]
                terrain=*^&C
            [/and]
            terrain=^Xo
            layer=overlay
        [/terrain]

        {REMOVE_SOUND_SOURCE hive_sound_source}

        {HIVE_NOISE_2_SOUND_SOURCE ID=hive_sound_source}
    [/event]

    [event]
        name=prerecruit
        first_time_only=no
        [filter]
            side=1
        [/filter]

        [gold]
            side=1
            amount=$unit.cost
        [/gold]
    [/event]

    [event]
        name=prerecruit,prerecall
        first_time_only=no
        [filter]
            side=1
        [/filter]

        [object]
            silent=yes
            # Necessary due to the transition to scenario 12. These units are
            # disposable anyway and are never coming back.
            duration=forever
            [filter]
                x,y=$x1,$y1
            [/filter]
            [effect]
                apply_to=loyal
            [/effect]
        [/object]
    [/event]

    [event]
        name=prerecruit,prerecall
        first_time_only=no
        [filter]
            side=1
        [/filter]
        [filter_condition]
            {VARIABLE_NUMERICAL_EQUALS turn_number 1}
        [/filter_condition]

        [remove_item]
            x,y=$x1,$y1
        [/remove_item]
    [/event]

    [event]
        name=recruit,recall
        first_time_only=no
        [filter]
            side=1
        [/filter]
        [filter_condition]
            {VARIABLE_NUMERICAL_EQUALS turn_number 1}
            [and]
                [have_unit]
                    side=1
                    [not]
                        id=Elynia
                    [/not]
                    [not]
                        id=Mal Keshar
                    [/not]
                    count=6
                [/have_unit]
            [/and]
        [/filter_condition]

        [fire_event]
            name=begin mission
        [/fire_event]
    [/event]

    [event]
        name=begin mission

        {OBJECTIVES (
            victory_string= _ "Current Objectives:"
            {OBJECTIVE_VICTORY ( _ "Find the Shaxthal hive entrance and proceed underground")}

            {OBJECTIVE_DEFEAT  ( _ "Death of Elynia")}
            {OBJECTIVE_DEFEAT  ( _ "Death of Mal Keshar")}

            {OBJECTIVE_NOTE ( _ "You will not be able to recall or recruit any units until the end of the mission")}
        )}

        {ALLOW_END_TURN}

        {VARIABLE elynia_store.moves        $elynia_store.max_moves   }
        {VARIABLE elynia_store.attacks_left $elynia_store.max_attacks }

        {VARIABLE malin_store.moves         $malin_store.max_moves    }
        {VARIABLE malin_store.attacks_left  $malin_store.max_attacks  }

        [unstore_unit]
            variable=elynia_store
            find_vacant=no
        [/unstore_unit]

        [unstore_unit]
            variable=malin_store
            find_vacant=no
        [/unstore_unit]

        {CLEAR_VARIABLE elynia_store,malin_store}

        [store_unit]
            [filter]
                side=1
                race=faerie
                # If the unit is recalled it doesn't count, it just dies
                # underground instead.
                x,y=recall,recall
                [not]
                    id=Elynia
                [/not]
            [/filter]
            kill=no
            variable=faerie_store
        [/store_unit]

        {VARIABLE faerie_found no}

        [foreach]
            array=faerie_store
            variable=faerie
            [do]
                [foreach]
                    array=faerie.modifications.object
                    [do]
                        [if]
                            {VARIABLE_LEXICAL_EQUALS this_item.id fountain_of_courage}
                            [then]
                                {UNIT_TO_GLOBAL_STORE "$faerie.id" episode1_stats_fountain_faerie}

                                {VARIABLE faerie_found yes}

                                [break][/break]
                            [/then]
                        [/if]
                    [/do]
                [/foreach]

                [if]
                    {VARIABLE_BOOLEAN_EQUALS faerie_found yes}
                    [then]
                        [break][/break]
                    [/then]
                [/if]
            [/do]
        [/foreach]

        {CLEAR_VARIABLE faerie_found,faerie_store}

        [kill]
            side=1
            x,y=recall,recall
            animate=no
            fire_event=no
        [/kill]

        [modify_side]
            side=1
            gold=0
        [/modify_side]

        {REMOVE_RECRUIT_LIST 1}
    [/event]

    [event]
        name=moveto
        [filter]
            side=1
            [filter_location]
                time_of_day_id=indoors_hive
            [/filter_location]
        [/filter]

        {OBJECTIVES (
            victory_string= _ "Current Objectives:"
            {OBJECTIVE_VICTORY ( _ "Locate Yechnagoth’s heart")}

            {OBJECTIVE_DEFEAT  ( _ "Death of Elynia")}
            {OBJECTIVE_DEFEAT  ( _ "Death of Mal Keshar")}

            {OBJECTIVE_NOTE ( _ "You will not be able to recall or recruit any units until the end of the mission")}
        )}

        [event]
            name=new turn

            [message]
                speaker=Mal Keshar
                message= _ "Somehow, this place seems much larger than it was last time we set foot in it. Then again, we did intentionally avoid venturing deeper into the hive as we were in a rush."
            [/message]

            [message]
                speaker=Elynia
                message= _ "So, from what you said we are looking for a roughly-spherical scarlet gem-like artifact, about the size of a closed fist and which gives off a very distinctive aura, which may or may not be embedded in some sort of shell. Are we absolutely sure it’s not been relocated since Argan wrote about it? Neither last time nor now can I feel anything of importance other than Zhangor’s taint."
            [/message]

            [message]
                speaker=Mal Keshar
                message= _ "As I understand, these things are much like oil lamps and their intensity can be adjusted at will, or even turned off entirely when not in use. Argan’s lead is all we have for now, I fear."
            [/message]
        [/event]
    [/event]

    [event]
        id=crawler_spawning
        name=side 2 turn end
        first_time_only=no

        [store_unit]
            [filter]
                type=Verlissh Matrix Flow System
                [filter_vision]
                    visible=yes
                    side=1
                [/filter_vision]
                [not]
                    [filter_wml]
                        [variables]
                            has_spawned_crawlers=yes
                        [/variables]
                    [/filter_wml]
                [/not]
            [/filter]
            variable=structurals
        [/store_unit]

        # Maximum number of times to try spawning crawlers
        {VARIABLE spawn_cycles_count {DIFF 1 2 3}}

        [foreach]
            array=structurals
            [do]
                [if]
                    {VARIABLE_NUMERICAL_EQUALS spawn_cycles_count 0}
                    [then]
                        [break][/break]
                    [/then]
                [/if]

                [if]
                    [have_unit]
                        side=1
                        [filter_location]
                            x,y=$this_item.x,$this_item.y
                            radius={DIFF 6 8 10}
                        [/filter_location]
                    [/have_unit]
                    [else]
                        [continue][/continue]
                    [/else]
                [/if]

                {VARIABLE this_item.variables.has_spawned_crawlers yes}

                [unstore_unit]
                    variable=this_item
                [/unstore_unit]

                [unit]
                    side=2
                    animate=yes
                    moves,attacks_left=0,0
                    type=Psy Crawler
                    x,y=$this_item.x,$this_item.y
                    passable=yes
                    generate_name=yes
                    random_traits=yes
                [/unit]

                {VARIABLE_DEC spawn_cycles_count}
            [/do]
        [/foreach]

        {CLEAR_VARIABLE spawn_cycles_count,structurals}
    [/event]

    [event]
        id=abaddon_encounter
        name=enter hex
        [filter]
            side=1
            [filter_location]
                terrain=*^&F
            [/filter_location]
        [/filter]

        [unit]
            canrecruit=yes
            id=Mal Abaddon
            name= _ "Mal Abaddon"
            type=Chaos Lorekeeper
            side=3
            placement=leader
            [modifications]
                {TRAIT_BIOMECHANICAL}
                {TRAIT_RESILIENT}
                {BOSS_BOOST 30% 1 0 2 1}
            [/modifications]
        [/unit]

        [modify_side]
            side=3
            {GOLD 140 160 180}
            {INCOME 4 8 10}
            recruit=Psy Crawler,Shaxthal Drone,Shaxthal Rayblade
        [/modify_side]

        [message]
            speaker=Mal Abaddon
            # po: The "fated one" he refers to is Elynia. As world lore will reveal in the
            # po: next scenario, Mal Abaddon took part in a program codenamed "Thornfire".
            # po: As part of the program, both he and Mal Si'ah had access to privileged
            # po: information about Elynia's true nature, that they were under oath to not
            # po: divulge to anyone else, not even the Iron Council.
            # po: Meanwhile, neither Elynia nor Mal Keshar are heeding his words; even though
            # po: Mal Keshar knows quite a lot more than he lets on at this point, he's not
            # po: interested in listening to Chaos preachers.
            message= _ "O fated one, led astray by the non-believers! I pray that the Mistress of the Void takes pity on your soul. Come forth and hear the truth!"
        [/message]

        [message]
            speaker=Mal Keshar
            message= _ "I would roll my eyes if I had any."
        [/message]
    [/event]

    [event]
        name=attack
        [filter]
            side=1
        [/filter]
        [filter_second]
            id=Mal Abaddon
        [/filter_second]

        [fire_event]
            id=abaddon_battle
        [/fire_event]
    [/event]

    [event]
        name=attack
        [filter]
            id=Mal Abaddon
        [/filter]
        [filter_second]
            side=1
        [/filter_second]

        [fire_event]
            id=abaddon_battle
        [/fire_event]
    [/event]

    [event]
        id=abaddon_battle

        [message]
            speaker=Mal Abaddon
            message= _ "A prayer for your salvation!"
        [/message]

        [event]
            name=attack end

            [message]
                speaker=Mal Abaddon
                message= _ "Only ruination awaits those who willfully transgress into the territory of the divine."
            [/message]
        [/event]
    [/event]

    [event]
        name=last breath
        [filter]
            id=Mal Abaddon
        [/filter]

        [message]
            speaker=Mal Abaddon
            message= _ "O fated one... your pilgrimage continues. May peace... find... you..."
        [/message]
    [/event]

    [event]
        name=die
        [filter]
            id=Mal Abaddon
        [/filter]

        [message]
            speaker=Mal Keshar
            message= _ "What’s the point of turning themselves into these hideous biomechanical abominations if they are just as mortal as before? Oh hey, I seem to have found something in his robes. Let’s see..."
        [/message]

        [show_world_lore]
            entry=abaddon_puzzle_gate_key
        [/show_world_lore]

        [message]
            speaker=Mal Keshar
            message= _ "I also found what appears to be a miniature version of those crystal glyphs."
        [/message]

        [message]
            speaker=Elynia
            message= _ "These things must be very important if one of their high-ranking priests was carrying them around. I shall keep them safe."
        [/message]

        {MILESTONE abaddon_puzzle_gate_key}

        [setup_doors]
            side=5
            [filter_adjacent_location]
                location_id=guard_gate1,guard_gate2
            [/filter_adjacent_location]
        [/setup_doors]
    [/event]

    [event]
        id=puzzle_gate_check
        first_time_only=no

        {VARIABLE pass yes}

        [for]
            array=puzzle_gate_state
            [do]
                [if]
                    {VARIABLE_NUMERICAL_NOT_EQUALS puzzle_gate_state[$i].value $puzzle_gate_state[$i].expected}
                    [then]
                        {VARIABLE pass no}

                        [break][/break]
                    [/then]
                [/if]
            [/do]
        [/for]

        [if]
            {VARIABLE_BOOLEAN_EQUALS pass yes}
            [then]
                {LOCK_VIEW}

                [message]
                    speaker=narrator
                    image="items/crystal-glyph-gate.png"
                    sound="magic-3.ogg"
                    message= _ "Access granted."
                [/message]

                [store_locations]
                    location_id=puzzle_gate
                    radius=1
                    [filter_radius]
                        terrain=*^Zz*
                    [/filter_radius]
                [/store_locations]

                [remove_terrain_overlays]
                    find_in=location
                [/remove_terrain_overlays]

                {CLEAR_CAVE_SHROUD (
                    location_id=puzzle_gate
                    radius=3
                )}

                [redraw]
                    side=1
                [/redraw]

                [scroll_to]
                    location_id=puzzle_gate
                [/scroll_to]

                {HIGHLIGHT_GOAL find_in=location}

                [message]
                    speaker=Elynia
                    message= _ "We should have access to the lower levels now. Onward!"
                [/message]

                [fire_event]
                    id=activate_final_guard_post
                [/fire_event]

                {UNLOCK_VIEW}

                [remove_event]
                    id=puzzle_gate_check
                [/remove_event]
            [/then]
        [/if]

        {CLEAR_VARIABLE pass}
    [/event]

    [event]
        id=activate_final_guard_post

        [unit]
            canrecruit=yes
            id=Dante
            name= _ "Dante"
            type=Chaos Arbalestier
            side=4
            placement=leader
            [modifications]
                {TRAIT_BIOMECHANICAL}
                {TRAIT_STRONG}
                {BOSS_BOOST 20% 0 1 1 0}
            [/modifications]
        [/unit]

        [modify_side]
            side=4
            {GOLD 140 160 180}
            {INCOME 4 8 10}
            recruit=Chaos Invoker,Chaos Invader,Shaxthal Drone
        [/modify_side]
    [/event]

    {ITEM_CRYSTAL_GLYPH_GATE 50 24}

    [event]
        name=moveto
        [filter]
            side=1
            [filter_location]
                location_id=gate_glyph4
            [/filter_location]
        [/filter]

        {LOCK_VIEW}

        [redraw][/redraw]

        [message]
            speaker=narrator
            image="items/crystal-glyph-gate.png"
            sound="magic-3.ogg"
            message= _ "Access granted."
        [/message]

        [remove_item]
            x,y=$x1,$y1
        [/remove_item]

        [sound]
            name=gate-fall.ogg
        [/sound]

        [terrain]
            location_id=boss_gate1
            terrain=^Pr|o
            layer=overlay
        [/terrain]

        [terrain]
            location_id=boss_gate2,boss_gate3
            terrain=^Pr/o
            layer=overlay
        [/terrain]

        [redraw]
            side=1
        [/redraw]

        {HIGHLIGHT_GOAL location_id=boss_gate1,boss_gate2,boss_gate3}

        [message]
            speaker=Mal Keshar
            scroll=no
            message= _ "So glad we did not need to fiddle with the glyph to get this gate open."
        [/message]

        [message]
            speaker=Elynia
            scroll=no
            message= _ "The area up ahead seems very different to the rest. We must be on guard."
        [/message]

        {UNLOCK_VIEW}
    [/event]

    [event]
        name=moveto
        [filter]
            side=1
            [filter_location]
                location_id=boss_trigger
                radius=6
            [/filter_location]
        [/filter]

        {ENDLEVEL_QUIET}
    [/event]

    [event]
        name=victory

        # HACK: workaround a warning about "retrieving member of non-exist WML container"
        # caused by the next [store_side] action on 1.10.x and 1.11.x.
        {VARIABLE rtw_end_gamestate.non_existent_wml_container_warning_workaround yes}

        [store_side]
            side=1
            variable=rtw_end_gamestate.player_stats
        [/store_side]

        [store_shroud]
            side=1
            variable=rtw_end_gamestate.shroudmap
        [/store_shroud]

        [store_unit]
            [filter]
                id=Elynia
            [/filter]
            variable=rtw_end_gamestate.elynia_store
            kill=yes
        [/store_unit]

        [store_unit]
            [filter]
                id=Mal Keshar
            [/filter]
            variable=rtw_end_gamestate.malin_store
            kill=yes
        [/store_unit]

        [store_unit]
            [filter]
                side=1
                {NOT_ON_RECALL_LIST}
            [/filter]
            variable=rtw_end_gamestate.player_onmap_units
            kill=yes
        [/store_unit]

        {VARIABLE rtw_end_gamestate.turn_number $turn_number}

        {VARIABLE rtw_gameplay_path yes}

        {CLEAR_VARIABLE puzzle_gate_state}
    [/event]
[/scenario]

