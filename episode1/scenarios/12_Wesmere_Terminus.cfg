        {TQ_ELYNIA_FADE_STEP -16 0.94 -5%}

        {FADE_STEP_RGB 55 0 0 250}

        {TQ_ELYNIA_FADE_STEP -24 0.90 -10%}

        {SET_THEME {CUTSCENE_UI}}

        {QUAKE {SOUND_LIST:COLLAPSING_FACILITY} }

        [message]
            speaker=narrator
            caption= _ "Uria"
            message= _ "<i>You do not have the power of the Union to help you anymore. Your friends are gone. My power is unlimited. You cannot win.</i>"
            image=wesnoth-icon.png
        [/message]

        {TQ_ELYNIA_FADE_STEP -32 0.86 -10%}

        {FADE_STEP_RGB 60 0 0 250}

        {TQ_ELYNIA_FADE_STEP -64 0.82 -20%}

        {FADE_STEP_RGB 65 0 0 250}

        {SET_THEME {FULLSCREEN_CUTSCENE_UI}}

        [sound]
            name={SOUND_LIST:COLLAPSING_FACILITY}
        [/sound]

        {TQ_ELYNIA_FADE_STEP -96 0.76 -20%}

        {FADE_STEP_RGB 75 0 0 250}

        {TQ_ELYNIA_FADE_STEP -128 0.72 -40%}

        {FADE_STEP_RGB 90 10 10 250}

        [message]
            speaker=Elynia
            message= _ "... must..."
