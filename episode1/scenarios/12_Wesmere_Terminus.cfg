        {QUAKE {SOUND_LIST:COLLAPSING_FACILITY} }

        {QUAKE {SOUND_LIST:COLLAPSING_FACILITY} }

        [message]
            speaker=narrator
            image= # wmllint: ignore
            message= _ "<i>... We aren’t that different after all...</i>"
        [/message]

        {QUAKE {SOUND_LIST:COLLAPSING_FACILITY} }

        [delay]
            time=500
        [/delay]

        [message]
            speaker=narrator
            image= # wmllint: ignore
            message= _ "<i>... a greater cause, one that transcends the fate of Irdya...</i>"
