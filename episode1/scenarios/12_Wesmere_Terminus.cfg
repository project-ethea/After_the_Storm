            speaker=Mal Keshar
            message= _ "Surely you realize that I am well past my time to roam this earth — I am as old as a fossil, and our clashes with Elyssa and Argan have truly had a long-lasting effect on my power... The energy that’s engulfing all right now is tearing into my very soul... Heh... It has truly been an eternity since the last time I felt pain like this."
