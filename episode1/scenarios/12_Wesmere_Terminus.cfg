    #
    # Synthetize player state if we arrived here through unusual means (e.g.
    # the :cl or :n debug mode commands)
    #
    [event]
        name=prestart
        [filter_condition]
            [not]
                {VARIABLE_BOOLEAN_EQUALS rtw_gameplay_path yes}
            [/not]
        [/filter_condition]

        [teleport]
            [filter]
                id=Elynia
            [/filter]
            location_id=boss_player_start
        [/teleport]

        [store_locations]
            location_id=boss_player_start
        [/store_locations]

        {RECALL_MAL_KESHAR_AT_LOCATION $location.x $location.y} # FIXME location_id

        {CLEAR_VARIABLE location,random}
    [/event]

    [event]
        name=prestart

        # Define an area for the boss chamber to be used for reference later.
        # NOTE: We use an array because [time_area] without [time] causes a
        # crash to desktop on Wesnoth 1.18 through 1.19.20. See
        # FIXME: This crashes to desktop on Wesnoth 1.18 through 1.19.20. See
        # <https://github.com/wesnoth/wesnoth/issues/10987>. We use an array
        # for the time being.

        [store_locations]
            variable=boss_chamber
            location_id=boss_trigger
            radius=1000
            [filter_radius]
                # This intentionally includes *^X* as this (regrettably) matches
                # Shaxthal hive cells, so we explicitly blacklist impassable overlays
                # (^Xo) instead.
                terrain=!,X*,*^P*,*^Xo
                # Also include the initially-obstructed hexes for the boss platform
                # and the energy condensers, as the obstructions are cleared later
                # during the boss events.
                [or]
                    location_id=2
                    radius=1
                [/or]
                [or]
                    terrain=*^&F
                [/or]
            [/filter_radius]
        [/store_locations]

        # Define an area only covering walls and gates adjacent to hexes
        # considered part of the boss chamber proper. This is used to ensure
        # shroud does not look odd with walls and gates being covered until
        # the player moves within their range.

        [store_locations]
            variable=boss_chamber_walls
            terrain=X*,*^Xo,*^P*
            [filter_adjacent_location]
                find_in=boss_chamber
            [/filter_adjacent_location]
        [/store_locations]

        # Remove shroud within the chamber to make things easier for the player.

        [remove_shroud]
            side=1
            # FIXME: comma-separated area= is not possible in Wesnoth 1.18
            find_in=boss_chamber
            [or]
                find_in=boss_chamber_walls
            [/or]
        [/remove_shroud]

        # Needed to guarantee the viewport is initially centered on the side 1
        # leader at her new location and not at the map-defined location.

        [scroll_to_unit]
            id=Elynia
            {WARP}
        [/scroll_to_unit]

        # Remove and shroud unused portions of the map.

        [store_locations]
            terrain=*^&E
        [/store_locations]

        # NOTE: As of 1.18, [for] reevaluates the end= argument on every
        # iteration, resulting in SERIOUSLY BAD THINGS happening if the array
        # length increases in the middle of the loop; thus the need for a
        # separate variable to hold an unchanging end= value instead.
        {VARIABLE last_loc "$($location.length - 1)"}

        [for]
            start,end=0,$last_loc
            [do]
                [store_locations]
                    x,y=$location[$i].x,$location[$i].y|-1000
                    mode=append
                [/store_locations]
            [/do]
        [/for]

        [terrain]
            find_in=location
            terrain=Xos^Zok
        [/terrain]

        [place_shroud]
            side=1
            find_in=location
        [/place_shroud]

        # Spawn additional undead units on the player's side to ensure the
        # scenario doesn't become impossible if somehow all units other than
        # the heroes died last scenario (this also helps when using debug mode
        # to skip scenarios).

        [while]
            {@ <<
                return #(wesnoth.units.find_on_map { side = 1 }) < 6
            >>}
            [do]
                {RANDOM "Skeleton,Skeleton Archer,Skeleton,Revenant,Revenant,Bone Shooter,Bone Shooter,Ghost,Ghost,Wraith"}

                [unit]
                    type=$random
                    upkeep=free
                    side=1
                    generate_name=yes
                    random_traits=yes
                    random_gender=yes
                    placement=leader
                    passable=yes
                [/unit]
            [/do]
        [/while]

        {CLEAR_VARIABLE location,last_loc,rtw_gameplay_path,rtw_end_gamestate}

        [store_unit]
            [filter]
                side=3
            [/filter]
            kill=yes
            # We need these later
            variable=spawner_units
        [/store_unit]

        [store_locations]
            location_id=boss_gate1,boss_gate2,boss_gate3
            variable=boss_gate_locs
        [/store_locations]

        # Temporarily open the gates the player just entered, so we can close
        # them again later.

        [foreach]
            array=boss_gate_locs
            [do]
                [terrain]
                    terrain=$this_item.terrain|o
                    x,y=$this_item.x,$this_item.y
                [/terrain]
            [/do]
        [/foreach]

        {VARIABLE boss_stage -1}

        {OBJECTIVES (
            victory_string= _ "Current Objectives:"
            {OBJECTIVE_VICTORY ( _ "Search for clues as to the whereabouts of Yechnagoth’s heart")}

            {OBJECTIVE_DEFEAT  ( _ "Death of Elynia")}
            {OBJECTIVE_DEFEAT  ( _ "Death of Mal Keshar")}

            {OBJECTIVE_NOTE ( _ "You will not be able to recall or recruit any units until the end of the mission")}
        )}
    [/event]

