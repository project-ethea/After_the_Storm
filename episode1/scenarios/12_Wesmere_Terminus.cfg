    [event]
        id=loredump_glyph
        first_time_only=no

        # Tried to make this as easy to work with for translators as possible,
        # hence the wild Lua out of left field =^.^= <3
        {@?
        (
            standby_label=    _ "tech_label^Standby"
            standby_color=      "#cfb559"
            untracked_label=  _ "tech_label^Untracked"
            untracked_color=    "#949696"
            terminated_label= _ "tech_label^Terminated"
            terminated_color=   "#a75a5f"
        )
        <<
            -- alternative to using a `switch` statement (which Lua lacks)
            local format = {
                standby    = { (...).standby_label,    (...).standby_color    },
                untracked  = { (...).untracked_label,  (...).untracked_color  },
                terminated = { (...).terminated_label, (...).terminated_color },
            }
            -- actual items to format
            local items = {
                'untracked',
                'terminated',
                'standby',
                'untracked',
                'terminated',
                'standby',
                'standby',
                'terminated',
                'standby',
                'standby',
                'standby'
            }
            -- it may seem useful to make the format string translatable (e.g.
            -- '- %s: %s') but since this is technically computer output we're
            -- building here, I feel an awkward locale-independent list
            -- formatting is a VERY realistic approach
            for i, st in ipairs(items) do
                local label, color = format[st][1], format[st][2]
                local name = ("MTAL-%02d"):format(i - 1)
                items[i] = ("- %s: <span color='%s'>%s</span>"):format(name, color, label)
            end
            -- export to WML
            wml.variables.loredump_core_text = stringx.join(items, "\n")
        >>}

