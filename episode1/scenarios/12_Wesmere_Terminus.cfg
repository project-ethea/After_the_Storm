        [/if]

        [delay]
            time=1000
        [/delay]

        [sound]
            name={SOUND_LIST:COLLAPSING_FACILITY}
        [/sound]

        [message]
            speaker=narrator
            image= # wmllint: ignore
            message= _ "<i>... Don’t forget that you are here fighting for a greater cause, one that transcends the fate of Irdya.</i>"
