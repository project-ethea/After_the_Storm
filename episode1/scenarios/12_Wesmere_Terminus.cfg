            location_id=2
        [/store_locations]

        [sound_source]
            id=facility_ambience
            delay=30000
            chance=50
            loop=0
            sounds=ambient/lurking-horror1.ogg,ambient/lurking-horror2.ogg,ambient/lurking-horror3.ogg,ambient/lurking-horror4.ogg,ambient/lurking-horror5.ogg,ambient/lurking-horror6.ogg
        [/sound_source]

        [message]
            speaker=Elynia
            message= _ "None of this seems useful to us. It’s all either incomprehensible gibberish, irrelevant ramblings, or... Hold on... I hear activity."
        [/message]

        {REPLACE_SCENARIO_MUSIC acherontic.ogg}

        [message]
            speaker=narrator
            caption= _ "speaker^???"
            image=wesnoth-icon.png
            message= _ "<i>(Female voice)</i>

Stand-by block rescinded.

Core unit insertion complete.

Critical block initialization complete.

Phase one start-up complete.

Incubation chamber draining started."
        [/message]

        [message]
            speaker=Elynia
            message= _ "... What is that mechanical voice?"
        [/message]

        [message]
            speaker=narrator
            caption= _ "speaker^???"
            image=wesnoth-icon.png
            message= _ "<i>(Male voice)</i>

Entity induction rod detached.

Neural phase normalization in progress.

Estimated time for incubation chamber draining: five minutes."
        [/message]

        [foreach]
            array=spawner_units
            [do]
                [store_direction]
                    from_x,from_y=$this_item.x,$this_item.y
                    [to]
                        [filter]
                            id=Elynia
                        [/filter]
                    [/to]
                [/store_direction]

                [unstore_unit]
                    variable=this_item
                    find_vacant=yes
                [/unstore_unit]
            [/do]
        [/foreach]

        [sound]
            name=dragonstick.ogg
        [/sound]

        [delay]
            time=100
        [/delay]

        {QUAKE rumble.ogg}

        [for]
            start,end=1,2
            [do]
                [scroll_to]
                    location_id=miniboss$i
                [/scroll_to]

                [unit]
                    location_id=miniboss$i
                    passable=yes
                    animate=yes
                    side=3
                    id=miniboss$i
                    type=Shaxthal Enforcer Drone
                    random_traits=yes
                    [modifications]
                        {BOSS_BOOST 30% 1 0 1 0}
                    [/modifications]
                    [variables]
                        in_miniboss_squad=yes
                    [/variables]
                [/unit]

                [repeat]
                    {QUANTITY times 3 3 4}
                    [do]
                        {RANDOM "Shaxthal Sentry Drone,Shaxthal Sentry Drone,Shaxthal Drone"} # 2/3
                        [unit]
                            location_id=miniboss$i
                            passable=yes
                            animate=yes
                            side=3
                            type=$random
                            random_traits=yes
                            [variables]
                                in_miniboss_squad=yes
                            [/variables]
                        [/unit]
                    [/do]
                [/repeat]
            [/do]
        [/for]

        {CLEAR_VARIABLE random,spawner_units,location}

        [message]
            speaker=Mal Keshar
            scroll=no
            message= _ "Bad news for us is what it is. Look! They are unleashing their vermin on us!"
        [/message]

        [message]
            speaker=Elynia
            message= _ "Brace yourselves!"
        [/message]

        {OBJECTIVES (
            victory_string= _ "Current Objectives:"
            {OBJECTIVE_VICTORY ( _ "Survive the assault")}

            {OBJECTIVE_DEFEAT  ( _ "Death of Elynia")}
            {OBJECTIVE_DEFEAT  ( _ "Death of Mal Keshar")}

            {OBJECTIVE_NOTE ( _ "You will not be able to recall or recruit any units until the end of the mission")}
        )}

        {UNLOCK_VIEW}

        # We proceed to boss stage 1 when either both of the minibosses and
        # their groupies are down, or 5 turns have passed, whichever happens
        # first.

        [event]
            name="turn $($turn_number + 5)"

            [fire_event]
                name=boss stage 1
            [/fire_event]
        [/event]

        [event]
            name=die
            [filter]
                [filter_wml]
                    [variables]
                        in_miniboss_squad=yes
                    [/variables]
                [/filter_wml]
            [/filter]
            [filter_condition]
                [not]
                    [have_unit]
                        [filter_wml]
                            [variables]
                                in_miniboss_squad=yes
                            [/variables]
                        [/filter_wml]
                    [/have_unit]
                [/not]
            [/filter_condition]

            [event]
                name=new turn

                [fire_event]
                    name=boss stage 1
                [/fire_event]
            [/event]
        [/event]
    [/event]

    [event]
        name=boss stage 1

        {LOCK_VIEW}

        {VARIABLE boss_stage 1}

        [store_world_lore]
            entry=abaddon_note_443
            variable=additional_lore
        [/store_world_lore]

        # Schedule this for later

        [event]
            delayed_variable_substitution=no
            name="turn $($turn_number + 2)"
            [fire_event]
                name=reveal energy supply
            [/fire_event]
        [/event]

        [message]
            speaker=Elynia
            message= _ "Malin, I can feel it now... I can feel its presence. But how— where have I felt this before...?"
        [/message]

        {MILESTONE abaddon_console2}

        [message]
            speaker=Mal Keshar
            message= _ "Elynia, I found something else in the glyph. You <b>need</b> to read this, now."
        [/message]

        [item_choice_dialog]
            title= _ "Console Access"
            [option]
                title= _ "Personal Note #443: Usurping the Divine"
                text=$additional_lore
            [/option]
        [/item_choice_dialog]

        {CLEAR_VARIABLE additional_lore}

        [sound]
            name=dragonstick.ogg
        [/sound]

        [fade_out_music]
            duration=500
        [/fade_out_music]

        {QUAKE rumble.ogg}

        [message]
            speaker=Elynia
            scroll=no
            message= _ "... We are too late already, aren’t we?"
        [/message]

        [scroll_to]
            location_id=2
        [/scroll_to]

        [terrain]
            location_id=2
            radius=1
            terrain=Yhl
        [/terrain]

        [item]
            location_id=2
            image=misc/blank-hex.png
            halo=halo/lighthouse-aura.png
        [/item]

        [delay]
            time=500
        [/delay]

        {WHITE_SCREEN}

        #
        # Make all side 1 units face towards the spawn location.
        #

        [store_unit]
            [filter]
                side=1
                {NOT_ON_RECALL_LIST}
            [/filter]
            variable=player_units
        [/store_unit]

        [foreach]
            array=player_units
            [do]
                [store_direction]
                    from_x,from_y=$this_item.x,$this_item.y
                    [to]
                        location_id=2
                    [/to]
                    variable=this_item.facing
                [/store_direction]

                [unstore_unit]
                    find_vacant=no
                    variable=this_item
                [/unstore_unit]
            [/do]
        [/foreach]

        {CLEAR_VARIABLE player_units}

        [redraw][/redraw]

        [delay]
            time=250
        [/delay]

        #
        # Enter the Queen.
        #

        [sound]
            name=ambient/shaxthal-roam-1.ogg
        [/sound]

        [sound]
            name=melee-fire.ogg
        [/sound]

        [delay]
            time=500
        [/delay]

        [store_direction]
            [from]
                location_id=2
            [/from]
            [to]
                [filter]
                    id=Elynia
                [/filter]
            [/to]
        [/store_direction]

        [unit]
            # wmllint: recognize Shaxthal Hive Queen
            id=Shaxthal Hive Queen
            type=Shaxthal Hive Queen
            canrecruit=yes
            {IS_BOSS}
            side=2
            placement=leader
            passable=yes
            facing=$direction
            [modifications]
                {TRAIT_BIOMECHANICAL}
                {TRAIT_RESILIENT}
            [/modifications]
        [/unit]

        #
        # Spawn the Queen's assistants.
        #

        [unit]
            side=2
            placement=leader
            passable=yes
            type=Shaxthal Drone
            upkeep=free
            random_traits=yes
            facing=$direction
            [variables]
                is_queen_spawn=yes
            [/variables]
        [/unit]

        [unit]
            side=2
            placement=leader
            passable=yes
            type=Shaxthal Sentry Drone
            upkeep=free
            random_traits=yes
            facing=$direction
            [variables]
                is_queen_spawn=yes
            [/variables]
        [/unit]

        [unit]
            side=2
            placement=leader
            passable=yes
            type=Shaxthal Drone
            upkeep=free
            random_traits=yes
            facing=$direction
            [variables]
                is_queen_spawn=yes
            [/variables]
        [/unit]

        [unit]
            side=2
            placement=leader
            passable=yes
            type=Shaxthal Sentry Drone
            upkeep=free
            random_traits=yes
            facing=$direction
            [variables]
                is_queen_spawn=yes
            [/variables]
        [/unit]

        {CLEAR_VARIABLE direction}

        [remove_item]
            location_id=2
        [/remove_item]

        #
        # Restore screen.
        #

        {RESET_SCREEN}

        {QUAKE rumble.ogg}

        {ACHIEVEMENT:GET queen_1}

        {BOSS_AMBIENTANCE_LOOPING}

        [delay]
            time=1000
        [/delay]

        [message]
            speaker=Elynia
            message= _ "—Uria be damned!"
        [/message]

        [message]
            speaker=Mal Keshar
            message= _ "Hey, that conspicuous glowing orb embedded in its torso seems important!"
        [/message]

        [scroll_to]
            location_id=2
        [/scroll_to]

        [delay]
            time=1000
        [/delay]

        [message]
            speaker=Elynia
            message= _ "Yes. It must be the very thing we have been searching for. Destroy it! Destroy it at all costs!"
        [/message]

        {OBJECTIVES (
            {OBJECTIVE_VICTORY ( _ "Destroy the Queen")}

            {OBJECTIVE_DEFEAT  ( _ "Death of Elynia")}
            {OBJECTIVE_DEFEAT  ( _ "Death of Mal Keshar")}

            {OBJECTIVE_NOTE ( _ "You will not be able to recall or recruit any units until the end of the mission")}
        )}

        {BOSS_UI "Shaxthal Hive Queen" ( _ "The Queen") ( _ "Last Steward of the Sylvan Dominion")}

        # After two turns, let Mal Keshar's HP start going down

        [event]
            delayed_variable_substitution=no
            name="turn $($turn_number + 1) end"

            {VARIABLE boss_stage 2}
        [/event]

        {UNLOCK_VIEW}
    [/event]

    [event]
        name=reveal energy supply

        [store_locations]
            terrain=*^&F
            variable=supply_locs
        [/store_locations]

        {QUAKE "cave-in.ogg"}

        [foreach]
            array=supply_locs
            variable=loc
            [do]
                [terrain]
                    x,y=$loc.x,$loc.y
                    terrain=Yhl
                [/terrain]

                [redraw][/redraw]

                [unit]
                    side=2
                    canrecruit=no
                    upkeep=free
                    {IS_BOSS}
                    name=" " # Prevents Verlissh namegen from touching this
                    type=Verlissh Matrix Core
                    x,y=$loc.x,$loc.y
                    [modifications]
                        {BOSS_BOOST 20% 1 0 0 1}

                        [object]
                            [effect]
                                apply_to=attack
                                name=hot goo
                                set_range=melee
                            [/effect]

                            [effect]
                                apply_to=new_ability
                                [abilities]
                                    {ABILITY_EXTRA_HEAL}
                                [/abilities]
                            [/effect]

                            [effect]
                                apply_to=halo
                                halo="halo/heart-aura.png~CS(-80,100,120)~O(0.15)"
                            [/effect]
                        [/object]
                    [/modifications]
                [/unit]

                [scroll_to]
                    x,y=$loc.x,$loc.y
                    {WARP}
                [/scroll_to]

                [delay]
                    time=500
                [/delay]
            [/do]
        [/foreach]

        {CLEAR_VARIABLE supply_locs}

        [message]
            speaker=Elynia
            message= _ "We have found those things before! They must have something to do with the hive, and possibly this creature as well — perhaps some kind of power source? Try destroying them!"
        [/message]
    [/event]

    [event]
        name=attacker hits
        first_time_only=no
        [filter]
            side=1
        [/filter]
        [filter_second]
            id=Shaxthal Hive Queen
        [/filter_second]

        [fire_event]
            name=boss damaged
        [/fire_event]
    [/event]

    [event]
        name=defender hits
        first_time_only=no
        [filter_second]
            side=1
        [/filter_second]
        [filter]
            id=Shaxthal Hive Queen
        [/filter]

        [fire_event]
            name=boss damaged
        [/fire_event]
    [/event]

    [event]
        name=boss damaged
        first_time_only=no
        [filter_condition]
            [have_unit]
                type=Verlissh Matrix Core
                side=2
            [/have_unit]
            [or]
                [have_location]
                    terrain=*^&F
                [/have_location]
            [/or]
        [/filter_condition]

        {BOSS_ABSORB_FULL_DAMAGE (id=Shaxthal Hive Queen)}
    [/event]

    [event]
        name=die
        first_time_only=no
        [filter]
            type=Verlissh Matrix Core
            side=2
        [/filter]

        # Increase the Queen's health pool by 16 for each energy unit up to a
        # total of 208 HP, and slow her down every time except the last.

        [object]
            [filter]
                id=Shaxthal Hive Queen
            [/filter]
            [effect]
                apply_to=hitpoints
                increase=16
                increase_total=16
            [/effect]
        [/object]

        [if]
            [have_unit]
                type=Verlissh Matrix Core
                side=2
                [not]
                    x,y=$x1,$y1
                [/not]
            [/have_unit]
            [then]
                [modify_unit]
                    [filter]
                        id=Shaxthal Hive Queen
                    [/filter]
                    [status]
                        slowed=yes
                    [/status]
                [/modify_unit]

                # FIXME: see BOSS_ABSORB_FULL_DAMAGE
#ifdef 0
                # Block BOSS_ABSORB_FULL_DAMAGE from unslowing her if the player
                # attacks her during the same turn
                [object]
                    duration=turn
                    [filter]
                        id=Shaxthal Hive Queen
                    [/filter]

                    [effect]
                        apply_to=status
                        add=slowed_by_api
                    [/effect]
                [/object]
#endif
                [floating_text]
                    [filter]
                        id=Shaxthal Hive Queen
                    [/filter]
                    #textdomain wesnoth
                    text="<span color='#f00'>"+_"female^slowed"+"</span>"
                    #textdomain wesnoth-After_the_Storm
                [/floating_text]
            [/then]
        [/if]

        [harm_unit]
            [filter]
                id=Shaxthal Hive Queen
            [/filter]
            amount=16
            kill=no
            fire_event=no
            animate=yes
        [/harm_unit]
    [/event]

    [event]
        name=die
        [filter]
            type=Verlissh Matrix Core
            side=2
        [/filter]

        [message]
            speaker=Elynia
            message= _ "This appears to be causing some damage to the beast!"
        [/message]

        [message]
            speaker=Mal Keshar
            message= _ "Very well — let’s do some more!"
        [/message]

        {OBJECTIVES (
            {OBJECTIVE_VICTORY ( _ "Destroy the energy supply units in the Queen’s chamber")}

            {OBJECTIVE_DEFEAT  ( _ "Death of Elynia")}
            {OBJECTIVE_DEFEAT  ( _ "Death of Mal Keshar")}

            {OBJECTIVE_NOTE ( _ "You will not be able to recall or recruit any units until the end of the mission")}
        )}
    [/event]

    [event]
        name=die
        first_time_only=no
        [filter]
            type=Verlissh Matrix Core
            side=2
        [/filter]
        [filter_condition]
            # Only run this handler if there are living cores. [have_unit]
            # won't match the primary unit here as it will have 0 HP or less
            [not]
                [have_unit]
                    type=Verlissh Matrix Core
                    side=2
                [/have_unit]
            [/not]
        [/filter_condition]

        [object]
            silent=yes
            [filter]
                id=Shaxthal Hive Queen
            [/filter]

            [effect]
                apply_to=remove_ability
                [abilities]
                    {ABILITY_ABSORB_DAMAGE}
                [/abilities]
            [/effect]

            # Make her even more dangerous as a consequence of her becoming
            # vulnerable.

            [effect]
                apply_to=attack
                range=melee
                increase_damage=5
            [/effect]

            [effect]
                apply_to=attack
                name=energy burst
                set_type=arcane
                increase_damage=2
            [/effect]
        [/object]

        [delay]
            time=500
        [/delay]

        [message]
            speaker=Elynia
            message= _ "It’s working! Let’s strike it down now!"
        [/message]

        {OBJECTIVES (
            {OBJECTIVE_VICTORY ( _ "Destroy the Queen")}

            {OBJECTIVE_DEFEAT  ( _ "Death of Elynia")}
            {OBJECTIVE_DEFEAT  ( _ "Death of Mal Keshar")}

            {OBJECTIVE_NOTE ( _ "You will not be able to recall or recruit any units until the end of the mission")}
        )}
    [/event]

    #
    # Verlissh Crawlers respawn logic
    #

    [event]
        name=side 2 turn refresh
        first_time_only=no
        [filter_condition]
            [have_unit]
                type=Verlissh Matrix Core
                side=2
            [/have_unit]

            [not]
                [have_unit]
                    type=Psy Crawler
                    side=2
                    count={DIFF 2 3 4}+"-99999"
                [/have_unit]
            [/not]
        [/filter_condition]

        [store_locations]
            [filter]
                type=Verlissh Matrix Core
                side=2
            [/filter]
            variable=respawn_locs
        [/store_locations]

        {VARIABLE_RANDOM respawn_count {DIFF 1..2 1..3 2..4} }

        [repeat]
            times=$respawn_count
            [do]
                {VARIABLE_RANDOM respawn_loc_index "0..$($respawn_locs.length - 1)"}

                # These are allowed to attack the player on the same turn

                [unit]
                    side=2
                    type=Psy Crawler
                    x,y=$respawn_locs[$respawn_loc_index].x,$respawn_locs[$respawn_loc_index].y
                    passable=yes
                    animate=yes
                    upkeep=free
                    generate_name=yes
                    random_traits=yes
                [/unit]

                {CLEAR_VARIABLE respawn_loc_index}
            [/do]
        [/repeat]

        {CLEAR_VARIABLE respawn_locs,respawn_count}
    [/event]

    #
    # Shaxthal Queen spawns logic
    #

    [event]
        name=side 2 turn refresh
        first_time_only=no
        [filter_condition]
            [have_unit]
                type=Shaxthal Hive Queen
                [and]
                    # HP at least 66/50/33%
                    formula="(if(100 * self.hitpoints / self.max_hitpoints >= threshold, 1, 0)
                        where threshold = {DIFF 66 50 33 })"
                [/and]
            [/have_unit]
        [/filter_condition]

        [while]
            {@? ({QUANTITY max_spawns 1 2 3 }) <<
                local queen_spawns = wesnoth.units.find_on_map {
                    side = 2,
                    wml.tag.filter_wml {
                        wml.tag.variables {
                            is_queen_spawn = true
                        }
                    }
                }

                return #queen_spawns < (...).max_spawns
            >>}
            [do]
                {RANDOM "Shaxthal Drone,Shaxthal Drone,Shaxthal Drone, Shaxthal Sentry Drone"}
                [unit]
                    side=2
                    placement=leader
                    passable=yes
                    animate=yes
                    type=$random
                    random_traits=yes
                    [modifications]
                        {BOSS_BOOST 20% 1 0 1 0}
                    [/modifications]
                    [variables]
                        is_queen_spawn=yes
                    [/variables]
                [/unit]
            [/do]
        [/while]

        {CLEAR_VARIABLE random}
    [/event]

    #
    # Mal Keshar deterioration logic
    #

    [event]
        name=new turn
        first_time_only=no
        [filter_condition]
            {VARIABLE_NUMERICAL_EQUALS boss_stage 2}
            [have_unit]
                id=Mal Keshar
            [/have_unit]
        [/filter_condition]

        {RANDOM {DIFF 1..3 2..6 3..8}}

        [harm_unit]
            [filter]
                id=Mal Keshar
            [/filter]
            amount=$random
            kill=no
            animate=yes
        [/harm_unit]

        {CLEAR_VARIABLE random}
    [/event]

    [event]
        name=new turn
        [filter_condition]
            {VARIABLE_NUMERICAL_EQUALS boss_stage 2}
        [/filter_condition]

        [message]
            speaker=Mal Keshar
            sound={SOUND_LIST:LICH_HIT}
            message= _ "*Uurgh*" # wmllint: ignore no spellcheck
        [/message]

        [message]
            speaker=Elynia
            message= _ "—Malin? Are you all right?"
        [/message]

        [delay]
            time=500
        [/delay]

        [message]
            speaker=Mal Keshar
            message= _ "This... this place is not doing me any good... There is a greater force at work in here, pulling our souls into it..."
        [/message]

        [message]
            speaker=Elynia
            message= _ "I should be able to heal you, just—"
        [/message]

        [message]
            speaker=Mal Keshar
            message= _ "No... Maybe if you and Argan hadn’t decided to use me as your punching bag back there... Let me just... lend you a hand while I still can."
        [/message]

        {VARIABLE_RANDOM random_spawn_count {DIFF 4..6 3..5 3..5} }

        [store_locations]
            location_id=2
            radius=4
            variable=spawn_locs
        [/store_locations]

        [repeat]
            times=$random_spawn_count
            [do]
                {VARIABLE_RANDOM random_type (Skeleton,Skeleton,Skeleton,Skeleton Archer,Skeleton Archer,Revenant,Deathblade,Bone Shooter,Banebow,Death Squire,Skeleton Rider,Bone Knight,Death Knight)}
                {VARIABLE_RANDOM random_loc "0..$($spawn_locs.length - 1)"}

                #
                # This animation only works after scenario 9.2
                #
                [animate_unit]
                    [filter]
                        id=Mal Keshar
                    [/filter]
                    flag=void_recruiting
                [/animate_unit]

                {GENERIC_UNIT 1 $random_type $spawn_locs[$random_loc].x $spawn_locs[$random_loc].y} {NO_UPKEEP_NO_OVERLAY}
                [+unit]
                    animate=yes
                    passable=yes
                [/unit]
            [/do]
        [/repeat]

        [object]
            [filter]
                id=Mal Keshar
            [/filter]
            [effect]
                apply_to=hitpoints
                increase,increase_total=24,24
                heal_full=yes
            [/effect]
            [effect]
                apply_to=level
                increase=1
            [/effect]
        [/object]

        [sound]
            name=heal.wav
        [/sound]

        [message]
            speaker=Mal Keshar
            message= _ "My work here is not done."
        [/message]

        {CLEAR_VARIABLE random_spawn_count,random_type,random_loc,spawn_locs}
    [/event]

    [event]
        name=last breath
        [filter]
            id=Shaxthal Hive Queen
        [/filter]

        {LOCK_VIEW}

        {BOSS_UI_REMOVE}

        {CLEAR_LABELS}

        [color_adjust]
            red,green,blue=10,0,0
        [/color_adjust]

        [message]
            speaker=narrator
            message= _ "The unsightly behemoth let out a terrifying loud screech with its dying breath. As the creature collapsed, the alien core in its chest shattered, and burst, releasing a great amount of energy that enveloped all in ghostly red tendrils..."
            image=wesnoth-icon.png
        [/message]

        {FLASH_RED (
            [kill]
                fire_event=no
                x,y=$x1,$y1
                animate=yes
            [/kill]
        )}

        [kill]
            fire_event=no
            side=2
            [filter_location]
                find_in=boss_chamber
            [/filter_location]
            animate=yes
        [/kill]

        [fire_event]
            name=begin final cutscene
        [/fire_event]

        {UNLOCK_VIEW}
    [/event]

#define TQ_PETRIFY_STORED_UNIT _UNIT_STORE_NAME
    [set_variables]
        mode=merge
        name={_UNIT_STORE_NAME}
        [value]
            side=7
            experience=0
            hitpoints=1
            max_hitpoints=1
            moves=1
            max_moves=1
            ellipse=none # wmllint: no ellipsecheck
            [status]
                petrified=yes
                slowed=no
                poisoned=no
                uncovered=yes
            [/status]
        [/value]
    [/set_variables]
#enddef

#define TQ_PETRIFY_ONE_RANDOM_UNDEAD
    [if]
        [have_unit]
            side=1
            race=undead
            [not]
                id=Mal Keshar
            [/not]
        [/have_unit]
        [then]
            [store_unit]
                [filter]
                    side=1
                    race=undead
                    [not]
                        id=Mal Keshar
                    [/not]
                [/filter]
                variable=undead_fossil_store
            [/store_unit]

            {VARIABLE_RANDOM fossil_index "0..$($undead_fossil_store.length - 1)"}

            {TQ_PETRIFY_STORED_UNIT undead_fossil_store[$fossil_index]}

            [sound]
                name=petrified.ogg
            [/sound]

            [unstore_unit]
                find_vacant=no
                variable="undead_fossil_store[$fossil_index]"
            [/unstore_unit]

            [scroll_to]
                x,y=$undead_fossil_store[$fossil_index].x,$undead_fossil_store[$fossil_index].y
            [/scroll_to]

            {CLEAR_VARIABLE undead_fossil_store,fossil_index} #,petrified_label}
        [/then]
    [/if]
#enddef

#define TQ_PETRIFY_ALL_REMAINING_UNDEAD
    [store_unit]
        [filter]
            side=1
            race=undead
            {NOT_ON_RECALL_LIST}
        [/filter]
        variable=undead_fossil_store
    [/store_unit]

    [foreach]
        array=undead_fossil_store
        [do]
            {TQ_PETRIFY_STORED_UNIT this_item}

            [sound]
                name=petrified.ogg
            [/sound]

            [unstore_unit]
                find_vacant=no
                variable=this_item
            [/unstore_unit]

            [scroll_to]
                x,y=$this_item.x,$this_item.y
            [/scroll_to]
        [/do]
    [/foreach]

    {CLEAR_VARIABLE undead_fossil_store}
#enddef

