                [message]
                    speaker=Elynia
                    message= _ "I must get out of here."
                [/message]
            [/else]
        [/if]

        # Move Elynia close to the cutscene gate if she's too far away from it
        {@ <<
            local elynia = wesnoth.units.get('Elynia')
            local goal = wesnoth.current.map.find({ location_id = 'cutscene_gate' })[1]
            local dist = wesnoth.map.distance_between({ elynia.x, elynia.y }, { goal.x, goal.y })

            if dist > 6 then
                wesnoth.wml_actions.move_unit {
                    id = 'Elynia',
                    to_location = 'cutscene_prox',
                    clear_shroud = true,
                }
            end
        >>}

        [message]
            speaker=Elynia
            message= _ "This way..."
        [/message]

        [scroll_to]
            location_id=cutscene_gate
        [/scroll_to]

        {HIGHLIGHT_GOAL (
            location_id=cutscene_gate
            radius=1
            [filter_radius]
                terrain=*^P*
            [/filter_radius]
        )}

        [scroll_to_unit]
            id=Elynia
        [/scroll_to_unit]

        {OBJECTIVES (
            victory_string= _ "Current Objectives:"
            {OBJECTIVE_VICTORY ( _ "Find an alternate exit to the surface")}

            {OBJECTIVE_DEFEAT  ( _ "Death of Elynia")}

            {OBJECTIVE_NOTE ( _ "You will not be able to recall or recruit any units until the end of the mission")}
        )}

        #
        # Re-enable regular sound sources (not background ambience).
        #

        #{TQ_ENABLE_CAVE_WATER_SOUND_SOURCES}

        {UNLOCK_VIEW}

        #
        # Make sure Elynia can't be hit, we don't want her dying at this point.
        #

        {FORCE_CHANCE_TO_HIT () (id=Elynia) 0 ()}

        #
        # Elynia deterioration logic
        #

        {VARIABLE end_of_scenario_turn_number "$($turn_number + 5)"}

        [event]
            delayed_variable_substitution=no
            name=new turn
            first_time_only=no
            [filter_condition]
                {VARIABLE_NUMERICAL_LESS_THAN turn_number $end_of_scenario_turn_number}
            [/filter_condition]

            {RANDOM 8..18}

            [harm_unit]
                [filter]
                    id=Elynia
                [/filter]
                amount=$|random
                kill=no
                animate=yes
            [/harm_unit]

            {CLEAR_VARIABLE random}
        [/event]

        #
        # Critters deterioration logic
        #

        [event]
            name=new turn
            first_time_only=no

            {RANDOM 8..16}

            # Visible units are animated and may get less damage,
            # but they may also die.

            [harm_unit]
                [filter]
                    [filter_vision]
                        visible=yes
                        side=1
                    [/filter_vision]
                    [not]
                        side=1,7
                    [/not]
                    [not]
                        type=Verlissh Matrix Flow System
                    [/not]
                [/filter]
                amount=$random
                kill=yes
                animate=yes
            [/harm_unit]

            {RANDOM 12..60}

            # Units out of the player's reach are not animated but
            # may get more damage. However, they may *not* die.

            [harm_unit]
                [filter]
                    [filter_vision]
                        visible=no
                        side=1
                    [/filter_vision]
                    [not]
                        side=1,7
                    [/not]
                    [not]
                        type=Verlissh Matrix Flow System
                    [/not]
                [/filter]
                amount=$random
                kill=no
                animate=no
            [/harm_unit]

            {CLEAR_VARIABLE random}
        [/event]

        [event]
            name=moveto
            first_time_only=no

            {RANDOM 0..16}

            [if]
                {VARIABLE_NUMERICAL_GREATER_THAN random 6}
                [then]
                    {QUAKE {SOUND_LIST:COLLAPSING_FACILITY} }
                [/then]
            [/if]

            {CLEAR_VARIABLE random}
        [/event]

        {VARIABLE color_adjust 10}

        [event]
            delayed_variable_substitution=no
            name=new turn
            first_time_only=no

            {VARIABLE_ADD color_adjust 5}

            [color_adjust]
                red,green,blue=$color_adjust,0,0
            [/color_adjust]
        [/event]

        [event]
            delayed_variable_substitution=no
            name="turn $($turn_number + 1)"

            [message]
                speaker=narrator
                image= # wmllint: ignore
                message= _ "<i>... I have always been alone...</i>"
            [/message]

            {QUAKE {SOUND_LIST:COLLAPSING_FACILITY} }

            # Fill swamp, blood, chasms with lava

            [terrain]
                [and]
                    terrain=Qxv,Qxv^*,Ss,Ss^*
                [/and]
                terrain=Ql
                layer=base
            [/terrain]

            [terrain]
                [and]
                    terrain=Wwb,Wwb^*,Wwbf,Wwbf^*
                [/and]
                terrain=Qlf
                layer=base
            [/terrain]

            # Remove overlays such as bridges and other decoration from the
            # new lava tiles

            [remove_terrain_overlays]
                terrain=Ql^B*,Ql^E*,Qlf^B*,Qlf^E*
            [/remove_terrain_overlays]

            [redraw][/redraw]

            {QUAKE {SOUND_LIST:COLLAPSING_FACILITY} }
        [/event]

        [event]
            delayed_variable_substitution=no
            name="turn $($turn_number + 2)"

            [message]
                speaker=narrator
                image= # wmllint: ignore
                # po: She's talking about a different necromancer, from much longer ago.
                message= _ "<i>... This is my fate... It is just as the necromancer said back then...</i>"
            [/message]

            {QUAKE {SOUND_LIST:COLLAPSING_FACILITY} }

            [kill]
                animate=yes
                fire_event=no
                side=1
                {NOT_ON_RECALL_LIST}
                race=faerie
                [not]
                    id=Elynia
                [/not]
            [/kill]

            {QUAKE {SOUND_LIST:COLLAPSING_FACILITY} }
        [/event]

        [event]
            delayed_variable_substitution=no
            name="turn $($turn_number + 3)"

            [message]
                speaker=narrator
                image= # wmllint: ignore
                message= _ "<i>... Perhaps it is time to rest...</i>"
            [/message]

            {QUAKE {SOUND_LIST:COLLAPSING_FACILITY} }

            [kill]
                animate=yes
                fire_event=no
                side=1
                {NOT_ON_RECALL_LIST}
                [not]
                    id=Elynia
                [/not]
            [/kill]
        [/event]

        [event]
            delayed_variable_substitution=no
            name="turn $($turn_number + 4)"

            [message]
                speaker=narrator
                image= # wmllint: ignore
                message= _ "<i>... No...

Galas...

Malin...

Anlindë...

They sacrificed their lives so I could see this through.

I cannot... I will <b>not</b> fail them.</i>"
            [/message]
        [/event]

        [event]
            delayed_variable_substitution=no
            name="turn $end_of_scenario_turn_number"

            [fire_event]
                name=the end
            [/fire_event]
        [/event]

        [event]
            name=enter hex
            [filter]
                id=Elynia
                [filter_location]
                    terrain=*^&G
                [/filter_location]
            [/filter]

            # Close off the chamber and kill any stragglers

            [terrain]
                location_id=cutscene_gate
                radius=1
                [filter_radius]
                    terrain=*^P*
                [/filter_radius]
                terrain=Xu
            [/terrain]

            [kill]
                side=1
                animate=no
                fire_event=yes
                [filter_location]
                    find_in=boss_chamber
                    [or]
                        find_in=boss_chamber_walls
                    [/or]
                [/filter_location]
            [/kill]

            [place_shroud]
                side=1
                find_in=boss_chamber
                [or]
                    find_in=boss_chamber_walls
                [/or]
            [/place_shroud]

            [redraw]
                side=1
            [/redraw]

            {QUAKE dragonstick.ogg}

            [sound]
                name=rumble.ogg
            [/sound]

            [delay]
                time=250
            [/delay]

            {FACE_DIRECTION id=Elynia se}

            [delay]
                time=1000
            [/delay]

            [message]
                speaker=Elynia
                message= _ "... No turning back now..."
            [/message]

            {FACE_DIRECTION id=Elynia sw}
        [/event]

        [event]
            name=moveto
            [filter]
                id=Elynia
                [filter_location]
                    location_id=dead_end
                    radius=6
                [/filter_location]
            [/filter]

            [message]
                speaker=Elynia
                message= _ "... It’s all crumbling down. There is no way out..."
            [/message]
        [/event]

        {CLEAR_VARIABLE end_of_scenario_turn_number}
    [/event]

    [event]
        name=new turn
        first_time_only=no
        [filter_condition]
            [have_unit]
                side=8
                [not]
                    id=Mal Keshar
                [/not]
            [/have_unit]
        [/filter_condition]

        [store_unit]
            [filter]
                side=8
                [not]
                    id=Mal Keshar
                [/not]
            [/filter]
            kill=no
