        {GLOBAL_TABLE:WRITE swam_in_fountain_of_courage}
        {GLOBAL_TABLE:CLOSE}

        {CLEAR_VARIABLE journeylog}

        #
        # Store Elynia for use in E2.
        #

        {UNIT_TO_GLOBAL_STORE Elynia episode1_stats_elynia}

        # These sound sources are only running when this event is thrown out
