#textdomain wesnoth-After_the_Storm

[scenario]
    {NAIA_SCENARIO 09_The_Triad_part_2 E1S9 ( _ "The Triad — Part 2")}

    {MAP 09_The_Triad_part_2.map}
    {TURNS 22 21 20}
    next_scenario="09_The_Triad_part_3"
    victory_when_enemies_defeated=no

    disallow_recall=yes

    {A_DEATHS}

    #
    # NOTE: the story screen does not have an initial music track
    # on purpose. This is intended to allow music to continue playing
    # as it was at the end of E1S9.1.
    #
    [event]
        name=prestart
        [music]
            name="the_city_falls.ogg"
            immediate=no
        [/music]
    [/event]

    {INDOORS} {SCHEDULE_LIGHTING -40 -40 -10}

    {SPAWN_CONTROLLER}

    # wmllint: validate-off

    [side]
        save_id=player

        controller=human
        side=1
        team_name=player
        user_team_name= _ "team_name^Galas"
        shroud=yes

        {NO_ECONOMY}

        # wmllint: recognize Galas
        {CHARACTER_STATS_GALAS}
    [/side]

    [side]
        side=2
        team_name=foe
        user_team_name= _ "team_name^Enemies"
        color=gold
        {CHAOS_FLAG}
        hidden=yes

        {NO_ECONOMY}

        controller=null
    [/side]

    # wmllint: validate-on

    [side]
        side=3
        team_name=foe
        user_team_name= _ "team_name^Enemies"
        color=blue
        {CHAOS_FLAG}
        hidden=yes

        {NO_ECONOMY}

        {GOLD 120 100 90}

        canrecruit=no
        type=Shaxthal Stormblade Ivyel
        unrenamable=yes
        facing=sw
        [modifications]
            {TRAIT_BIOMECHANICAL}
            {TRAIT_RESILIENT}
        [/modifications]

        {ai/aliases/stable_singleplayer.cfg}
        [ai]
            {AI_SIMPLE_ALWAYS_ASPECT aggression 200.00}
            {AI_SIMPLE_ALWAYS_ASPECT caution      0.00}
            {AI_SIMPLE_ALWAYS_ASPECT grouping       no}
            {AI_SIMPLE_ALWAYS_ASPECT passive_leader no}
        [/ai]
    [/side]

    [side]
        side=4
        team_name=foe
        user_team_name= _ "team_name^Enemies"
        {CHAOS_FLAG}
        hidden=yes

        no_leader=yes
        {NO_ECONOMY}
    [/side]

    #
    # Glyphs
    #

    {OBJ_HEALING_GLYPH 35 23}

    #
    # Enemy spawners
    #

#define TT_EASY_SPAWNS
    type="Shaxthal Drone"
#enddef

#define TT_MEDIUM_SPAWNS
    {QUANTITY type
    ("Shaxthal Drone")
    ("Shaxthal Drone,Shaxthal Drone,Shaxthal Sentry Drone,Shaxthal Drone,Shaxthal Drone")
    ("Shaxthal Drone,Shaxthal Drone,Shaxthal Sentry Drone")
    }
#enddef

    {TIMED_DRONE_SPAWNER 5  ({TT_MEDIUM_SPAWNS})  3 34 28}
    {TIMED_DRONE_SPAWNER 3  ({TT_EASY_SPAWNS})    3 36 33}
    {TIMED_DRONE_SPAWNER 4  ({TT_EASY_SPAWNS})    3 31 29}
    {TIMED_DRONE_SPAWNER 8  ({TT_MEDIUM_SPAWNS})  3 31 35}
    {TIMED_DRONE_SPAWNER 7  ({TT_EASY_SPAWNS})    3 33 34}
    {TIMED_DRONE_SPAWNER 6  ({TT_EASY_SPAWNS})    3 25 27}
    {TIMED_DRONE_SPAWNER 10 ({TT_MEDIUM_SPAWNS})  3 25 29}
    {TIMED_DRONE_SPAWNER 9  ({TT_EASY_SPAWNS})    3 25 31}

#undef TT_EASY_SPAWNS
#undef TT_MEDIUM_SPAWNS

    {PLACE_IMAGE ("items/box.png") 32 20}

#define TT_FOG_DEFINITION _FLAG _OPACITY
    {FOG_SIMPLE     *^&{_FLAG}                          LAYER=1      IPF="~O({_OPACITY})"}
    {NEW:TRANSITION *^&{_FLAG} (!,*^&{_FLAG}) 1 fog/fog FLAG=overlay IPF="~O({_OPACITY})"}
#enddef

    {TT_FOG_DEFINITION B 0.8}
    {TT_FOG_DEFINITION C 0.6}
    {TT_FOG_DEFINITION D 0.4}
    {TT_FOG_DEFINITION E 0.2}

#undef TT_FOG_DEFINITION

    {CAVE_NOISE_SOUND_SOURCE}

    [event]
        name=prestart

        [modify_side]
            side=1
            gold=0
        [/modify_side]

        # wmllint: recognize Elynia
        {RECALL_ELYNIA}
        # wmllint: recognize Mal Keshar
        {RECALL_MAL_KESHAR}

        {FACE_DIRECTION side=1 nw}

        {OBJECTIVES (
            victory_string= _ "Current Objectives:"
            {OBJECTIVE_VICTORY ( _ "Locate an exit")}

            {OBJECTIVE_DEFEAT  ( _ "Death of Galas")}
            {OBJECTIVE_DEFEAT  ( _ "Death of Elynia")}
            {OBJECTIVE_DEFEAT  ( _ "Death of Mal Keshar")}

            {TURNS_RUN_OUT}

            {NO_UNIT_CARRYOVER_NOTE}
        )}

        [unit]
            side=3
            type=Shaxthal Rayblade
            x,y=29,22
            facing=sw
        [/unit]

#define TT_PALETTE_OVERRIDE
    [modifications]
        [object]
            [effect]
                apply_to="image_mod"
                add="PAL(shaxthal_drone_v2_base>shaxthal_drone_v2_brown)"
            [/effect]
        [/object]
    [/modifications]
#enddef

        [unit]
            side=3
            type=Shaxthal Drone
            x,y=29,21
            facing=sw
            {TT_PALETTE_OVERRIDE}
        [/unit]

        [unit]
            side=3
            type=Shaxthal Drone
            x,y=31,22
            facing=sw
            {TT_PALETTE_OVERRIDE}
        [/unit]

        [unit]
            side=3
            type=Shaxthal Sentry Drone
            x,y=28,22
            facing=sw
            {TT_PALETTE_OVERRIDE}
            [+modifications]
                {TRAIT_BIOMECHANICAL}
                {TRAIT_ARMORED}
            [/modifications]
        [/unit]

#undef TT_PALETTE_OVERRIDE

        # Some extra anim
        # FIXME: dispose of the extra animation at some point later

        [object]
            silent=yes
            [filter]
                id=Mal Keshar
            [/filter]
            [effect]
                apply_to=new_animation
                [extra_anim]
                    flag=void_recruiting
                    start_time=-300
                    [frame]
                        duration=100
                        image="units/undead-necromancers/ancient-lich-magic-1.png"
                    [/frame]
                    [frame]
                        duration=100
                        image="units/undead-necromancers/ancient-lich-magic-2.png"
                        sound=magic-dark-big.ogg
                    [/frame]
                    [frame]
                        duration=100
                        image="units/undead-necromancers/ancient-lich-magic-3.png"
                    [/frame]
                    [frame]
                        duration=100
                        image="units/undead-necromancers/ancient-lich-magic-1.png"
                    [/frame]
                    [frame]
                        duration=1
                        image="units/undead-necromancers/ancient-lich.png"
                    [/frame]
                [/extra_anim]
            [/effect]
        [/object]
    [/event]

    {REGISTER_DEBUG_TRIGGERS (
        {DEBUG_TRIGGER DEBUG1 "Move heroes to Ivyel"}
        {DEBUG_TRIGGER DEBUG2 "Move heroes to Elyssa"}
    )}

    [event]
        name=DEBUG1

        [teleport]
            [filter]
                id=Galas
            [/filter]
            x,y=26,24
        [/teleport]
        [teleport]
            [filter]
                id=Elynia
            [/filter]
            x,y=26,25
        [/teleport]
        [teleport]
            [filter]
                id=Mal Keshar
            [/filter]
            x,y=27,25
        [/teleport]
    [/event]

    [event]
        name=DEBUG2

        [teleport]
            [filter]
                id=Galas
            [/filter]
            x,y=19,17
        [/teleport]
        [teleport]
            [filter]
                id=Elynia
            [/filter]
            x,y=20,16
        [/teleport]
        [teleport]
            [filter]
                id=Mal Keshar
            [/filter]
            x,y=20,17
        [/teleport]
    [/event]

    [event]
        name=start
        [message]
            speaker=Galas
            message= _ "We must make haste before their reinforcements catch up with us. Which direction should we go?"
        [/message]

        [message]
            speaker=Elynia
            message= _ "A slight breeze comes from the passage to our left; we should follow it."
        [/message]

        [message]
            speaker=Galas
            message= _ "These passages are eerily vacant. I feel we are being led into a trap of some sort..."
        [/message]
    [/event]

#define TT_REMOVE_SHROUD X Y RADIUS
    [remove_shroud]
        x={X}
        y={Y}
        radius={RADIUS}
        [filter_radius]
            [not]
                terrain=X*,*^X*
            [/not]
        [/filter_radius]
        side=1
    [/remove_shroud]
#enddef

    [event]
        name=moveto
        [filter]
            side=1
            x=1-52
            y=22-31
        [/filter]

        [fire_event]
            name=gauntlet1
        [/fire_event]
    [/event]

    [event]
        {SIGHTED_SUF_BY_PLAYER (side=3)}

        [fire_event]
            name=gauntlet1
        [/fire_event]
    [/event]

    [event]
        name=gauntlet1

        {CLEAR_CAVE_SHROUD (
            x,y=34,31
            radius=4
            [or]
                x,y=40,29
                radius=2
            [/or]
        )}

        [redraw]
            side=1
        [/redraw]

        [scroll_to]
            x,y=36,30
        [/scroll_to]

        [delay]
            time=500
        [/delay]

        [message]
            speaker=Galas
            message= _ "Mal Keshar, we’ll need some reinforcements to get through!"
        [/message]

        [animate_unit]
            [filter]
                id=Mal Keshar
            [/filter]
            flag=void_recruiting
        [/animate_unit]

        [s9_area_spawns]
            x=34-41
            y=29-31
            [not]
                [filter]
                [/filter]
            [/not]
            [not]
                terrain=Q*,X*,*^X*
            [/not]
            {QUANTITY skeletons 3 2 2}
            {QUANTITY ghosts    1 1 1}
        [/s9_area_spawns]

        [message]
            speaker=Mal Keshar
            message= _ "Things are looking rather grim... We have not fully recovered from that demon’s attack, and her guards are in hot pursuit. Our backup has most certainly been scattered or slaughtered by now. What do you plan to do now that this has turned into a suicide mission?"
        [/message]
    [/event]

    [event]
        name=moveto
        [filter]
            side=1
            x=21,22,23,21,22,23,21,22,23
            y=21,20,20,22,21,21,23,22,22
        [/filter]

        [message]
            speaker=Galas
            message= _ "A gate! Let’s strike it down—"
        [/message]

        [sound]
            name="shaxthal-energy-prelude.ogg"
        [/sound]

        [delay]
            time=100
        [/delay]

        [scroll_to]
            x,y=30,21
            {WARP}
        [/scroll_to]

        [sound]
            name="shaxthal-energy-fire.ogg"
        [/sound]

        [delay]
            time=250
        [/delay]

        {QUAKE "explosion-big.ogg"}

        [terrain]
            x=26,26,27,27,28,29
            y=22,23,23,25,23,24
            terrain=Urb^Es
        [/terrain]

        {TT_REMOVE_SHROUD 30 21 4}

        [redraw]
            side=1
        [/redraw]

        {QUAKE "cave-in.ogg"}

        [delay]
            time=500
        [/delay]

        [sound]
            name="ambient/shaxthal-roam-1.ogg,ambient/shaxthal-roam-2.ogg"
        [/sound]

        [delay]
            time=750
        [/delay]

        [message]
            speaker=Elynia
            message= _ "It’s an ambush!"
        [/message]

        [message]
            speaker=Mal Keshar
            message= _ "Damn them all! I don’t know if I’ll be able to keep on with this for much longer."
        [/message]

        [animate_unit]
            [filter]
                id=Mal Keshar
            [/filter]
            flag=void_recruiting
        [/animate_unit]

        [scroll_to]
            x,y=26,24
        [/scroll_to]

        [s9_area_spawns]
            x=22,23,23,24,24,24,25,25,25,26,26,26,27,27,27,27,28,28,28,29,29
            y=23,23,24,22,23,24,23,24,25,23,24,25,24,25,26,27,24,25,26,25,26
            [not]
                [filter]
                [/filter]
            [/not]
            [not]
                terrain=Q*,X*,*^X*
            [/not]
            {QUANTITY skeletons 4 3 2}
            {QUANTITY ghosts    2 1 1}
        [/s9_area_spawns]
    [/event]

    [event]
        name=last breath
        [filter]
            type=Shaxthal Stormblade Ivyel
        [/filter]

        [message]
            type=Shaxthal Stormblade Ivyel
            message= _ "... Elynia... please... don’t..."
        [/message]

        [message]
            speaker=Elynia
            message= _ "Huh?"
        [/message]

        [message]
            speaker=Galas
            message= _ "It’s running away!"
        [/message]

        [store_unit]
            [filter]
                type=Shaxthal Stormblade Ivyel
            [/filter]
            kill=yes
            variable=ivyel_store
        [/store_unit]

        [move_unit_fake]
            type=$ivyel_store.type
            side=$ivyel_store.side
            x=$ivyel_store.x,31
            y=$ivyel_store.y,20
        [/move_unit_fake]

        # Ignore movement costs now

        [move_unit_fake]
            type=$ivyel_store.type
            side=$ivyel_store.side
            x=31,32,33,35
            y=20,17,15,14
        [/move_unit_fake]

        {CLEAR_VARIABLE ivyel_store}

        [message]
            speaker=Elynia
            message= _ "I— Hopefully it’s sufficiently damaged so that it won’t attack us from behind again. We need to advance, quickly."
        [/message]

        {DOOR_TILES_TO_UNITS 4}

        [kill]
            type=Door
            x=30,31-32
            y=18,19
        [/kill]

        {CLEAR_CAVE_SHROUD (x,y,radius=22,20,1)}

        [redraw]
            side=1
        [/redraw]

        [scroll_to]
            x,y=22,19
        [/scroll_to]

        {HIGHLIGHT_GOAL x,y="21,22-23","20,19"}

        [scroll_to]
            x,y=$x2,$y2
        [/scroll_to]
    [/event]

    [event]
        name=die
        [filter]
            type=Door
            x=21,22,23
            y=20,19,19
        [/filter]

        [kill]
            x,y=$x1,$y1
        [/kill]

        {TT_REMOVE_SHROUD 20 18 3}

        {SCROLL_TO_LOCATION_AND_RETURN_TO_PRIMARY_UNIT 20 18}
    [/event]

#define TT_FOG_STEP _FLAG
    [terrain]
        [and]
            terrain=*^&*
            [or]
                terrain=*^Zow
            [/or]
        [/and]
        terrain=^&{_FLAG}
        layer=overlay
    [/terrain]

    [redraw][/redraw]

    [delay]
        time=50
    [/delay]
#enddef

#define TT_AURA _X _Y _OPACITY
    [item_fast]
        x={_X}
        y={_Y}
        image="misc/blank-hex.png"
        halo="halo/heart-aura.png~O("+{_OPACITY}+")"
    [/item_fast]
#enddef

#define TT_AURA_STEP _X _Y _OPACITY
    [remove_item]
        x={_X}
        y={_Y}
    [/remove_item]

    [item]
        x={_X}
        y={_Y}
        image="misc/blank-hex.png"
        halo="halo/heart-aura.png~O("+{_OPACITY}+")"
    [/item]
#enddef

#define TT_ELYSSA_STEP _OPACITY
    [object]
        silent=yes
        [filter]
            id=Elyssa
        [/filter]
        [effect]
            apply_to=image_mod
            replace="O("+{_OPACITY}+")"
        [/effect]
    [/object]
#enddef

#define TT_ELYSSA_RESET
    [object]
        silent=yes
        [filter]
            id=Elyssa
        [/filter]
        [effect]
            apply_to=image_mod
            replace="NOP()"
        [/effect]
    [/object]
#enddef

#define TT_MOVE_UNIT _ID _LOC
    [store_locations]
        location_id={_LOC}
    [/store_locations]

    {MOVE_UNIT (id={_ID}) $location.x $location.y}

    {CLEAR_VARIABLE location}
#enddef

#define TT_COND_MOVE_UNIT _ID _LOC
    [if]
        [not]
            [have_unit]
                id={_ID}
                [filter_location]
                    location_id={_LOC}
                [/filter_location]
            [/have_unit]
        [/not]
        [then]
            {TT_MOVE_UNIT ({_ID}) ({_LOC})}
        [/then]
    [/if]
#enddef

#define TT_ELYSSA_PUSH_BACK _LOC
    [store_locations]
        location_id={_LOC}
    [/store_locations]

    [store_unit]
        [filter]
            id=Elyssa
        [/filter]
        variable=elyssa_store
        kill=yes
    [/store_unit]

    [move_unit_fake]
        type=$elyssa_store.type
        side=$elyssa_store.side
        # NOTE: this assumes that she will never get north-facing
        # frames.
        image_mods="FL(horiz)"
        x=$elyssa_store.x,$location.x
        y=$elyssa_store.y,$location.y
    [/move_unit_fake]

    [set_variables]
        name=elyssa_store
        mode=merge
        [value]
            facing=sw
            x,y=$location.x,$location.y
        [/value]
    [/set_variables]

    [unstore_unit]
        variable=elyssa_store
    [/unstore_unit]

    {CLEAR_VARIABLE elyssa_store,location}
#enddef

    [event]
        name=moveto
        [filter]
            side=1
            x=1-22
            y=1-15
            [and]
                id=Galas
                [or]
                    id=Mal Keshar
                [/or]
                [or]
                    id=Elynia
                [/or]
            [/and]
        [/filter]

        {LOCK_VIEW}

        [modify_side]
            side=2
            controller=ai
        [/modify_side]

        [store_unit]
            [filter]
                side=1
                {NOT_ON_RECALL_LIST}
            [/filter]
            variable=side1_store
        [/store_unit]

        [foreach]
            array=side1_store
            [do]
                [set_variables]
                    name=this_item
                    mode=merge
                    [value]
                        moves=0
                        attacks_left=0
                        [status]
                            uncovered=yes
                            poisoned=no
                            slowed=no
                        [/status]
                    [/value]
                [/set_variables]

                [unstore_unit]
                    find_vacant=no
                    variable=this_item
                [/unstore_unit]
            [/do]
        [/foreach]

        {CLEAR_VARIABLE side1_store}

        [hide_unit][/hide_unit]

        {RED_SCREEN}

        [terrain_mask]
            x,y=1,1
            border=yes
            {MASK 09_The_Triad_part_2_1.mask}
        [/terrain_mask]

        [random_placement]
            [filter_location]
                x=16-23
                y= 5-10
                [not]
                    x,y=$location.x,$location.y
                [/not]
                [not]
                    terrain=X*,X*^*,*^X* # neither hive cells nor impassable overlay yeah
                [/not]
            [/filter_location]
            num_items=6
            variable=debris_loc
            min_distance=1
            allow_less=yes # just in case
            [command]
                {VARIABLE_RANDOM debris_image "castle-ruins,castle-ruins2,castle-ruins3"}

                [item]
                    x,y=$debris_loc.x,$debris_loc.y
                    image="scenery/$debris_image|.png"
                [/item]
            [/command]
        [/random_placement]

        {CLEAR_VARIABLE debris_loc,debris_image}

        [redraw][/redraw]

        {REPLACE_SCENARIO_MUSIC "silence.ogg"}

        [delay]
            time=100
        [/delay]

        [sound]
            name="explosion-big.ogg"
        [/sound]

        {CLEAR_CAVE_SHROUD (
            x,y=17,11
            radius=7
        )}

        [store_starting_location]
            side=2
        [/store_starting_location]

        {TT_AURA $location.x $location.y 0.8} # No redraw, see definition.

        {RESET_SCREEN}

        [unhide_unit][/unhide_unit]

        [redraw]
            side=1
        [/redraw]

        {QUAKE "cave-in.ogg"}

        [delay]
            time=500
        [/delay]

        #
        # Perform a regular non-warping scroll and display a character message
        # without scrolling. This is intentional.
        #

        [scroll_to]
            x,y=$location.x,$location.y
        [/scroll_to]

        [message]
            speaker=Mal Keshar
            scroll=no
            message= _ "What the—"
        [/message]

        [delay]
            time=750
        [/delay]

        [message]
            speaker=narrator
            image=wesnoth-icon.png
            message= _ "Amidst the smoke from the explosion, a pair of red glowing eyes could be seen..."
        [/message]

        [hidden_unit]
            [status]
                invulnerable=yes
            [/status]
            # wmllint: recognize Elyssa
            {CHARACTER_STATS_ELYSSA}
            canrecruit=yes
            side=2
            facing=s
            x,y=$location.x,$location.y
        [/hidden_unit]

        {TT_AURA_STEP $location.x $location.y 0.7}

        {TT_ELYSSA_STEP 0.2}

        [unhide_unit]
            id=Elyssa
        [/unhide_unit]

        {TT_FOG_STEP B}

        {TT_AURA_STEP $location.x $location.y 0.6}

        {TT_ELYSSA_STEP 0.4}

        {TT_AURA_STEP $location.x $location.y 0.5}

        {TT_ELYSSA_STEP 0.6}

        {TT_FOG_STEP C}

        {TT_AURA_STEP $location.x $location.y 0.4}

        {TT_ELYSSA_STEP 0.8}

        {REPLACE_SCENARIO_MUSIC ("vengeful.ogg")}

        {TT_AURA_STEP $location.x $location.y 0.3}

        {TT_ELYSSA_RESET}

        {TT_FOG_STEP D}

        {TT_AURA_STEP $location.x $location.y 0.2}

        {TT_FOG_STEP E}

        {TT_AURA_STEP $location.x $location.y 0.1}

        {TT_FOG_STEP F}

        [remove_item]
            x,y=$location.x,$location.y
        [/remove_item]

        [redraw][/redraw]

        [delay]
            time=750
        [/delay]

        {TT_MOVE_UNIT Elyssa elyssa_strike_pos}

        {FACE_UNIT (id=Elyssa) (id=Elynia)}

        [message]
            speaker=Elyssa
            message= _ "You thought you could escape so easily, didn’t you? I have not forgotten what you did back then. How does it feel to be the ones at a disadvantage now?"
        [/message]

        [message]
            speaker=Galas
            message= _ "Elynia, Mal Keshar! Go! Now!"
        [/message]

        {TT_COND_MOVE_UNIT Galas galas_strike_pos}

        [message]
            speaker=Elynia
            message= _ "Galas, no!"
        [/message]

        # Galas strikes Elyssa once, then fails to strike her a second time

        [animate_attack]
            [filter]
                id=Elyssa
            [/filter]
            [filter_second]
                id=Galas
            [/filter_second]

            [filter_attack]
                range,name=melee,sword
            [/filter_attack]

            kill=no
            animate=yes
            amount=6
        [/animate_attack]

        [animate_attack]
            [filter]
                id=Elyssa
            [/filter]
            [filter_second]
                id=Galas
            [/filter_second]

            [filter_attack]
                range,name=melee,sword
            [/filter_attack]

            kill=no
            animate=yes
            amount=miss
        [/animate_attack]

        [delay]
            time=500
        [/delay]

        [message]
            speaker=Elyssa
            message= _ "Commendable effort, elf. Alas, not enough."
        [/message]

        # Elyssa strikes Galas once (non-lethally)

        [animate_attack]
            [filter]
                id=Galas
            [/filter]
            [filter_second]
                id=Elyssa
            [/filter_second]

            [filter_attack]
                range,name=melee,sword
            [/filter_attack]

            kill=no
            animate=yes
            amount=14
        [/animate_attack]

        # Elynia rushes to ensnare Elyssa and push her back to buy everyone time

        {TT_COND_MOVE_UNIT Elynia elynia_strike_pos}

        [animate_attack]
            [filter]
                id=Elyssa
            [/filter]
            [filter_second]
                id=Elynia
            [/filter_second]

            [filter_attack]
                range=ranged
                name=ensnare
            [/filter_attack]

            kill=no
            animate=yes
            amount=4
            slowed=yes
        [/animate_attack]

        [animate_attack]
            [filter]
                id=Elyssa
            [/filter]
            [filter_second]
                id=Elynia
            [/filter_second]

            [filter_attack]
                range=melee
                name=staff
            [/filter_attack]

            kill=no
            animate=yes
            amount=6
        [/animate_attack]

        {TT_ELYSSA_PUSH_BACK elyssa_pushback_pos}

        [redraw][/redraw]

        [delay]
            time=500
        [/delay]

        [message]
            speaker=Elyssa
            message= _ "It doesn’t have to be like this. Just give me the staff back and <b>I</b> will spare your life like you did with mine."
        [/message]

        [remove_shroud]
            x=1-11
            y=4-14
            [not]
                terrain=X*,*^X*
            [/not]
            side=1
        [/remove_shroud]

        [redraw][/redraw]

        {HIGHLIGHT_IMAGE 1 7 "items/gohere.png" ()}

        [message]
            speaker=Mal Keshar
            scroll=no
            message= _ "Over there! Follow the track, quick!"
        [/message]

        {FACE_UNIT (id=Mal Keshar) (id=Elyssa)}

        # Surround Elyssa with disposable undead recruits

        [store_locations]
            [filter_adjacent_location]
                location_id=elyssa_pushback_pos
            [/filter_adjacent_location]
            [not]
                terrain=X*,*^X*,Q*,*^Q*
            [/not]
            variable=spawn_locs
        [/store_locations]

        [foreach]
            array=spawn_locs
            variable=loc
            [do]
                [store_direction]
                    from_x,from_y=$loc.x,$loc.y
                    [to]
                        [filter]
                            id=Elyssa
                        [/filter]
                    [/to]
                [/store_direction]

                {RANDOM "Draug,Banebow,Bone Shooter,Bone Shooter,Revenant,Skeleton,Skeleton Archer"}

                [animate_unit]
                    [filter]
                        id=Mal Keshar
                    [/filter]
                    flag=void_recruiting
                [/animate_unit]

                [unit]
                    x,y=$loc.x,$loc.y
                    type=$random
                    facing=$direction
                    side=1
                    animate=yes
                    placement=map
                    passable=yes
                    [modifications]
                        {TRAIT_LOYAL}
                    [/modifications]
                [/unit]
            [/do]
        [/foreach]

        {CLEAR_VARIABLE spawn_locs,random,direction}

        {FACE_DIRECTION (id=Galas,Elynia,Mal Keshar) nw}

        {TT_COND_MOVE_UNIT (Mal Keshar) malin_getaway_pos}

        {TT_COND_MOVE_UNIT (Galas)      galas_getaway_pos}

        {TT_COND_MOVE_UNIT (Elynia)     elynia_getaway_pos}

        {CLEAR_CAVE_SHROUD (
            x=0-2
            y=6-7
        )}

        [redraw][/redraw]

        {OBJECTIVES (
            victory_string= _ "Current Objectives:"
            {OBJECTIVE_VICTORY ( _ "Follow the underground rail and locate an exit")}

            {OBJECTIVE_DEFEAT  ( _ "Death of Galas")}
            {OBJECTIVE_DEFEAT  ( _ "Death of Elynia")}
            {OBJECTIVE_DEFEAT  ( _ "Death of Mal Keshar")}

            {TURNS_RUN_OUT}

            {NO_UNIT_CARRYOVER_NOTE}
        )}

        {UNLOCK_VIEW}

        [end_turn][/end_turn]
    [/event]

    [event]
        name=moveto
        [filter]
            side=1
            x=1
            y=6-8
            id=Elynia,Galas,Mal Keshar
        [/filter]

        {ENDLEVEL_QUIET}
    [/event]

    [event]
        name=victory
        [kill]
            side=1
            {NOT_ON_RECALL_LIST}
            [not]
                id=Elynia
                [or]
                    id=Galas
                [/or]
                [or]
                    id=Mal Keshar
                [/or]
            [/not]
            fire_event=no
            animate=no
        [/kill]
    [/event]

    [event]
        name=time over

        [message]
            speaker=Mal Keshar
            message= _ "There are more of those biomechanical creatures pursuing us now. Oh, well, this entire plan was doomed to failure from the very beginning — I don’t know what I was thinking!"
        [/message]
    [/event]

#undef TT_REMOVE_SHROUD
#undef TT_FOG_STEP
#undef TT_AURA
#undef TT_AURA_STEP
#undef TT_ELYSSA_STEP
#undef TT_ELYSSA_RESET
[/scenario]
