#textdomain wesnoth-After_the_Storm

[scenario]
    {NAIA_SCENARIO 01_The_Skirmish E1S1 ( _ "The Skirmish")}

    {MAP 01_The_Skirmish.map}
    {TURNS 23 22 21}
    next_scenario=02_High_Pass

    {Z_DEATHS}

    {SCENARIO_MUSIC "knolls.ogg"} {CONTINUE_PLAYING_STORY_MUSIC_FIRST}

    {STORYTXT_INIT_WARNING}
    {STORYTXT_THE_SKIRMISH}

    {DUSK2}
    {LONGDARK1}
    {LONGDARK2}
    {LONGDARK3}
    {LONGDARK4}
    {DAWN1}
    {MORNING1}
    {MIDDAY1}
    {AFTERNOON1}
    {DUSK1}
    {SHORTDARK}
    {DAWN2}
    {MORNING2}
    {MIDDAY2}
    {AFTERNOON2}

    {AMLA_MENU_HINT}

    # wmllint: validate-off
    [side]
        side=1
        controller=human
        save_id=player
        recruit=Skeleton, Skeleton Archer, Walking Corpse, Faerie Sprite
        {GOLD 140 130 120}
        team_name=good
        user_team_name= _ "team_name^Galas"

        # wmllint: recognize Galas
        {CHARACTER_STATS_GALAS}
        facing=ne
    [/side]
    # wmllint: validate-on

    [side]
        side=2
        recruit=Peasant, Woodsman, Spearman, Bowman, Footpad, Ruffian
        {GOLD 80 70 60}
        team_name=good
        user_team_name= _ "team_name^Townsmen"
        {ARAGWAITH_FLAG}

        {ai/aliases/stable_singleplayer.cfg}
        [ai]
            {AI_SIMPLE_ALWAYS_ASPECT grouping            no}
            {AI_SIMPLE_ALWAYS_ASPECT passive_leader      yes}
            {AI_SIMPLE_ALWAYS_ASPECT recruitment_pattern "archer,fighter,archer,scout"}
        [/ai]

        type=Lieutenant
        id=Morzey
        name= _ "Morzey"
        canrecruit=yes
        unrenamable=yes
        facing=ne
        [modifications]
            {TRAIT_QUICK}
            {TRAIT_STRONG}
        [/modifications]

        # South guardians
        [unit]
            type=Spearman
            name= _ "Cefin"
            x,y=12,26
            facing=se
            role=guard_1
            ai_special=guardian
            [modifications]
                {TRAIT_STRONG}
                {TRAIT_QUICK}
            [/modifications]
        [/unit]
        [unit]
            type=Longbowman
            name= _ "Islwyn"
            x,y=15,28
            facing=sw
            role=guard_2
            ai_special=guardian
            [modifications]
                {TRAIT_RESILIENT}
                {TRAIT_INTELLIGENT}
            [/modifications]
        [/unit]
        [unit]
            type=Peasant
            name= _ "Vaughan"
            x,y=10,25
            facing=s
            role=guard_3
            ai_special=guardian
            [modifications]
                {TRAIT_STRONG}
                {TRAIT_SLOW}
            [/modifications]
        [/unit]
        [unit]
            type=Peasant
            x,y=14,29
            facing=sw
            generate_name=yes
            random_traits=yes
            role=guard_4
            ai_special=guardian
        [/unit]

        # North guardians
        [unit]
            type=Woodsman
            x,y=10,20
            facing=n
            generate_name=yes
            random_traits=yes
            role=guard_5
            ai_special=guardian
        [/unit]
        [unit]
            type=Javelineer
            name= _ "Rhodri"
            x,y=12,19
            facing=ne
            role=guard_6
            ai_special=guardian
            [modifications]
                {TRAIT_QUICK}
                {TRAIT_RESILIENT}
            [/modifications]
        [/unit]
        [unit]
            type=Spearman
            x,y=16,18
            facing=nw
            generate_name=yes
            random_traits=yes
            role=guard_7
            ai_special=guardian
        [/unit]
        [unit]
            type=Peasant
            x,y=20,19
            facing=n
            generate_name=yes
            random_traits=yes
            role=guard_8
            ai_special=guardian
        [/unit]
        [unit]
            type=Spearman
            x,y=23,25
            facing=se
            generate_name=yes
            random_traits=yes
            role=guard_9
            ai_special=guardian
        [/unit]
    [/side]

    [side]
        side=3
        recruit=Chaos Invoker, Chaos Invader, Chaos Headhunter
        {GOLD 260 290 320}
        {INCOME 4 5 5}
        team_name=evil
        user_team_name= _ "team_name^Enemies"
        {CHAOS_FLAG}

        {ai/aliases/stable_singleplayer.cfg}
        [ai]
            #
            # These bastards know about Galas et al.
            #
            [goal]
                [criteria]
                    id=Elynia
                [/criteria]
                value=15.0 # and want to get revenge on Elynia
            [/goal]
            [goal]
                [criteria]
                    id=Galas
                [/criteria]
                value=10.0
            [/goal]
            [goal]
                [criteria]
                    id=Mal Keshar
                [/criteria]
                value=12.5
            [/goal]

            {AI_SIMPLE_ALWAYS_ASPECT aggression          1.0}
            {AI_SIMPLE_ALWAYS_ASPECT caution             0.0}
            {AI_SIMPLE_ALWAYS_ASPECT recruitment_pattern "archer,archer,fighter,scout,fighter,scout"}
        [/ai]

        type=Chaos Magus
        id="Ilce'than"
        name= _ "Ilce’than"
        canrecruit=yes
        unrenamable=yes
        [modifications]
            {TRAIT_STRONG}
            {TRAIT_INTELLIGENT}
        [/modifications]
    [/side]

    {STARTING_VILLAGES 2 15}
    {STARTING_VILLAGES 3 6}

#define TS_MERGE_IFTU_STATS VAR_ID FROM_GLOBAL_VAR_ID
#arg DEFAULT_AMLAS
#endarg
    {READ_GLOBAL_INTO_VARIABLE {FROM_GLOBAL_VAR_ID} temp_iftu_unit_store NAMESPACE={PERSISTENT_NS_IFTU}}

    [if]
        {VARIABLE_ARRAY_NOT_EMPTY temp_iftu_unit_store}
        [then]
            [set_variables]
                name=temp_iftu_unit_store
                mode=merge
                [value]
                    # NOTE: this would be a great place to reset attacks and moves,
                    # but for now we're assuming IftU S24 gives us units at rest to
                    # make our lives easier.
                    x=${VAR_ID}.x
                    y=${VAR_ID}.y
                    facing=${VAR_ID}.facing
                [/value]
            [/set_variables]

            [set_variables]
                name={VAR_ID}
                mode=replace
                to_variable=temp_iftu_unit_store
            [/set_variables]
        [/then]
        [else]
            # HACK: Temporarily bring the unit back into existence
            [unstore_unit]
                variable={VAR_ID}
            [/unstore_unit]

            [apply_amlas]
                id=${VAR_ID}.id

                {DEFAULT_AMLAS}
            [/apply_amlas]

            [store_unit]
                [filter]
                    id=${VAR_ID}.id
                [/filter]
                kill=yes
                variable={VAR_ID}
            [/store_unit]
        [/else]
    [/if]

    {CLEAR_VARIABLE temp_iftu_unit_store}
#enddef

#define TS_GALAS_MINIMUM_AMLAS
    # These are the bare-minimum AMLAs Galas needs to attain proper stats for
    # lvl 4 if his data from IftU is missing. The rest is up to the player.

    amla_ids=amla_galas_promotion_l2,amla_galas_promotion_l3,amla_galas_promotion_l4,amla_galas_swordsmanship_l1,amla_galas_swordsmanship_l2,amla_galas_swordsmanship_l3,amla_galas_archery_l1,amla_galas_archery_l2
#enddef

    [event]
        name=prestart
        [teleport]
            [filter]
                id=Morzey
            [/filter]
            x,y=22,23
        [/teleport]

        [hide_unit]
            side=3
            canrecruit=yes
            [or]
                id=Morzey
            [/or]
        [/hide_unit]

        [capture_village]
            x,y=20,1
            side=3
        [/capture_village]

        [capture_village]
            x,y=35,16
            side=2
        [/capture_village]

        [capture_village]
            x,y=37,17
            side=2
        [/capture_village]

        {OBJECTIVES (
            {OBJECTIVE_VICTORY ( _ "Defeat the enemy leader")}

            {OBJECTIVE_DEFEAT  ( _ "Death of Galas")}
            {OBJECTIVE_DEFEAT  ( _ "Death of Elynia")}
            {OBJECTIVE_DEFEAT  ( _ "Death of Mal Keshar")}
            {OBJECTIVE_DEFEAT  ( _ "Death of Morzey")}

            {TURNS_RUN_OUT}

            {OBJECTIVE_CARRYOVER}
        )}

        [store_unit]
            [filter]
                id=Galas
            [/filter]
            kill=yes
            variable=galas_store
        [/store_unit]

        # wmllint: recognize Elynia
        [unit]
            {CHARACTER_STATS_ELYNIA}
            facing=ne
            side,x,y=1,10,29
            to_variable=elynia_store
        [/unit]

        # wmllint: recognize Mal Keshar
        [unit]
            {CHARACTER_STATS_MAL_KESHAR}
            facing=ne
            side,x,y=1,8,28
            to_variable=malin_store
        [/unit]

        # Use these two's stats wholesale (will include items and AMLAs)
        {TS_MERGE_IFTU_STATS galas_store ending_stats_galas DEFAULT_AMLAS={TS_GALAS_MINIMUM_AMLAS}}
        {TS_MERGE_IFTU_STATS malin_store ending_stats_malin}

        # Galas may need to have his TC modification reapplied, if imported from
        # IftU (where he has no such modification)
        [if]
            {VARIABLE_ARRAY_NOT_EMPTY galas_store.modifications.object}
            {VARIABLE_LEXICAL_EQUALS galas_store.modifications.object[0].effect[0].apply_to "image_mod"}
            {VARIABLE_LEXICAL_EQUALS galas_store.modifications.object[0].effect[0].add "RC(magenta>brown)"}
            [else]
                [set_variables]
                    name=galas_store.modifications.object[0]
                    mode=insert
                    [literal]
                        [effect]
                            apply_to=image_mod
                            add=RC(magenta>brown)
                        [/effect]
                    [/literal]
                [/set_variables]
            [/else]
        [/if]

        # We ignore Elynia's final stats because her IftU epilogue and AtS
        # prologue unit types are incompatible. Instead give her XP.
        {READ_GLOBAL_INTO_VARIABLE ending_stats_elynia elynia_iftu_store NAMESPACE={PERSISTENT_NS_IFTU}}
        [if]
            {VARIABLE_ARRAY_NOT_EMPTY elynia_iftu_store}
            [then]
                {VARIABLE elynia_store.experience "$(min(
                    $elynia_store.max_experience - 1,
                    round(100 * $elynia_iftu_store.experience / $elynia_iftu_store.max_experience)
                ))"}

                {CLEAR_VARIABLE elynia_iftu_store}
            [/then]
            [else]
                {VARIABLE elynia_store.experience {DIFF 26 18 8}}
            [/else]
        [/if]

        # Igor doesn't need merging as he will be missing by default
        {READ_GLOBAL_INTO_VARIABLE ending_stats_igor igor_store NAMESPACE={PERSISTENT_NS_IFTU}}
    [/event]

    [event]
        name=start

        {LOCK_VIEW}

        [message]
            role=guard_1
            message= _ "Night falls... The scouts reported at midday that those accursed soldiers of Uria were headed towards our town. It’s going to be a very long night waiting for them to arrive."
        [/message]
        [message]
            role=guard_2
            # wmllint: local spelling Tyannes
            message= _ "Assuming they don’t somehow make it here sooner than that. Sigh... It wasn’t enough for them to burn and ransack Tyannes. Damn it, why don’t the elders send us reinforcements?"
        [/message]
        [message]
            role=guard_1
            # wmllint: local spelling Meh
            message= _ "Meh. Ever since this war started they have cared little about safety — not just ours. It’s rumored that the country itself would fare very poorly against another foreign invasion."
        [/message]
        [message]
            role=guard_2
            message= _ "Well, I’ve heard that the elves have..."
        [/message]
        [message]
            role=guard_3
            message= _ "On guard! Three strangers approach from the southern road!"
        [/message]

        [move_unit_fake]
            side=1
            type=$galas_store.type
            image_mods="RC(magenta>brown)"
            x=6 ,9
            y=30,29
        [/move_unit_fake]
        [unstore_unit]
            variable=galas_store
        [/unstore_unit]

        [move_unit_fake]
            side=1
            type=$elynia_store.type
            x=6 ,10
            y=30,29
        [/move_unit_fake]
        [unstore_unit]
            variable=elynia_store
        [/unstore_unit]

        [message]
            role=guard_1
            message= _ "Halt there! Identify yourselves, strangers!"
        [/message]
        [message]
            speaker=Galas
            message= _ "We are travelers. We don’t plan to stay in your town for more than one night. You don’t need to know who we are."
        [/message]
        [message]
            role=guard_2
            message= _ "Sorry, but we were ordered not to let anybody... pass... She’s... beautiful."
        [/message]
        [message]
            role=guard_3
            # wmllint: local spelling Wh
            message= _ "A faerie? Wh— what’s one of your kind doing so far from the northern lands?"
        [/message]
        [message]
            speaker=Galas
            message= _ "As I said, we don’t plan to stay for more than one night. Just let us in."
        [/message]

        [move_unit_fake]
            side=1
            type=$malin_store.type
            x=6 ,8
            y=30,28
        [/move_unit_fake]
        [unstore_unit]
            variable=malin_store
        [/unstore_unit]

        [message]
            role=guard_1
            message= _ "Who is that? Hey, the cloaked one!"
        [/message]
        [message]
            speaker=Mal Keshar
            message= _ "Eh?"
        [/message]
        [message]
            role=guard_1
            message= _ "Aaah!! Necromancer!" # wmllint: no spellcheck
        [/message]
        [message]
            role=guard_3
            message= _ "Quick! Alert the—"
        [/message]
        [message]
            speaker=Elynia
            message= _ "You are not alerting the entire town of his presence, are you? Such a handsome man could spend the night doing... more worthwhile things than fighting us..."
        [/message]
        [message]
            role=guard_3
            message= _ "Erm... I..."
        [/message]
        [message]
            role=guard_1
            message= _ "I don’t know what the hell your purpose here is, but we do have important things to do this night, such as defending the town from your cursed henchmen!"
        [/message]
        [message]
            speaker=Galas
            message= _ "Henchmen? Do you see anyone else accompanying us? No? Well, then."
        [/message]

        {MOVE_UNIT (id=Galas) 11 28}

        [message]
            role=guard_1
            message= _"Eh! That you don’t <i>seem</i> to bring anyone with you does not mean you cannot somehow summon them later! We heard rumors of the infernal warriors coming to our valley!"
        [/message]

        [message]
            speaker=Galas
            message= _ "Infernal, you say?"
        [/message]

        [unhide_unit]
            id=Morzey
        [/unhide_unit]

        {MOVE_UNIT id=Morzey 21 23}
        {FACE_UNIT id=Morzey id=Galas}

        [message]
            speaker=Mal Keshar
            message= _ "Clad in black armor, bearing flags with impaled skulls at the top, and said to smell especially funny?"
        [/message]

        [message]
            speaker=Elynia
            message= _"Those are our enemies as well. We have had many encounters with them before. Perhaps we could be of help, <i>if</i> you would be so kind as to let us into the town."
        [/message]

        [message]
            speaker=Morzey
            message= _"Let them come in at once! We are in need of all the help we can get if we want to live another day."
        [/message]

        [message]
            role=guard_1
            message= _ "Yes, sir! As you command, sir!"
        [/message]

        [fade_out_music]
            duration=500
        [/fade_out_music]

        {FACE_UNIT role=guard_4 id=Morzey}
        {MOVE_UNIT (id=Galas)      (12,16,17,18) (27,25,26,25)}
        {FACE_UNIT role=guard_1 id=Morzey}
        {MOVE_UNIT (id=Mal Keshar) (12,16,17)    (27,25,26)}
        {FACE_UNIT role=guard_2 id=Morzey}
        {MOVE_UNIT (id=Elynia)     (12,16,17,18,19) (27,25,26,26,26)}

        {REPLACE_SCENARIO_MUSIC "a_land_of_adventure.ogg"}
        {APPEND_MUSIC           "knolls.ogg"}
        {APPEND_MUSIC           "loyalists.ogg"}

        [message]
            speaker=Morzey
            message= _"Strangers, please help us. I am sure the gate guards already told you of the situation..."
        [/message]

        [message]
            speaker=Galas
            message= _"Yes, they did."
        [/message]

        [message]
            speaker=Morzey
            message= _"Well, well. I have heard of necromancers helping the northern country’s cause, so I... suppose you can be trusted. Although, if you turn out to be working for our enemies we would be doomed either way. I beg of you to aid us in this battle; all we have left nowadays is the town militia, for which we can barely afford proper weapons."
        [/message]

        [message]
            speaker=Galas
            message= _"We’ll help you. Just don’t ask names."
        [/message]

        [message]
            speaker=Morzey
            message= _"That’s... a very dubious request..."
        [/message]

        [if]
            {VARIABLE_ARRAY_NOT_EMPTY igor_store}
            [then]
                [message]
                    speaker=Galas
                    message= _ "There is someone else coming with us. I hope you will not mind his presence here as well."
                [/message]

                [message]
                    speaker=Morzey
                    message= _ "Well, I..."
                [/message]

                [move_unit_fake]
                    type=$igor_store.type
                    x= 6,10,14,16
                    y=30,28,27,26
                [/move_unit_fake]

                {VARIABLE igor_store.facing ne}

                [unstore_unit]
                    variable=igor_store
                    x,y=16,26
                [/unstore_unit]

                # If coming from IftU, Igor is going to be full of items, some of which may not have been
                # intended to be carried over past IftU's finale segment (S21 through S24). We need to remove
                # those.

                [for]
                    array=igor_store.modifications.object
                    [do]
                        [if]
                            {VARIABLE_LEXICAL_IN
                                igor_store.modifications.object[$i].id
                                "arcane_shot_amulet,s21_strength_potion,s21_deftness_potion,revenant_ring"}
                            [then]
                                [remove_object]
                                    id=Igor
                                    object_id=$igor_store.modifications.object[$i].id
                                [/remove_object]
                            [/then]
                        [/if]
                    [/do]
                [/for]

                {CLEAR_VARIABLE igor_store}

                [message]
                    speaker=Morzey
                    message= _ "Ugh, a goblin? Riding a wolf? You cannot be serious! Your kind is not welcome around these parts after the poultry farmers’ guild incident."
                [/message]

                [message]
                    speaker=Igor
                    message= _ "No, no, no! I mean no harm! Just passing by with my friends, that’s all! Willow is also a very well behaved lady, you aren’t even gonna notice her presence."
                [/message]
            [/then]
        [/if]

        [unhide_unit]
            side=3
            canrecruit=yes
        [/unhide_unit]

        [message]
            role=guard_6
            # wmllint: local spelling wardrums
            message= _ "Sir! We’re receiving reports of enemy forces approaching from the northern hills!"
        [/message]

        [message]
            speaker=Morzey
            message= _"Blast it — we did not anticipate them arriving so soon! Everyone, to arms!"
        [/message]

        {CLEAR_VARIABLE galas_store,elynia_store,malin_store}

        {UNLOCK_VIEW}
    [/event]

    [event]
        name=die
        [filter]
            id="Morzey"
        [/filter]

        [message]
            speaker=Galas
            message= _ "We failed to protect the town..."
        [/message]

        {ENDLEVEL_DEFEAT}
    [/event]

    [event]
        name=last breath
        [filter]
            id="Ilce'than"
        [/filter]

        [message]
            speaker=unit
            message= _"Curse you, heretics! The Iron Council shall punish you for your deeds!"
        [/message]
    [/event]

    [event]
        name=die
        [filter]
            id="Ilce'than"
        [/filter]

        [message]
            speaker=Elynia
            message= _"I do not think so."
        [/message]
    [/event]

    [event]
        name=victory

        [message]
            speaker=Morzey
            message= _"We will be eternally thankful for your help, travelers! If there is anything we can do in return..."
        [/message]

        [message]
            speaker=Galas
            message= _"No problem; we just need provisions and directions for our journey to the northern country."
        [/message]

        [message]
            speaker=Morzey
            message= _"Traveling north, eh? There is a mountain pass to the northeast — it used to be a very accessible trading route before the war began. Nowadays it is plagued by dark cultists and their undead minions, and the Grand Council has done nothing to clean it up."
        [/message]

        [message]
            speaker=Elynia
            message= _"Thanks for the information, we may as well take that path then."
        [/message]

        [message]
            speaker=Morzey
            message= _"Are you sure?"
        [/message]

        [message]
            speaker=Mal Keshar
            message= _"We <i>control</i> the dead. We need not worry about them."
        [/message]
    [/event]

    [item]
        x,y=17,3
        image="scenery/signpost.png"
    [/item]

    [event]
        name=moveto
        first_time_only=yes
        [filter]
            side=1
            x,y=17,3
        [/filter]

        [redraw][/redraw]

        [allow_undo][/allow_undo]

        [message]
            speaker=narrator
            image="scenery/signpost.png"
            message= _"Sometimes, your loved ones must be willing to sacrifice their lives for a greater cause."
        [/message]
    [/event]

    [event]
        name=enemies defeated

        {ENDLEVEL_VICTORY yes}
    [/event]

    [event]
        name=time over
        [message]
            speaker=Elynia
            message= _ "Their reinforcements are here! There is no way we can keep the town from devastation at this point!"
        [/message]
    [/event]
[/scenario]

#undef TS_MERGE_IFTU_STATS
#undef TS_GALAS_MINIMUM_AMLAS
