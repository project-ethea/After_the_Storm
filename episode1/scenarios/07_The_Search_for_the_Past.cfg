    [event]
        name=preload
        first_time_only=no

        {@?
        (
            # WML tags used for setup/removal. All of them have their x, y keys
            # replaced with location_id.
            # NOTE: This might be a bit excessive. We could just hardcode the commands
            # in Lua instead of passing down WML.

            # Setup
            {ITEM_CRYSTAL_GLYPH_MESSAGE * *} # [item]
            {ITEM_GOAL                  * *} # [item]

            # Removal
            {ITEM_REMOVE_GOAL           * *} # [remove_item]
        )
        <<
            E1S7_LIBRARY_GLYPHS_SETUP_WML = {
                wml.parsed(wml.get_nth_child((...), "item", 1)),
                wml.parsed(wml.get_nth_child((...), "item", 2)),
            }

            for i = 1, #E1S7_LIBRARY_GLYPHS_SETUP_WML do
                E1S7_LIBRARY_GLYPHS_SETUP_WML[i].x = nil
                E1S7_LIBRARY_GLYPHS_SETUP_WML[i].y = nil
            end

            E1S7_LIBRARY_GLYPHS_REMOVE_WML = wml.parsed(wml.get_nth_child((...), "remove_item", 1))

            E1S7_LIBRARY_GLYPHS_REMOVE_WML.x = nil
            E1S7_LIBRARY_GLYPHS_REMOVE_WML.y = nil

            E1S7_LIBRARY_GLYPHS_ICON = wml.get_nth_child((...), "item", 1).image .. "~SCALE_SHARP(144,144)"
            --"items/crystal-glyph-message.png~SCALE_SHARP(144,144)"
            E1S7_LIBRARY_GLYPHS_INFO = {
                -- [1]: entry id; [2]: fragment id or "none"; [3]: triggered
                library_glyph1 = { "quenoth_glyph_verlissh",  "verlissh1", false },
                library_glyph2 = { "quenoth_glyph_verlissh",  "verlissh2", false },

                library_glyph3 = { "quenoth_glyph_merthiaal", "none",      false },

                library_glyph4 = { "quenoth_glyph_norsula",   "norsula1",  false },
                library_glyph5 = { "quenoth_glyph_norsula",   "norsula2",  false },
                library_glyph6 = { "quenoth_glyph_norsula",   "norsula3",  false },
            }

            -- Used by the glyphs' moveto event handler
            function e1s7_library_glyph_event(location_id)
                local glyph_info = E1S7_LIBRARY_GLYPHS_INFO[location_id] or wml.error(("e1s7 bad glyph location id %s"):format(location_id))
                local entry, fragment, triggered = table.unpack(glyph_info)

                if fragment == "none" then
                    fragment = nil
                end

                wesnoth.wml_actions.allow_undo {}
                wesnoth.wml_actions.show_world_lore {
                    entry    = entry,
                    fragment = fragment,
                    image    = E1S7_LIBRARY_GLYPHS_ICON,
                }

                -- NOTE: we unlock *after* showing the lore entry on purpose,
                -- don't merge this into the previous check

                if fragment == nil then
                    wesnoth.wml_actions.unlock_milestone {
                        milestone = entry,
                    }
                else
                    wesnoth.wml_actions.record_lore_fragment {
                        entry     = entry,
                        fragment  = fragment,
                    }
                end

                if not triggered then
                    E1S7_LIBRARY_GLYPHS_INFO[location_id][3] = true

                    local cfg = E1S7_LIBRARY_GLYPHS_REMOVE_WML
                    cfg.location_id = location_id

                    wesnoth.wml_actions.remove_item(cfg)
                end

                wesnoth.wml_actions.fire_event { id = "check_glyphs" }
            end

            -- Used by WML later in [filter_condition]
            function e1s7_all_library_glyphs_triggered()
                for _, glyph_info in ipairs(E1S7_LIBRARY_GLYPHS_INFO) do
                    if glyph_info[3] == false then
                        return false
                    end
                end

                return true
            end
        >>}
    [/event]

    [event]
        name=prestart

        {@ <<
            local T = wml.tag

            function e1s7_library_glyph_setup(location_id)
                local glyph_info = E1S7_LIBRARY_GLYPHS_INFO[location_id] or wml.error(("e1s7 bad glyph location id %s"):format(location_id))

                for i = 1, #E1S7_LIBRARY_GLYPHS_SETUP_WML do
                    local cfg = E1S7_LIBRARY_GLYPHS_SETUP_WML[i]
                    cfg.location_id = location_id
                    wesnoth.wml_actions.item(cfg)
                end
            end

            for location_id, _ in pairs(E1S7_LIBRARY_GLYPHS_INFO) do
                e1s7_library_glyph_setup(location_id)

                wesnoth.wml_actions.event {
                    -- debug aid only; no functionality depends on the event ids
                    id = ("library_glyph_event:%s"):format(location_id),
                    name = "moveto",
                    first_time_only = false,
                    T.filter {
                        side = 1,
                        T.filter_location {
                            location_id = location_id
                        }
                    },

                    T.lua {
                        code = ("e1s7_library_glyph_event('%s')"):format(location_id)
                    }
                }
            end
        >>}
    [/event]

    # Victory condition. This check is triggered by glyph events.
    [event]
        id=check_glyphs
        [filter_condition]
            {@ << return e1s7_all_library_glyphs_triggered >>}
            {VARIABLE_BOOLEAN_EQUALS spell_glyph_triggered yes}
        [/filter_condition]

        {ENDLEVEL_VICTORY no}
    [/event]

