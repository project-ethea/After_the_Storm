        # Grab all tiles south of the flag E border (inclusive) and define a
        # time area with a greater chaotic bonus

        [store_locations]
            terrain=*^&E
        [/store_locations]

        {VARIABLE last_loc "$($location.length - 1)"}

        [for]
            start,end=0,$last_loc
            [do]
                [store_locations]
                    x,y=$location[$i].x,$location[$i].y|-1000
                    mode=append
                [/store_locations]
            [/do]
        [/for]

        [time_area]
            id=deeper_underground
            find_in=location
            {DEEP_UNDERGROUND}
        [/time_area]

        {CLEAR_VARIABLE location,last_loc}

        {VARIABLE sighted_bats           0}
        # NOTE: This is currently only used as a flag as to whether to show the
        # help option in the context menu. Oh well.
        {VARIABLE detonation_count       0}
        {VARIABLE spell_glyph_triggered  yes}
    [/event]

    [event]
        name=start
        [message]
            speaker=Horo
            message= _ "I don’t like this place. It feels as if something is waiting to ambush us in the darkness."
        [/message]

        [message]
            speaker=Mal Keshar
            message= _ "Heh, darkness. These elves aren’t very smart after all. Why would they think that sending one of their sun-loving youths would be of any help to us?"
        [/message]

        [message]
            speaker=Kyara
            message= _ "Keep your mouth shut, decrepit lich! We are being <i>far</i> more lenient than anyone would be with those who deal with your unnatural minions and these filthy apes."
        [/message]

        [message]
            speaker=Horo
            message= _ "Who are you calling “filthy apes”, you..."
        [/message]

        [message]
            speaker=Galas
            message= _ "Calm down, everyone! If we are to explore these caverns, we’ll need to stay together."
        [/message]

        [message]
            speaker=Kyara
            message= _ "What are you looking for? Some kind of artifact? Rocks? Spiders?"
        [/message]

        [message]
            speaker=Elynia
            message= _ "We believe these caves beneath the dark citadel may have once been used by our enemies. If that is the case, they may have left behind scrolls, artifacts, or anything else that could provide us with hints."
        [/message]

        [message]
            speaker=Galas
            message= _ "This is no time to fight amongst ourselves. Just stay alert and let us see what we can find."
        [/message]

        [message]
            speaker=Horo
            message= _ "We will help you as best we can, elf."
        [/message]
    [/event]

    [event]
        name=side 2 turn end
        first_time_only=no

        {FUNGI_SPAWNING 2 {DIFF 1 2 2}}
    [/event]

    [event]
        name=prestart
        # We synthetize individual events for the different explosion goal
        # locations so we don't need to keep track of whether each one has
        # been encountered yet.
        [for]
            start,end=1,2 # the 3rd goal is a special case ahndled by dialogue events
            [do]
                [event]
                    # debug aid only; no functionality relies on the event ids
                    id="goal$i|_stumble_event"
                    name=moveto
                    delayed_variable_substitution=no
                    [filter]
                        side=1
                    [/filter]
                    [filter_condition]
                        {LOCATION_IS_VISIBLE location_id="goal$i"}
                    [/filter_condition]

                    [store_locations]
                        location_id="goal$i"
                    [/store_locations]

                    [fire_event]
                        # Event will use and clear $location
                        name=boom_controller:stumble
                    [/fire_event]
                [/event]
            [/do]
        [/for]
    [/event]

    [event]
        name=boom_controller:stumble
        first_time_only=no

        [remove_shroud]
            side=1
            x,y=$location.x,$location.y
            radius=1
        [/remove_shroud]

        [redraw]
            side=1
        [/redraw]

        {HIGHLIGHT_IMAGE $location.x $location.y "items/gohere.png" ()}

        {CLEAR_VARIABLE location}
    [/event]

    # Yep, the tutorial comes second. Ideally we would perform the shroud
    # clear, then go through the tutorial, then highlight the goal hex. But
    # this approach makes the code easier to write...

    [event]
        name=boom_controller:stumble
        #first_time_only=yes

        [message]
            speaker=Elynia
            message= _ "Hmmm, at first glance this seems like a dead end, but those rocks over there seem like they might be concealing something. Galas, I believe we should have some explosives to spare still?"
        [/message]

        [message]
            speaker=Galas
            message= _ "What’s left should be more than enough to clear the rubble out of the way, but are you sure this isn’t horribly unsafe?"
        [/message]

        [message]
            speaker=Elynia
            message= _ "These tunnels seem very well built and have withstood the passage of time for centuries. I reckon it will take more than a few explosions to bring the ceiling down on us."
        [/message]

        [set_menu_item]
            id=wmi_mining_charge_help
            description= _ "Help: Using Charges"
            image="icons/menu-book.png"
            [show_if]
                {VARIABLE_NUMERICAL_LESS_THAN detonation_count 3}
            [/show_if]
            [command]
                [fire_event]
                    id=wme_mining_charge_help
                [/fire_event]
            [/command]
        [/set_menu_item]

        [fire_event]
            id=wme_mining_charge_help
        [/fire_event]
    [/event]

    [event]
        id=wme_mining_charge_help
        first_time_only=no

        {GAMEPLAY_INFO () ( _ "In this scenario, you will come across special marked locations where explosives can be set off in order to clear obstructions. Move <b>Galas</b>, <b>Elynia</b>, <b>Mal Keshar</b>, <b>Horo</b>, or <b>Kyara</b> to these locations in order to prime a barrel of explosives which will detonate at the start of next turn.

Beware that the ensuing explosion will <b>kill</b> any units within a one-hex radius, so you must ensure your unit has enough movement points left to move to a safe spot before deploying.")}
    [/event]

#define TS_PROSPECTORS
    Galas,Elynia,Mal Keshar,Horo,Kyara
#enddef

#define TS_CHARGE_ITEM
    image=items/barrel.png
#enddef

    [event]
        name=moveto
        first_time_only=no
        [filter]
            id={TS_PROSPECTORS}
            [filter_location]
                terrain=*^&A
            [/filter_location]
        [/filter]

        [set_variables]
            name=boom_location
            mode=replace
            [value]
                x,y=$x1,$y1
            [/value]
        [/set_variables]

        [remove_item]
            image=items/gohere.png
            x,y=$x1,$y1
        [/remove_item]

        [item]
            {TS_CHARGE_ITEM}
            x,y=$x1,$y1
        [/item]

        [message]
            speaker=unit
            message= _ "All set. Clear the area!"
        [/message]
    [/event]

    [event]
        name=new turn
        first_time_only=no
        [filter_condition]
            {VARIABLE_ARRAY_NOT_EMPTY boom_location}
        [/filter_condition]

        [scroll_to]
            x,y=$boom_location.x,$boom_location.y
        [/scroll_to]

        {RANDOM ({TS_PROSPECTORS})}

        [message]
            speaker=$random
            scroll=no
            message= _ "Fire in the hole!"
        [/message]

        [sound]
            name=fuse.ogg
        [/sound]

        [delay]
            time=3000
        [/delay]

        [screen_fade]
            red,green,blue,alpha=255,255,255,255
            duration=120
        [/screen_fade]

        # Select a contiguous chunk of ^&B tiles connected to the boom source
        # and terraform + add rubble

        [store_locations]
            x,y=$boom_location.x,$boom_location.y
            radius=4
            [filter_radius]
                terrain=*^&B
            [/filter_radius]
        [/store_locations]

        [foreach]
            array=location
            [do]
                {RANDOM castle-ruins,castle-ruins2,castle-ruins3}

                [item]
                    x,y=$this_item.x,$this_item.y
                    image="scenery/$random|.png"
                [/item]
            [/do]
        [/foreach]

        [terrain]
            find_in=location
            terrain=Ur^Es
        [/terrain]

        [remove_item]
            x,y=$boom_location.x,$boom_location.y
            {TS_CHARGE_ITEM}
        [/remove_item]

        {QUAKE "explosion-big.ogg"}

        [reset_fade][/reset_fade]

        # immediately update terrain and shroud maps, revealing the path ahead
        [redraw]
            side=1
        [/redraw]

        [harm_unit]
            [filter]
                x,y=$boom_location.x,$boom_location.y
                [or]
                    [filter_location]
                        [filter_adjacent_location]
                            x,y=$boom_location.x,$boom_location.y
                        [/filter_adjacent_location]
                    [/filter_location]
                [/or]
            [/filter]

            # No harm source unit or weapon given here, on purpose.

            delay=0
            amount=$this_unit.hitpoints
            # No animations played at this point, since they'd delay the sequence too much
            # in the worst case (six adjacent units)
            animate=no
            kill=yes
            fire_event=yes
        [/harm_unit]

        {VARIABLE_INC detonation_count}

        {CLEAR_VARIABLE boom_location,location,random}
    [/event]

    {FIRE_EVENT_ON_STUMBLE_UPON giant_spider (
        canrecruit=yes
        side=3
    )}

    [event]
        name=giant_spider

        [modify_side]
            side=3
            recruit=Fungoid
            {GOLD 28 30 32}
            income=4
        [/modify_side]

        [store_starting_location]
            side=4
        [/store_starting_location]

        [unit]
            x,y=$location.x,$location.y
            side=4
            canrecruit=yes
            type=Death Knight
            id=Firden
            name= _ "Firden"
            [modifications]
                {TRAIT_UNDEAD}
            [/modifications]
        [/unit]

        [modify_side]
            side=4
            recruit=Skeleton,Walking Corpse,Ghost
            {GOLD 100 125 150}
            {INCOME 4 5 6}
        [/modify_side]

        {CAPTURE_VILLAGES 4 $location.x $location.y 8}

        [capture_village]
            side=4
            x,y=31,17
        [/capture_village]

        [message]
            side,canrecruit=3,yes
            message= _ "<i>Hissssssss</i>" # wmllint: no spellcheck
        [/message]

