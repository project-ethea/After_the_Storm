        {RESET_UNIT_STATUSES (
            side=1
            [not]
                x,y=recall,recall
            [/not]
        )}

        [hide_unit][/hide_unit]

        {FADE_TO_BLACK}

        [fade_out_music][/fade_out_music]

        [scroll_to]
            x,y=19,41
            {WARP}
        [/scroll_to]

        [redraw][/redraw]

        {FADE_IN}

        # FIXME: This sequence actually unhides the units before we reach the
        # [unhide_unit] action.
        [teleport]
            [filter]
                id=Galas
            [/filter]
            x,y=16,39
        [/teleport]
        {FACE_DIRECTION (id=Galas) se}
        [teleport]
            [filter]
                id=Elynia
            [/filter]
            x,y=21,39
        [/teleport]
        {FACE_DIRECTION (id=Elynia) sw}
        [teleport]
            [filter]
                id=Mal Keshar
            [/filter]
            x,y=17,42
        [/teleport]
        {FACE_DIRECTION (id=Mal Keshar) ne}
        [teleport]
            [filter]
                id=Horo
            [/filter]
            x,y=22,41
        [/teleport]
        {FACE_DIRECTION (id=Horo) nw}
        [teleport]
            [filter]
                id=Kyara
            [/filter]
            x,y=20,42
        [/teleport]
        {FACE_DIRECTION (id=Kyara) nw}

        [unhide_unit][/unhide_unit]

        {REPLACE_SCENARIO_MUSIC "nunc_dimittis.ogg"}

        [redraw][/redraw]

        [delay]
            time=750
        [/delay]

        [message]
            speaker=Galas
            message= _ "There doesn’t seem to be much more to see here due to the lower levels being completely flooded. It’s really unfortunate."
        [/message]

        [message]
            speaker=Kyara
            # po: "Our priestesses won’t accept this truth." or something similarly terrifying.
            message= _ "What we have found here though, is... frightening, to say the least. We always thought that there was only Irdya, not this... nonsense. Our priestesses won’t... What— what do we do with this?!"
        [/message]

        [message]
            speaker=Mal Keshar
            message= _ "The ‘First’ is also described in the ruins of a hidden city beneath the Heart Mountains. It is said that he created ten powerful demons, the Original Ten. All this would imply that all elves and other faerie creatures are descended, or at least created in the image of this mysterious wielder of the Arcane Flame, sister of Uria and Yechnagoth, and one of the Original Ten."
        [/message]

        [message]
            speaker=Elynia
            message= _ "Eloh. That’s her name — a name that was seldom heard in my times, for nearly nothing was known for certain about her and the myths neglected explaining the origin of every other race on Irdya. I suppose that Zhangor’s influence upon Wesmere may have resulted in the reintroduction of that name to our kin’s lore. Regardless, even though linguistics are not my specialty, I suspect that’s still not her true name, much like the case of Yechnagoth."
        [/message]

        [message]
            speaker=Elynia
            message= _ "What you have learned here about all this... it would probably be best to keep it a secret for now, especially the allusions to other worlds. In these times when demons roam and spoil Irdya at will, realizing that they might be closely related to us, and that there might be even more awaiting out there... it could be devastating to our cultures. Perhaps after all this is over..."
        [/message]

        [message]
            speaker=Mal Keshar
            message= _ "<i>(snicker)</i> You said that Argan never intended to cause you any harm? All that we have found proves that he really wanted to destroy your kind after all! Using the powers of an ancient demon, no less!"
        [/message]

        [message]
            speaker=Elynia
            message= _ "I don’t believe that he did any of his plotting against elvenkind out of his own volition. He was... under Uria’s control."
        [/message]

        [message]
            speaker=Mal Keshar
            message= _ "So, have you forgotten what he said? “I guess I had this coming ever since then.” I know, his last words were very vague, but it certainly sounded like he was well aware of what he was doing the whole time. Perhaps you are right and it was not his intention to cause harm to <i>you</i> in particular, but the damage he caused throughout the continent, in the name of Uria, to the things you protect... did it not affect you emotionally? Furthermore, it seemed like Uria truly felt his loss. Would she have resented his death so much if he was a mere puppet like that old elf guy?"
        [/message]

        [delay]
            time=750
        [/delay]

        {MOVE_UNIT id=Elynia 20 40}

        [delay]
            time=250
        [/delay]

        {MOVE_UNIT id=Elynia 19 41}

        [delay]
            time=750
        [/delay]

        [message]
            speaker=narrator
            image=wesnoth-icon.png
            message= _ "Elynia slowly approached Mal Keshar with a grim expression in her eyes — neither the lich nor Galas had seen that much rage reflected in her before."
        [/message]

        [delay]
            time=250
        [/delay]

        {MOVE_UNIT id=Elynia 18 41}

        [delay]
            time=750
        [/delay]

        [message]
            speaker=Elynia
            message= _ "You know nothing."
        [/message]

        [message]
            speaker=Mal Keshar
            message= _ "I saw enough. I heard enough.

Whoever you loved so deeply back then is not who died at your hand."
        [/message]

        [delay]
            time=750
        [/delay]

        [message]
            speaker=Horo
            message= _ "<i>(nervously)</i> Er— I think we should return to the surface before we run out of provisions."
        [/message]

        [message]
            speaker=Galas
            message= _ "Elynia... if I’m not mistaken, we found a journal in the Heart, and you have kept it all this time with you, correct?"
        [/message]

        [delay]
            time=750
        [/delay]

        [message]
            speaker=Elynia
            message= _ "I... the elf who suggested that we take the journal, he was under Uria’s control, wasn’t he? It might not truly be Argan’s."
        [/message]

        [message]
            speaker=Galas
            message= _ "I am sure it is. I knew Lord Lédinor well enough, and I’m sure that was him speaking, not Uria. It was after we left Argan’s lair that his face and demeanor changed completely. No matter what Uria said, I’m certain that Lédinor was resisting her control just long enough so that he could help us, even though he must have known deep down that she would overpower him in the end.

We are descendants of Eloh, and as the Quenoth elves can attest, not even Yechnagoth’s mind control can work on us that easily. Like Argan before him, it seemed more like his body was infected by some kind of parasite."
        [/message]

        [delay]
            time=750
        [/delay]

        [message]
            speaker=Galas
            message= _ "I know you are probably hesitant about reading Argan’s journal because you fear to learn more about how he became the Emperor, and about the trail of destruction he left in his wake..."
        [/message]

        [delay]
            time=750
        [/delay]

        [message]
            speaker=Elynia
            message= _ "I..."
        [/message]

        [delay]
            time=750
        [/delay]

        [message]
            speaker=Mal Keshar
            message= _ "If you prefer, I could read it for you, and keep any details besides what is relevant to our quest from reaching anyone."
        [/message]

        [delay]
            time=750
        [/delay]

        [message]
            speaker=Elynia
            message= _ "<i>(with a calmer expression)</i> Very well. I trust you."
        [/message]

        [message]
            speaker=Mal Keshar
            message= _ "In the meantime, perhaps you could socialize with the locals or something. Perhaps try to have fun and smile? It really helps when you’ve lived for so long — I should be one to know. While you do that, I’ll be <i>killing</i> myself reading a damn book; I haven’t found any good reading material since the Fall, you know? It seems like everyone suddenly forgot how to read and write after the Wesnothians singlehandedly ended the world!"
        [/message]

        [message]
            speaker=Kyara
            message= _ "... You are already dead."
        [/message]
    [/event]

    [event]
        name=time over

        # I could not think of any good reason for the defeat on end-of-turns; the
        # baddies aren't going to invade Quenoth any time soon, but I can't let the
        # player milk income forever.

        [message]
            speaker=Horo
            message= _ "We have spent too much time in these caverns, and many of my men are starving. I’m sorry, but we’re resuming this expedition another time."
        [/message]

        [message]
            speaker=Elynia
            message= _ "<i>(furiously sighs, staring at the ceiling)</i> Why do we <b>always</b> have a time limit of some sort for everything we do?"
        [/message]
    [/event]

    [event]
        name=victory

        {CLEAR_VARIABLE sighted_bats,detonation_count,boom_location,spell_glyph_triggered}

        {REMOVE_MENU_ITEM wmi_mining_charge_help}
    [/event]
[/scenario]

