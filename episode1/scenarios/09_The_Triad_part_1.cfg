#textdomain wesnoth-After_the_Storm

[scenario]
    {NAIA_SCENARIO 09_The_Triad_part_1 E1S9 ( _ "The Triad — Part 1")}

    {MAP 09_The_Triad_part_1.map}
    turns=-1
    next_scenario="09_The_Triad_part_2"
    victory_when_enemies_defeated=no

    disallow_recall=yes

    {FULLSCREEN_CUTSCENE_UI}

    {A_DEATHS}

    {SCENARIO_MUSIC "the_dangerous_symphony.ogg"}

    {STORYTXT_THE_TRIAD}

    {INDOORS} {SCHEDULE_LIGHTING -30 -40 -20}

    # wmllint: validate-off

    [side]
        save_id=player

        controller=human
        side=1
        team_name=player
        user_team_name= _ "team_name^Galas"

        {NO_ECONOMY}

        # wmllint: recognize Galas
        {CHARACTER_STATS_GALAS}
    [/side]

    [side]
        side=2
        team_name=foe
        user_team_name= _ "team_name^Enemies"
        {CHAOS_FLAG}
        color=gold

        {NO_ECONOMY}

        canrecruit=yes
        # wmllint: recognize Elyssa
        {CHARACTER_STATS_ELYSSA}
        facing=sw
    [/side]

    [side]
        side=3
        team_name=foe
        user_team_name= _ "team_name^Enemies"
        {CHAOS_FLAG}

        {NO_ECONOMY}

        canrecruit=yes
        # wmllint: recognize Mal Kendria
        {CHARACTER_STATS_MAL_KENDRIA}
        facing=se
    [/side]

    [side]
        side=4
        team_name=foe
        user_team_name= _ "team_name^Enemies"
        {CHAOS_FLAG}

        {NO_ECONOMY}

        canrecruit=yes
        # wmllint: recognize Nar-hamoth
        {CHARACTER_STATS_NAR_HAMOTH}
        facing=sw
    [/side]

    [side]
        side=5
        team_name=foe
        user_team_name= _ "team_name^Enemies"
        {CHAOS_FLAG}

        {NO_ECONOMY}

        canrecruit=yes
        # wmllint: recognize Mal Hekuba
        {CHARACTER_STATS_MAL_HEKUBA}
        facing=sw
    [/side]

    [side]
        side=6
        team_name=foe
        user_team_name= _ "team_name^Enemies"
        {CHAOS_FLAG}
        hidden=yes

        no_leader=yes
        {NO_ECONOMY}
    [/side]

    [side]
        side=7
        team_name=foe
        user_team_name= _ "team_name^Enemies"
        {CHAOS_FLAG}
        hidden=yes

        no_leader=yes
        {NO_ECONOMY}
    [/side]

    [side]
        side=8
        team_name=foe
        user_team_name= _ "team_name^Enemies"
        {CHAOS_FLAG}
        hidden=yes

        no_leader=yes
        {NO_ECONOMY}
    [/side]

    # wmllint: validate-on

    {ANIMATED_BRAZIER 4  4 }

    {ANIMATED_BRAZIER 20 9 }

    {ANIMATED_BRAZIER 14 12}

    {ANIMATED_BRAZIER 4  10}

    {PLACE_IMAGE scenery/banner-uria-standing.png        10  3}
    {PLACE_IMAGE scenery/banner-yechnagoth-standing.png   9  4}
    {PLACE_IMAGE scenery/banner-uria-standing.png         8  4}
    {PLACE_IMAGE scenery/banner-yechnagoth-standing.png   7  5}

    {PLACE_IMAGE scenery/banner-uria-standing.png        20  8}
    {PLACE_IMAGE scenery/banner-yechnagoth-standing.png  19  9}
    {PLACE_IMAGE scenery/banner-uria-standing.png        18  9}
    {PLACE_IMAGE scenery/banner-yechnagoth-standing.png  17 10}

    {PLACE_IMAGE scenery/banner-uria-standing-sw.png        8  7}
    {PLACE_IMAGE scenery/banner-yechnagoth-standing-sw.png 13 10}

    {FORCE_CHANCE_TO_HIT (side=1) () 100 ({VARIABLE_NUMERICAL_EQUALS turn_number 1})}

    {CAVE_NOISE_SOUND_SOURCE}

    [event]
        name=prestart

        [item]
            x,y=15,6
            image="items/staff-elynia-niryone.png"
        [/item]

        [store_side]
            side=1
            variable=main_side1_stats
        [/store_side]

        [modify_side]
            side=1
            gold=0
        [/modify_side]

        [disallow_recruit]
            side=1
            type=$main_side1_stats.recruit
        [/disallow_recruit]

        {FACE_DIRECTION (id=Galas) ne}

        # wmllint: recognize Elynia

        [if]
            {VARIABLE_NUMERICAL_EQUALS elynia_store.length 0}
            [then]
                {RECALL_ELYNIA}

                [store_unit]
                    [filter]
                        id=Elynia
                    [/filter]
                    variable=elynia_store
                    kill=yes
                [/store_unit]
            [/then]
        [/if]

        [set_variables]
            name=elynia_store
            mode=merge
            [value]
                x,y=14,6
                hitpoints="$($elynia_store.max_hitpoints * 0.75)"
                facing=ne
            [/value]
        [/set_variables]

        [unstore_unit]
            variable=elynia_store
        [/unstore_unit]

        [object]
            [filter]
                id=Elynia
            [/filter]
            [effect]
                apply_to=variation
                name=chained
            [/effect]
            silent=yes
        [/object]

        #
        # Apparently the variation switch resets current HP.
        #
        {MODIFY_UNIT id=Elynia hitpoints $elynia_store.hitpoints}

        [unit]
            side=6
            type=Chaos Invader
            x,y=10,6
            facing=se
        [/unit]
        [unit]
            side=6
            type=Chaos Invader
            x,y=11,6
            facing=se
        [/unit]
        [unit]
            side=6
            type=Chaos Invader
            x,y=12,5
            facing=se
        [/unit]
        [unit]
            side=6
            type=Chaos Invader
            x,y=13,5
            facing=se
        [/unit]

        [unit]
            side=6
            type=Chaos Invader
            x,y=17,7
            facing=nw
        [/unit]
        [unit]
            side=6
            type=Chaos Invader
            x,y=16,7
            facing=nw
        [/unit]
        [unit]
            side=6
            type=Chaos Invader
            x,y=15,8
            facing=nw
        [/unit]
        [unit]
            side=6
            type=Chaos Invader
            x,y=14,8
            facing=nw
        [/unit]

        [unit]
            side=6
            type=Chaos Razerman
            x,y=12,7
            facing=ne
            id=Aethercyn
            name= _ "Aethercyn"
        [/unit]

        [unit]
            side=6
            type=Hell Guardian
            x,y=20,12
            facing=nw
        [/unit]

        [unit]
            side=6
            type=Doom Guard
            x,y=7,5
            facing=ne
        [/unit]

        [unit]
            side=6
            type=Chaos Invader
            x,y=4,6
            facing=se
        [/unit]
        [unit]
            side=6
            type=Chaos Invader
            x,y=14,10
            facing=nw
        [/unit]
        [unit]
            side=6
            type=Chaos Invader
            x,y=6,10
            facing=ne
        [/unit]
        [unit]
            side=6
            type=Chaos Invoker
            x,y=6,11
            facing=ne
        [/unit]
        [unit]
            side=6
            type=Chaos Magus
            x,y=19,9
            facing=nw
        [/unit]
        [unit]
            side=6
            type=Chaos Lorekeeper
            x,y=16,6
            facing=sw
        [/unit]

        [unit]
            side=6
            type=Chaos Invoker
            x,y=6,6
            facing=se
        [/unit]

        [unit]
            side=6
            type=Chaos Bowman
            x,y=17,11
            facing=nw
        [/unit]

        [store_unit]
            [filter]
                id=Elyssa
            [/filter]
            kill,variable=yes,elyssa_store
        [/store_unit]

        [store_locations]
            x=2,10,24,10
            y=7,13, 6, 1
            variable=shaxthal_spawns
        [/store_locations]

        [store_locations]
            x=   24,    1
            y=13-15,13-15
            variable=chaos_spawns
        [/store_locations]

        {LOCK_VIEW}
    [/event]

    [event]
        name=start
        [message]
            speaker=Elynia
            message= _ "Galas... you too..."
        [/message]

        [message]
            speaker=Mal Hekuba
            message= _ "Well done, Kendria. Well done."
        [/message]

        [message]
            speaker=Nar-hamoth
            # po: “master” here is feminine
            message= _ "I see that the little vermin fell into the master’s trap as expected. And they brought the Ruby of Fire with them! Ha, ha!"
        [/message]

        [message]
            speaker=Galas
            message= _ "What are you talking about..."
        [/message]

        [animate_attack]
            [filter]
                id=Galas
            [/filter]
            [filter_second]
                x,y=12,7
            [/filter_second]
            [filter_attack]
                range=melee
            [/filter_attack]
            kill=no
            animate=yes
            fire_event=no
            amount=13
            #experience=no
        [/animate_attack]

        [message]
            speaker=Nar-hamoth
            message= _ "Keep it shut, pathetic Irdyan rats! Were it up to me, we would have killed you all on sight, but our master greatly wanted to see your faces one last time."
        [/message]

        [message]
            speaker=Mal Hekuba
            message= _ "Temper your anger, my friend — after all, would it not be bad form to let their souls depart blissfully unaware of their mistake in bringing the artifact straight to us? Ha, ha!"
        [/message]

        [message]
            speaker=Elynia
            message= _ "You... don’t have... a master... We killed... him..."
        [/message]

        [move_unit_fake]
            side=$elyssa_store.side
            type=$elyssa_store.type
            x=23,22,21,20
            y= 1, 1, 2, 2
        [/move_unit_fake]

        [unstore_unit]
            variable=elyssa_store
        [/unstore_unit]

        {CLEAR_VARIABLE elyssa_store}

        [message]
            speaker=Elyssa
            message= _ "We have reserves, my dear."
        [/message]

        [delay]
            time=500
        [/delay]

        [message]
            speaker=Galas
            message= _ "You...?! We should have finished you off... when we had the chance..."
        [/message]

        [message]
            speaker=Elyssa
            message= _ "Had you done that, someone else would have taken Argan’s position in my stead — someone less generous, perhaps, like our brutish colleague over here. Do you not wish to hear the story I have to tell you as proof of my gratitude? I am fairly certain Elynia in particular would love to know more about the significance of the little trinket she’s been carelessly parading around for so many generations."
        [/message]

        [message]
            speaker=Elynia
            message= _ "..."
        [/message]

        [message]
            speaker=Elyssa
            message= _ "Irdya, like many other worlds, is littered with spatial anomalies that result in unstable pathways between them and Inferno. Long ago, it was decided that these breaches in our worlds should be guarded by very powerful demons to prevent unwanted contact. Think of it as a quarantine of sorts, established out of fear that the denizens of Inferno could interfere with the healing process that followed the First Cycle."
        [/message]

        [message]
            speaker=Elyssa
            message= _ "Alas, untold millennia ago, humans on this earth discovered that they could harness the forces of nature to overcome all sorts of challenges. Eventually they created a series of artifacts capable of building portals between locations on Irdya with ease. How, you may ask? My research never managed to uncover the specifics of the ritual, but all evidence points to them subduing some kind of dark god and using its blazing flesh and blood in the construction of these devices.

But they were mere replicas of an original — without contact with it, the power within them eventually faded away. Meanwhile, the original was thought lost in a bloody war between the descendants of its creators and uncultured barbarians."
        [/message]

        [message]
            speaker=Elyssa
            message= _ "I thought this sounded familiar. For the longest time I had been in search of a relic of the old empire, one whose history started with a similar event. Could they be one and the same? After all, few people ever came close to grasping the true nature of the Ruby of Fire before somebody ordered its destruction. Yet... it was never truly destroyed, was it?

My vast experience carrying out tasks for Uria gave me some familiarity with the power of the Gatekeepers, enough to identify it as its bearer unwittingly brought it before my eyes."
        [/message]

        [message]
            speaker=Elynia
            message= _ "..."
        [/message]

        [message]
            speaker=Elyssa
            message= _ "I could not believe my eyes — after wasting most of my original life trying to find it, the Ruby of Fire found <i>me</i> instead! Whoever would have thought that the staff that once belonged to the Enchantress Niryone of Wesmere had become a vessel of such ancient power! If only Argan had known about this — there would have been no need for us to trace the rifts created by Naia and her fallen sister in order to sustain our operations."
        [/message]

        [delay]
            time=750
        [/delay]

        [message]
            speaker=Nar-hamoth
            message= _ "Now that we have the artifact, we can use it to merge this pitiful world with Inferno..."
        [/message]

        [message]
            speaker=Mal Hekuba
            message= _ "... dispel the curse of Iluvia..."
        [/message]

        [message]
            speaker=Mal Kendria
            message= _ "... and reunite Uria and the other Guardians..."
        [/message]

        [message]
            speaker=Elyssa
            message= _ "... to restore the Initial Order."
        [/message]

        [move_unit]
            id=Elyssa
            to_x=15
            to_y=6
        [/move_unit]

        [delay]
            time=500
        [/delay]

        [remove_item]
            x,y=15,6
        [/remove_item]

        # HACK / FIXME
        # Wesnoth 1.18 does not let us revert to the base variation using
        # [effect] with a variation name of 'none' anymore, and [transform_unit]
        # is useless. We need to save Elyssa's previous version for use later
        # instead. </3
        [store_unit]
            [filter]
                id=Elyssa
            [/filter]
            variable=elyssa_store
        [/store_unit]

        [object]
            [filter]
                id=Elyssa
            [/filter]
            [effect]
                apply_to=variation
                name=e2s12_cutscene
            [/effect]
            silent=yes
        [/object]

        [redraw][/redraw]

        [delay]
            time=500
        [/delay]

        [set_variables]
            name=elyssa_store
            mode=merge
            [literal]
                x,y=16,5
            [/literal]
        [/set_variables]

        [move_unit]
            id=Elyssa
            to_x=$elyssa_store.x
            to_y=$elyssa_store.y
        [/move_unit]

        [message]
            speaker=Elyssa
            message= _ "Now this belongs to us."
        [/message]

        {FACE_DIRECTION (x,y=16,6) n}

        [message]
            speaker=Mal Kendria
            message= _ "At long last! The Ruby of Fire, in all its glory! May I borrow it for a second, my lady?"
        [/message]

        [sound]
            name=magic-dark-big.ogg
        [/sound]

        {PLAY_LEVELOUT_ANIM (x,y=16,6)}

        [kill]
            x,y=16,6
        [/kill]

        # wmllint: recognize Mal Keshar

        {RECALL_MAL_KESHAR_AT_LOCATION 16 6}

        {FACE_DIRECTION (id=Mal Keshar) n}

        {PLAY_LEVELIN_ANIM (id=Mal Keshar)}

        [redraw][/redraw]

        [delay]
            time=500
        [/delay]

        [message]
            speaker=Mal Keshar
            message= _ "This is not over yet!"
        [/message]

        [sound]
            name=magic-dark-big.ogg
        [/sound]

        [color_adjust]
            red,green,blue=67,67,67
        [/color_adjust]

        [color_adjust]
            red,green,blue=100,100,100
        [/color_adjust]

        [hide_unit][/hide_unit]

        [color_adjust]
            red,green,blue=500,500,500
        [/color_adjust]

#define TT_INFILTRATE X Y UNIT_ATTRS

    [kill]
        x,y={X},{Y}
    [/kill]

    [hidden_unit]
        {UNIT_ATTRS}
        x,y={X},{Y}
        side=1
        random_traits=yes
        generate_name=yes
        [modifications]
            {TRAIT_LOYAL}
        [/modifications]
    [/hidden_unit]
#enddef

