                with_bars=yes
                hits=hit
                flag=defend
            [/animate]
        [/animate_unit]

        {VARIABLE elyssa_store.hitpoints "$($elyssa_store.hitpoints - 26)"}

        # Revert Elyssa to her base variation
        [unstore_unit]
            variable=elyssa_store
            find_vacant=no
        [/unstore_unit]

        [item]
            x,y=15,6
            image="items/staff-elynia-niryone.png~FL(horiz)"
        [/item]

        {CLEAR_VARIABLE elyssa_store}

        {REPLACE_SCENARIO_MUSIC ("the_city_falls.ogg")}

        [message]
            speaker=Elyssa
            message= _ "AAAAAAAAAAH!" # wmllint: no spellcheck
        [/message]

#define TT_ELYSSA_STEP_BACK _TO_X _TO_Y
    [store_unit]
        [filter]
            id=Elyssa
        [/filter]
        variable=elyssa_store
        kill=yes
    [/store_unit]

    [move_unit_fake]
        type=$elyssa_store.type
        side=$elyssa_store.side
        # NOTE: this assumes that she will never get north-facing
        # frames.
        image_mods="FL(horiz)"
        x=$elyssa_store.x,{_TO_X}
        y=$elyssa_store.y,{_TO_Y}
    [/move_unit_fake]

    [set_variables]
        name=elyssa_store
        mode=merge
        [literal]
            facing=sw
            x={_TO_X}
            y={_TO_Y}
        [/literal]
    [/set_variables]

    [unstore_unit]
        variable=elyssa_store
    [/unstore_unit]

    {CLEAR_VARIABLE elyssa_store}
#enddef

        {TT_ELYSSA_STEP_BACK 17 5}

        [message]
            speaker=Elyssa
            message= _ "How did you—"
        [/message]

        [remove_item]
            x,y=15,6
        [/remove_item]

        [unstore_unit]
            variable=elynia_store
            find_vacant=no
        [/unstore_unit]

        {CLEAR_VARIABLE elynia_store}

        {TT_ELYSSA_STEP_BACK 19 4}

        {FACE_DIRECTION (id=Mal Kendria) sw}

        [message]
            speaker=Mal Kendria
            message= _ "Kill the intruders! Kill them all! NOW!"
        [/message]

        {TT_ELYSSA_STEP_BACK 20 2}

#undef TT_ELYSSA_STEP_BACK

        #
        # Protect the Triad leaders from the player.
        #

        [terrain]
            [and]
                terrain=*^&A
            [/and]
            terrain=^Xo
            layer=overlay
        [/terrain]

        {OBJECTIVES (
            {OBJECTIVE_VICTORY ( _ "Defeat all enemy leaders")}

            {OBJECTIVE_DEFEAT  ( _ "Death of Galas")}
            {OBJECTIVE_DEFEAT  ( _ "Death of Elynia")}
            {OBJECTIVE_DEFEAT  ( _ "Death of Mal Keshar")}
        )}

        {RESET_THEME}

        {UNLOCK_VIEW}
    [/event]

    [event]
        name=turn 2

        [message]
            speaker=Elyssa
            message= _ "By the power you have bestowed upon me, Uria, may the spells conferring life to the dead be canceled now!"
        [/message]

        {UNIT_SPELL_POPUP id=Elyssa _"dispel undead"}

        {FLASH_RED (
            [sound]
                name="lightning.ogg"
            [/sound]
            [sound]
                name="dragonstick.ogg"
            [/sound]
        )}

        [kill]
            race=undead
            side=1
            {NOT_ON_RECALL_LIST}
            [not]
                id=Mal Keshar
            [/not]
            animate=yes
            fire_event=yes
        [/kill]

        [harm_unit]
            [filter]
                id=Mal Keshar
            [/filter]
            kill=no
            animate=yes
            # 75% current HP damage
            amount="$($this_unit.hitpoints * 0.75)"
            [primary_attack]
                range=ranged
            [/primary_attack]
        [/harm_unit]

        [message]
            speaker=Mal Keshar
            message= _ "AGGGGGGGGGHHHHH!!!"
        [/message]

        [message]
            speaker=Elynia
            message= _ "What is this...?!"
        [/message]

        {MODIFY_UNIT id=Elyssa level 6}

        [message]
            speaker=Elyssa
            message= _ "Unbind the dust from this world and smite the unworthy descendants of Xia’el!"
        [/message]

        {UNIT_SPELL_POPUP id=Elyssa _"dispel faerie"}

        {FLASH_RED (
            [sound]
                name="lightning.ogg"
            [/sound]
            [sound]
                name="magic-dark-big.ogg"
            [/sound]
        )}

        [kill]
            race=faerie
            side=1
            {NOT_ON_RECALL_LIST}
            [not]
                id=Elynia
            [/not]
            animate=yes
            fire_event=yes
        [/kill]

        [harm_multiple_units]
            [filter]
                id=Galas,Elynia
            [/filter]
            kill=no
            animate=yes
            # Deal 40% max HP damage to Elynia, 30% max HP to Galas
            amount="$($this_unit.max_hitpoints * if('$this_unit.id' = 'Elynia', 0.40, 0.30))"
            [primary_attack]
                range=ranged
            [/primary_attack]
        [/harm_multiple_units]

        [message]
            speaker=Galas
            message= _ "This... is this the kind of powers possessed by Uria?!"
        [/message]

        [message]
            speaker=Mal Keshar
            message= _ "We need to get out of this place, quickly!"
        [/message]

        [message]
            speaker=Elyssa
            message= _ "Kendria, call upon our new weapon."
        [/message]

        [message]
            speaker=Mal Kendria
            message= _ "But we... we haven’t finished—"
        [/message]

        [store_unit]
            [filter]
                id=Elyssa
            [/filter]
            kill,variable=yes,elyssa_store
        [/store_unit]

        [move_unit_fake]
            side=$elyssa_store.side
            type=$elyssa_store.type
            x=20-21,22-23
            y=    2,    1
        [/move_unit_fake]

        {CLEAR_VARIABLE elyssa_store}

        [message]
            speaker=Mal Hekuba
            message= _ "Reinforcements! Don’t allow them to escape!"
        [/message]

        [move_unit_fake]
            type=Doom Guard
            x= 1, 2, 3
            y=14,13,13
            side=8
        [/move_unit_fake]

        [unit]
            side=8
            type=Doom Guard
            x,y=3,13
            facing=ne
        [/unit]

        [move_unit_fake]
            type=Chaos Magus
            x= 1, 2, 2
            y=14,13,12
            side=8
        [/move_unit_fake]

        [unit]
            side=8
            type=Chaos Magus
            x,y=2,12
            facing=ne
        [/unit]

        [move_unit_fake]
            type=Chaos Razerman
            x=24,19
            y=14,13
            side=8
        [/move_unit_fake]

        [unit]
            side=8
            type=Chaos Razerman
            x,y=19,13
            facing=nw
        [/unit]

        [move_unit_fake]
            type=Doom Guard
            x=24,19
            y=14,12
            side=8
        [/move_unit_fake]

        [unit]
            side=8
            type=Doom Guard
            x,y=19,12
            facing=nw
        [/unit]

        [store_unit]
            [filter]
                id=Mal Kendria
            [/filter]
            kill,variable=yes,kendyare_store
        [/store_unit]

        [move_unit_fake]
            side=$kendyare_store.side
            type=$kendyare_store.type
            gender=female
            x=18,19,20,23
            y= 2, 3, 2, 1
        [/move_unit_fake]

        {CLEAR_VARIABLE kendyare_store}

        {DOOR_TILES_TO_UNITS 8}

        {HIGHLIGHT_IMAGE 1 1 "items/gohere.png" ()}

        [message]
            speaker=Galas
            message= _ "That corridor is clear! It’s our only hope!"
        [/message]

        [modify_turns]
            value=6
        [/modify_turns]

        {OBJECTIVES (
            victory_string= _ "Current Objectives:"
            {OBJECTIVE_VICTORY ( _ "Move Galas, Elynia or Mal Keshar to the exit location")}

            {OBJECTIVE_DEFEAT  ( _ "Death of Galas")}
            {OBJECTIVE_DEFEAT  ( _ "Death of Elynia")}
            {OBJECTIVE_DEFEAT  ( _ "Death of Mal Keshar")}

            {TURNS_RUN_OUT}

            {NO_UNIT_CARRYOVER_NOTE}
        )}
    [/event]

    [event]
        name=side 2 turn end
        first_time_only=no
        [filter_condition]
            {VARIABLE_NUMERICAL_GREATER_THAN turn_number 1}
        [/filter_condition]

        [if]
            {VARIABLE_IS_EVEN turn_number}
            [then]
                {VARIABLE spawn_side 8}
                {VARIABLE spawn_types "Chaos Invoker,Chaos Invader,Chaos Invader,Chaos Soulhunter,Chaos Headhunter,Dark Knight,Doom Guard,Chaos Magus"}
                {VARIABLE_ARRAY_COPY locs chaos_spawns}
            [/then]
            [else]
                {VARIABLE spawn_side 2}
                {VARIABLE spawn_types "Shaxthal Drone,Shaxthal Drone,Shaxthal Runner Drone,Shaxthal Protector Drone,Shaxthal Assault Drone,Shaxthal Assault Drone"}
                {VARIABLE_ARRAY_COPY locs shaxthal_spawns}
            [/else]
        [/if]

        {VARIABLE_RANDOM spawn_count {DIFF 2..3 2..4 3..5}}

        [repeat]
            times=$spawn_count
            [do]
                # Somehow we tried to spawn too many units
                [if]
                    {VARIABLE_NUMERICAL_EQUALS locs.length 0}
                    [then]
                        [break][/break]
                    [/then]
                [/if]

                {VARIABLE_RANDOM spawn_type $spawn_types}
                {VARIABLE_RANDOM r          "0..$($locs.length - 1)"}

                [store_direction]
                    from_x,from_y=$locs[$r].x,$locs[$r].y
                    # map center, unlikely to change so we don't need store_map_dimensions
                    to_x,to_y=12,8
                [/store_direction]

                [unit]
                    animate=yes
                    side=$spawn_side
                    type=$spawn_type
                    random_traits=yes
                    generate_name=yes
                    random_gender=yes
                    x=$locs[$r].x
                    y=$locs[$r].y
                    facing=$direction
                    passable=yes
                [/unit]

                # Don't reuse the same location in this spawn cycle
                {CLEAR_VARIABLE locs[$r]}
            [/do]
        [/repeat]

        {CLEAR_VARIABLE spawn_side,spawn_types,spawn_type,spawn_count,locs,r,direction}
    [/event]

    [event]
        name=moveto
        [filter]
            x,y=1,1
            id=Galas,Elynia,Mal Keshar
        [/filter]

        {ENDLEVEL_QUIET}
    [/event]

    [event]
        name=victory
        [kill]
            side=1
            {NOT_ON_RECALL_LIST}
            [not]
                id=Elynia,Galas,Mal Keshar
            [/not]
            fire_event=no
            animate=no
        [/kill]

        {CLEAR_VARIABLE shaxthal_spawns,chaos_spawns}
    [/event]

    [event]
        name=time over

        [message]
            speaker=Mal Hekuba
            message= _ "More reinforcements! Strike down those heathens, now!"
        [/message]

        [message]
            speaker=Galas
            message= _ "We weren’t fast enough — now they are coming from that corridor as well!"
        [/message]
    [/event]
[/scenario]

