        [color_adjust]
            red,green,blue=33,33,33
        [/color_adjust]

        [color_adjust]
            red,green,blue=0,0,0
        [/color_adjust]

        [animate_unit]
            [filter]
                id=Mal Keshar
            [/filter]

            hits=hit
            with_bars=yes
            flag=attack
