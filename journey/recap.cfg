#textdomain wesnoth-After_the_Storm

[story_recap]
	id="IftU"
	title= _ "Invasion from the Unknown"
	text= _ "Long after the <b>Fall</b>, the last forest elves of Irdya living in the Valley of Elynia face a new threat hailing from unknown lands to the south. <b>Galas</b> and his patrol group successfully repel the outsiders, only for a larger host to arrive three days later and completely overpower the valley’s defenses. Much to the elves’ horror, the soldiers from the so-called <b>Chaos Empire</b> prove nigh unstoppable this time around, counting powerful otherwordly creatures amongst their ranks, an insatiable thirst for blood, and an unstoppable zeal for their wicked gods: <b>Uria</b> and <b>Yechnagoth</b>."

	[section]
		title= _ "I. Exodus"

		quote= _ "What won your victory was nothing else than the power of the Union, at hands of the Master of Darkness <i>and</i> the Lady of Light — a human and an elven lady."
		quote_author= _ "Mal Keshar"

		text= _ "Following a bloody battle at Telchior’s Hold, <b>Lord Lédinor</b>, Galas, and the elf enchantress <b>Anlindë</b> convene to figure out a way forward. Having run out of options that would not result in complete extinction of elvenkind at the hands of the Chaos Empire, Lord Lédinor chooses to stay behind and rally part of the remaining defense forces to mount a distraction; meanwhile, Galas is taked with leading a complete evacuation of the valley towards the northern desert.

In the middle of the evacuation, Galas and his forces run into a powerful lich from the times before the Fall by the name of <b>Mal Keshar</b>. The elves manage to subdue the necromancer, and while interrogating him Galas finds out more about the nature of the Chaos Empire’s forces, as well as certain events from the times of the Fall — in particular, about elvenkind’s previous victory against <b>demons</b> from <b>Inferno</b>. Mal Keshar recounts the story of the <b>Lady of Light</b> and the <b>Master of Darkness</b>, their triumph against the <b>Demon Lord</b>, and their long slumber in the depths of Irdya.

Ignoring his subordinates’ protests and Anlindë’s reluctance, Galas decides to trust the lich’s words and accept his promises of guiding the elves to the depths of the <b>Heart Mountains</b>, where the two legendary heroes lie dormant."
	[/section]

	[section]
		title= _ "II. Seeking the Light"

		quote= _ "Your sacrifice won’t be forgotten, and I swear that I will not rest until the last of our enemies is reduced to cinders on the ground."
		quote_author= _ "Elynia"

		text= _ "After a long and perilous journey across the desert — including a brief encounter with the forces of Chaos — the forest elves reach the mountain range and proceeded underground, where they find out that the forces of the <b>Chaos Warlord</b> have already arrived in search for the Lady of Light. Through sheer coincidence, Galas’s expedition force runs into the dwarves of <b>Herthgar</b> and forge an impromptu alliance to repel the invaders.

Upon meeting with <b>King Asthorgar</b> and the Runemaster <b>Althurin</b> at the dwarven capital, the group learn of the heroic deeds of <b>Kalehssar</b> of the <b>Quenoth</b> elves centuries before the Chaos invasion, including his travels across the sands in search for a new home for his people, his alliance with the dwarves of <b>Gnalvarden</b>, his voyage far into the Vast Sea and towards Zocthanol Isle, and his slaying of <b>Yechnagoth, the Eater of Souls</b>.

King Asthorgar warns Galas that although his people may find refuge in the surface lands of the Far North, he has no doubt that the Chaos Empire will eventually march towards them as well. Aware of the major risks they are about to face in their search for the two heroes, Galas opts to send the elves’ main host north under the leadership of <b>Lord Inodien</b>, while he and his companions proceed deeper underground with Althurin’s help.

In the deepest reaches of Irdya, Galas’s band finally find the resting place of the heroes. Inside, however, they only find and awaken one of them: <b>Elynia, the Lady of Light</b>. Following some initial confusion, the faerie explains that her lover <b>Argan, the Master of Darkness</b> died. After recounting the full story of the Fall and the <b>War of Wesmere</b> from her point of view, she reveals that Anlindë was in truth the sole surviving apostate from amongst the cultists who once served the <b>Demon Lord Zhangor</b> in Wesmere.

On the way back to the underground capital, the group run into the Chaos Warlord’s vanguard in the middle of their relentless siege. Aided by Elynia’s powers of Light and Mal Keshar’s undead soldiers, Galas’s group finally manage to break through and reach the king’s palace. With devastating losses on the dwarves’ side, King Asthorgar resolves to lead his people out of the infested caves. Fully aware that an emergency evacuation like this would likely result in the complete annihilation of Herthgar otherwise, and despite Galas’s attempts to change her mind, Anlindë assumes the last defense of the dwarven kingdom, hoping to stall for time while everyone else escapes to the Far North.

While King Asthorgar and Galas exit the caves, Anlindë finally comes face to face with the <b>biomechanical creature</b> known as the Chaos Warlord. Despite the elf even resorting to using Zhangor’s forbidden magic, the Chaos Warlord crushes her with ease. In a last-ditch attempt to defeat the creature, Anlindë brings the entire central section of the caves down, resulting in her own death; however, despite suffering various injuries, the Chaos Warlord survives and retreats back to the lands of the Empire in the south."
	[/section]
	[section]
		title= _ "III. Armageddon"

		quote= _ "Uria is a forgiving god, but there is little that can be done to remedy things when fools like you actively refuse to listen to her Voice."
		quote_author= _ "The Chaos Emperor"

		text= _ "In the Far North, Galas, Elynia, and Mal Keshar makes their way through the <b>Aragwaith country</b> and into their capital, <b>Raelthyn</b>, where they participate in the <b>Grand Council of the Northern Peoples</b> alongside Lord Inodien and Lady Unarye. In exchange for the elves being granted lands to settle in the country, Galas pledges his people’s allegiance to the Grand Council, including a formal declaration of war from the elves against the Chaos Empire, and their assistance in the war effort. As an additional condition imposed by the Council, the Lady of Light, Mal Keshar, and all necromancers under the latter’s tutelage are required to pledge unconditional allegiance to it while also renouncing the elves’ own leadership.

While on a diplomatic mission to secure an alliance with the orcish tribes before the Chaos Empire can do so themselves, Galas’s band runs into the lich <b>Mal Hekuba</b> from the <b>Iron Triad</b>, who attempts to manipulate Elynia into seeking the Emperor’s counsel regarding Argan’s fate. After repelling the lich’s forces, Elynia and Mal Keshar come to terms with Galas’s pact with the Grand Council and agree with his secret plan to infiltrate the Chaos Empire and take its leader down. Galas then delegates leadership of the elves of the Valley to Lord Inodien and Lady Unarye.

While leaving the northlands, Galas begins hearing an ominous voice in his head trying to instill doubt and fear into him. Shortly after, the group runs into Mal Hekuba a second time, who unsuccessfully attempts to bar their path before fleeing the battlefield again.

At the plains of Wesmere, the group explore the desolate ruins of the realm that were once Zhangor’s domain on Irdya. While the demon’s residual taint causes hallucinations and infighting amongst Galas’s group, the voice in the elf’s head grows louder and more forceful, revealing itself to be the Chaos Emperor trying to take control of his body in order to murder the Lady of Light. Galas manages to resist just long enough for Elynia to purge the darkness out of his body."
	[/section]
	[section]
		title= _ "IV. The Union"

		quote= _ "This is only the beginning, Lady of Light. The beginning of your downfall. Everything and everyone you hold dear shall perish in time."
		quote_author= _ "Uria"

		text= _ "Thanks to a chance encounter with a dwarven task force under Althurin’s command, Galas, Elynia, and Mal Keshar manage to mount an all-out offensive on the capital of the Chaos Empire, the Heart fortress. In the dungeon, they find an imprisoned and tortured <b>Lédinor</b>; after helping him back on his feet, Elynia privately reveals to Galas that the old elf might be infected with something that could allow the Emperor to control him like he attempted to do with Galas.

In the lower levels, they finally meet <b>Elyssa, the Chaos Warlord</b> — the <b>Fire of Uria</b> — who proceeds to subdue the trio and force them to flee deeper into a hive of biomechanical abominations deep under the fortress. Before encountering demoness a second time, Elynia convinces Mal Keshar to channel a great darkness coming from deep below to help her summon the <b>Union of Light and Darkness</b> — the same legendary power she and Argan once wielded against Zhangor. With the legendary power now on their side, the duo defeat Elyssa; however, Elynia has an unexpected change of heart before dealing the killing blow, and spares the creature’s life.

After crossing the gateway from Irdya into the frozen wastes of Inferno, the group fight their way into the Chaos Emperor’s lair, where they finally learn the truth that Elynia had suspected and concealed from them for a long time: the Chaos Emperor is none other than <b>Argan, the Master of Darkness</b> — the <b>Voice of Uria</b>. Despite her immense emotional turmoil upon seeing him turned into a biomechanical monster in service of evil, Elynia resolves to put an end to Argan’s dominion over Irdya and kill him, to which he responds in kind.

Although Elynia and Mal Keshar initially gain the upper hand against Argan’s minions by utilizing the power of the Union, the dark sorcerer levels the field by puppeteering the latter’s body, thus forcing Elynia to take him down and rendering her incapable of channeling the Union without approaching Argan up close. Despite Argan’s augmented body, Galas and Elynia manage to prevail over him. An enraged <b>Uria</b> resolves to take action, transforming Argan into a large misshapen beast, and assuming partial control of his body. Mal Keshar rejoins the fight in the nick of time, allowing the trio to fatally wound Argan; this results in the power of the Union splitting apart and abandoning both Argan’s and Elynia’s bodies.

While on his death throes, Argan apologizes to Elynia for somehow “allowing” Uria to become who she is now and for allowing her to control him. Powerless to do anything to bring her beloved back, the heartbroken faerie accepts Lédinor’s suggestion to take Argan’s journal right as the lair and its connection to Irdya begin to collapse. On their way out, Uria decides to strike yet again by using the infection in Lédinor’s body to transform him into another monster, who then Galas is forced to take down.

Some time after escaping the destruction of the Heart fortress, the trio decide to head back to the Far North to pay the forest elves a visit, with the intention of sailing towards Zocthanol Isle in search of answers regarding Uria and Yechnagoth."
	[/section]
[/story_recap]
