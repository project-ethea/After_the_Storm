[world_entry]
	id="quenoth_glyph_merthiaal"
	title= _ "The Eater of Souls"
	source=07_The_Search_for_the_Past
	requires_milestone=quenoth_glyph_merthiaal
	# po: Redacted: Xia'el, Yrathid
	# po: Note: Urvatha = Inferno. Uria is considered the mother of Inferno
	# po: in a strictly figurative sense.
	text= _ "According to some ancient legends of disputable origin, the <b>First</b> sculpted a <b>beautiful maiden</b> out of fine dust, ██████, and bestowed her control over the awesome power that flows through the veins of every one of her <b>faerie</b> descendants, including the elves of Irdya.

Those legends also tell of one of her siblings: <b>Merthiaal the Ashen One</b>, who owing to her bold actions would come to be known as the <b>Eater of Souls</b>. Even after a cycle has passed, the oldest races of Irdya and other worlds continue to remember her, and avoid mentioning her true name in conversation. If they must, they will speak of her as <b>‘Yechnagoth’</b>.

Now, Merthiaal fervently desired the First’s favor. Alas, no matter how hard she tried, someone with such an aching heart could not possibly manage to tame the <b>Aspect of Darkness</b>. She could never accept that the First only had eyes for the <b>wielder of the Arcane Flame</b>, and <b>Uria</b>, the Guardian who would come to be regarded as the <b>mother of Urvatha</b>.

As time went on, envy rooted deep within Merthiaal’s mind. In an attempt to prove her worth, she committed an <b>unspeakable sin</b> against the order of the Universe. Her control over Darkness was lost as a result. Her own world, ███████, was destroyed, along with <b>every soul</b> on it. Any further damage was only narrowly averted thanks to Uria’s timely intervention.

Merthiaal’s heart, soul, and memories were preserved through eons, but her body was not.

Now we have the means to build a new body that may allow her power to flow unimpeded once again. If she can be convinced to accept Uria’s offer, then she shall have a new opportunity to destroy the descendants of her rival and allow us to reign over this decadent world."
[/world_entry]

