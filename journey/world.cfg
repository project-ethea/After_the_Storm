#textdomain wesnoth-After_the_Storm

#define JOURNEYLOG_FRAGMENT _ID _TEXT
	[fragment]
		id={_ID}
		text={_TEXT}
	[/fragment]
#enddef

[world_entry]
	id="quenoth_glyph_verlissh"
	title= _ "On the Verlissh"
	source=07_The_Search_for_the_Past

	{JOURNEYLOG_FRAGMENT verlissh1 ( _ "The <b>Verlissh</b> are a primitive Rythenian lifeform brought to Irdya by the <b>Argazar</b>. Under certain conditions, these creatures can combine to form larger and more complex units, and even integrate themselves into foreign organisms, adapting to their bodies and augmenting them. The symbiotic relationship they develop with their host comes at a price for both, however — the host and the Verlissh become reliant on each other’s functions to survive.")}

	{JOURNEYLOG_FRAGMENT verlissh2 ( _ "<b>Uria</b> has learned that the Argazar civilization used the Verlissh to enhance the abilities and strength of their <b>‘biomechanical’</b> warriors. There are ruins scattered across Irdya from which we could obtain samples to, in time, raise a whole army to put an end to the current Dark Age.")}
[/world_entry]

