[...] Beta Power Plant [...] E4 [...]

[...] 97 [...] Detritus Processing [...]

[...] Delta Power Substation [...] 2F [...]"
[/world_entry]

[world_entry]
	id="abaddon_memo_9153"
	title= _ "Memo #9153: codename ‘Ivyel’"
	source=12_Wesmere_Terminus
	requires_milestone=abaddon_console1
	text= _ "Per the Fire of Uria’s command, work on the Ivyel program at the Wesmere Abaddon 3 Facility shall be transferred to Kalari Central, Level E5, effective immediately. All assets are to be relocated within 70 days. Coastal transfer route West-1 has been assigned for this task.

Signed off by: Mal Kendria, Iron Council"
[/world_entry]

[world_entry]
	id="abaddon_memo_9149"
	title= _ "Memo #9149: codename ‘Thornfire’"
	source=12_Wesmere_Terminus
	requires_milestone=abaddon_console1
	# po: The notes for this entry are written by Mal Si'ah, who uses they/them or gender-neutral pronouns to refer to themselves.
	# po: This is only relevant in languages with more than one first-person pronoun.
	text= _ "Per the Fire of Uria’s command, work on the Thornfire program shall be discontinued permanently, and all related assets — including the experimental housing unit — must be destroyed within 10 days.

Signed off by: Mal Kendria, Iron Council

⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯
Note #1 (Mal Si’ah)

Truly, it is a pity that Argan’s untimely demise set us back so much, in so many unexpected ways. For two whole centuries Mal Abaddon and I had been looking forward to the completion of this project. To add insult to injury, the cancelation has turned his preaching even more insufferable than it already was.

Alas, the Fire’s word is law now — if she sees no use in Thornfire then she must have her reasons. Besides, like Argan would constantly say to us back in the day, “we must put our personal ambitions aside for the sake of the ultimate reward”.

At the end of the day, I am but a humble servant bound by oath to work in benefit of her Empire.

⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯
Note #2 (Mal Si’ah)

Even when it comes to disposing of aborted experiments, these absolute buffoons have no work ethic at all — leaving me to do over half of the job entirely by myself! Would that they had learned a thing or two from their precious Emperor! Sigh.

I miss that poor maniac. May he rest in peace."
[/world_entry]

[world_entry]
	id="abaddon_note_443"
	title= _ "Personal Note #443: Usurping the Divine"
	source=12_Wesmere_Terminus
	requires_milestone=abaddon_console2
	# po: This entry is written by Mal Si'ah, who uses they/them or gender-neutral pronouns to refer to themselves.
	# po: This is only relevant in languages with more than one first-person pronoun.
	# po: Redacted text:
	# po: "Argan managed to achieve such unparalleled success with Subject 00-44A. Some say it was a blessing from Uria — others say it was his power as the Master of Darkness."
	text= _ "If Yechnagoth’s original soul was able to fully utilize the power of her <b>energy heart</b> after being transplanted to a new body, why could another soul not do the same? Why, <b>contamination</b>, of course! That pesky obstacle is the main thing that stands between us and the ability to create a god. Even now, I fail to comprehend how █████ ███████ to achieve ████ unparalleled ███████ ████ ███████ 00-44A█ Some say ██ ███ █ ████████ ████ ████ — others say it was ███ █████ ██ ███ ██████ ██ ████████. Yet, my analysis never revealed any lingering influence from either of them.

As much as I hate to admit it, last night that arrogant cretin Mal Hekuba suggested a most splendid idea. Contamination is, in essence, the rejection of godhood by lifeforms whose souls were never destined for it. But, what if instead of installing the core unit into a creature that naturally has a soul, we used a non-sentient host alongside an <i>inert</i> donor soul? The energy heart might only need to perceive the <i>presence</i> of a soul, not its <i>agency</i>.

In the past, scholars often argued that things without a soul cannot be considered <i>living</i> creatures, for they have no inherent force to push them towards a certain destiny. Indeed, fully artificial lifeforms like pure Shaxthals do not and <i>cannot</i> fathom their own pitiful existence devoid of purpose other than feeding, breeding, and obeying the <b>will of the hive</b>. Only a decadent civilization like the Argazars could have intentionally come up with such an obscene mockery of life.

In our universe there is no rule forbidding things lacking a soul from being <i>granted</i> one by an external influence. Necromancers throughout the millennia have used this to their advantage, denying themselves passage to Arvadelidrya in exchange for greater power. Whether it be their own rotting bodies, or flashy trinkets pilfered from opulent tyrants, they have proven beyond a doubt that you can graft a soul on pretty much anything that has physical form.

Despite her initial disgust upon finding out who contributed to my proposal, the <b>Fire</b> expressed interest in finding out how we could use this as a basis for the development of a new class of weaponry. I am disappointed to see Argan’s protégée indulge in this primitive way of thinking, but if it is what it takes to give the Thornfire program a new lease on life, then so be it.

I am sorry, Argan, but neither you nor I were ever the kind to turn our backs on inspiration whenever it struck. Plus, would it not be the greatest irony of all if an innately <b>soulless</b> creature were to attain apotheosis?"
[/world_entry]

#
# Episode II
#

[world_entry]
	id="E2S11_memo_104"
	title= _ "Memo #104: codename ‘Ivyel’"
	source=11_A_Final_Confrontation
	requires_milestone=E2S11_memo_104
	# po: This entry is written by Mal Si'ah... you know the drill.
	text= _ "Per the Fire of Uria’s command, work on the Ivyel program is to continue at Telchior’s Hold Underground Facility.

Biomechanical Infiltrator Unit 01 and a Mark 4 ThC assembly have already been delivered at the time of this writing.

The following assets will be delivered within the next 2 days:

 • 1x MTAL-03 core
 • 1x EME serial I0508 “Ivyel”
 • 1x Type-C equipment frame
 • 1x Biological sample 90372-A “Elynia-Thanadria”

Project management has been delegated to Iron Council member Mal Hekuba, who shall oversee all tasks going forward.

An engineering team led by Mal Si’ah and Mal Vrel’leru of the Order of Dreadcrafters is scheduled to arrive within 14 days for on-site work.

Signed off by: Mal Kendria, Iron Council"
[/world_entry]

[world_entry]
	id="E2S11_note_2"
	title= _ "Personal Note #601: Loyalties"
	source=11_A_Final_Confrontation
	requires_milestone=E2S11_note_2
	# po: This entry is written by Mal Si'ah... you know the drill.
	# po: When he says "the girl's construction", he is referring to the manner
	# po: in which Elyssa's body was constructed.
	text= _ "A scientist such as I hardly has the time to entertain the delusions of zealots who desperately seek after theophanic experiences to give their pitiful lives some semblance of purpose. And yet, here I am, aiding that decrepit pile of bones once again.

Truth be told, for a very long time I have had a bad feeling about him and the grudge he holds against the Fire. He has gone as far as to try prying information off me about the girl’s construction, no doubt in the hope of finding weaknesses for him to exploit.

While I normally pride myself in my neutrality in matters of interpersonal conflict amongst the upper echelons, I cannot help but regard the Fire with a certain fondness and loyalty; after all, I am the only Dreadcrafter that has ever been entrusted with her body’s upkeep, and she remains Argan’s sole living legacy. I am sure my uncooperativeness has earned me Mal Hekuba’s scorn, but both he and I know too well that my continued existence is crucial for his lofty pursuits to have the slightest chance of yielding fruit.

Should he somehow succeed in attaining godhood, I surmise I am going to become one of his first targets. Mayhap his inevitable attempt to plunder all the information I have accrued throughout the ages will cause his feeble mind to implode.

Oh, Argan, would that you were here to keep the children in check. I fear your absence is about to be felt even harder by all."
[/world_entry]

[world_entry]
	id="E2S11_note_3"
	title= _ "Personal Note #607: Identity"
	source=11_A_Final_Confrontation
	requires_milestone=E2S11_note_3
	# po: This entry is written by Mal Si'ah... you know the drill.
	text= _ "This creature, this... ‘Ivyel’. Even in the early days, it has exhibited an unusual degree of sentience despite Mal Kendria’s extensive work on conditioning the donor soul. Is it because of that spectacularly rushed initial deployment? Unlike the Abaddon specimen, contamination remains within the nominal range, so it is impossible to tell if the soul is manifesting or not.

It has taken quite well to being outfitted with the completed type-C equipment, almost as if it actively <i>wants</i> to become Elynia-Thanadria. One possibility is that it has enough self-awareness that it perceives mimicry as an escape from its dead-ended existence. Another possibility is that the donor soul is manifesting, and they knew the erstwhile Lady of Light and regarded her as some form of salvation; Mal Zilchis is not into the habit of recording the origin of the donors, so I fear I may never be able to verify this unless the creature speaks up and confirms my theory itself— herself?

Side note: This is such a novel situation, I find it hard to decide how I should address ‘Ivyel’. She has a certain preference for being referred to as ‘she’, and ‘Elynia’, but that name is far too problematic around these parts and is best used only while in the elves’ presence; after all, the last thing we need is for everyone to panic thinking the real deal has decided to appear out of nowhere."
[/world_entry]

#
# Episode III
#

[world_entry]
	id="E3S7A.1_prophecy1"
	title= _ "The Day of the Longest Night"
	source=07A_Dark_Fire_part_1
	requires_milestone=E3S7A.1_prophecy1
	text= _ "On the day of the Longest Night, the New Guardian of Darkness shall rise from beyond to claim her rightful place amongst the Guardians of the Second Cycle.

On that day, the New Guardian of Life shall rise again, more powerful than before.

That is the day we have lived for.

The day that shall bring upon our doomed existence the promise of a new beginning."
[/world_entry]

[world_entry]
	id="E3S7A.1_urvatha"
	title= _ "Urvatha"
	source=07A_Dark_Fire_part_1
	requires_milestone=E3S7A.1_urvatha
	text= _ "Originally a peaceful world not predestined to harbor civilization, Urvatha was chosen by Iluvia as one of the destinations for the survivors of the First Cycle.

Over time, the lack of a guardian who could guide them resulted in devastating and long-lasting wars over increasingly scarce resources — thus earning it a new name for outsiders and natives alike: <b>‘Inferno’</b>.

While Urvatha continues to be largely heterogeneous, its most inhospitable regions are much better known in Irdyan lore than the rest.

Despite originally lacking a guardian and a seed, Urvatha has become the domain of the New Guardian of Life."
[/world_entry]

[world_entry]
	id="E3S7A.1_silida"
	title= _ "Silida"
	source=07A_Dark_Fire_part_1
	requires_milestone=E3S7A.1_silida
	text= _ "Originally a barren world not predestined to sustain life, Silida was chosen by Iluvia as one of the destinations for the survivors of the First Cycle.

It is said that before being erased from existence, the Guardians of Life and Existence adapted this lifeless world as a new home for their peoples. However, their task was left unfinished, and the new inhabitants of the world died out after a few generations. Only many eons later would Silida be populated again by faerie creatures.

Despite originally lacking a guardian and a seed, Silida has become the domain of the New Guardian of Earth."
[/world_entry]

[world_entry]
	id="E3S7A.1_note1"
	title= _ "On Corruption"
	source=07A_Dark_Fire_part_1

	{JOURNEYLOG_FRAGMENT corruption1 ( _ "The First Gods created us and the reality we live in with the intent that our own Original Ten would protect and rule over their creation, and eventually replace their forefathers entirely. Little did they know of the many trials they would face during the First Cycle, and the betrayal that would result in the abrupt end of their own existence.")}

	{JOURNEYLOG_FRAGMENT corruption2 ( _ "Little did they know that the same corruptive force that ravaged their universe would manipulate the order of events to ensure an entryway through the Tree of Life itself.")}

	{JOURNEYLOG_FRAGMENT corruption3 ( _ "It would ensure that the souls of our ten demon gods would be connected directly to the Tree through their very hearts. And then it would corrupt the Tree, and its Protector.")}
[/world_entry]

[world_entry]
	id="E3S7A.1_note2"
	title= _ "On Existence"
	source=07A_Dark_Fire_part_1

	{JOURNEYLOG_FRAGMENT existence1 ( _ "The First Gods no longer exist, and now the Tree is completely unguarded. Our universe and our guardians will fail to accomplish their intended mission. Not even Delethia could see this until the First Cycle was over. The songs of our own Ten will never be uttered within the boundaries of our existence, and the wound on the Tree will never be healed.")}

	{JOURNEYLOG_FRAGMENT existence2 ( _ "Even at the last moment, Delethia could not fully control the final outcome; however, her greatly increased foresight and power after defeating Yarae did allow her to alter it to a limited extent.")}

	{JOURNEYLOG_FRAGMENT existence3 ( _ "Our lives were carefully arranged before she sacrificed her own to create the Gatekeepers. She entrusted Uria and Xia’el with the devices necessary to put her secret plan into motion. The Second Cycle began.")}

	{JOURNEYLOG_FRAGMENT existence4 ( _ "At the end, only Four will prevail.")}
[/world_entry]

