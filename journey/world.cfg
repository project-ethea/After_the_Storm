[world_entry]
	id="the_ten_guardians"
	title= _ "The Ten Guardians"
	source=08A_Interim
	#requires_milestone=interim_console1

	# FIXME: Allow fragments to have titles so we can use [store_world_lore] in E3S8A.

	{_GUARDIAN_JOURNEYLOG_ENTRY life 0 0
	( _ "Life")
	( _ "The force that governs the birth of all creatures in our reality. Incarnated by the Guardian of Life, also known as <b>Uria</b>, Guardian of the Legacy and the Void, Mistress of the Void, Goddess of Life.")}

	{_GUARDIAN_JOURNEYLOG_ENTRY water 1 0
	( _ "Water")
	( _ "The element common to the origins of all life in our reality, as well as its sustainment and destruction. Incarnated by the Guardian of Water, also known as <b>Valdir</b>, Guardian of Water and Destruction, the Beast, God of War.")}

	{_GUARDIAN_JOURNEYLOG_ENTRY thunder 2 0
	( _ "Thunder")
	( _ "The spark that keeps life in motion, the arbiter in a chaotic reality doomed to an ephemeral eternity of strife. Incarnated by the Guardian of Thunder, also known as <b>Kaarul</b>, Guardian of Thunder, Harbinger of Judgment, and God of Storms.")}

	{_GUARDIAN_JOURNEYLOG_ENTRY earth 3 0
	( _ "Earth")
	( _ "The shelter that harbors the promise of life, the energy that kindles the mystic in a dying reality. Incarnated by the Guardian of Earth, also known as <b>Xia’el</b>, Guardian of the Arcane Flame and Earth, Goddess of the Forests, Protector of Peace.")}

	{_GUARDIAN_JOURNEYLOG_ENTRY fire 4 0
	( _ "Fire")
	( _ "The aspect that fuels life through love, the flame that sustains the forge of knowledge in a reality where ignorance has ensnared its hopeless dwellers. Incarnated by the Guardian of Fire, also known as <b>Shardia</b>, Guardian of Fire and Knowledge, the Fire of Hope, Goddess of Love.")}

	{_GUARDIAN_JOURNEYLOG_ENTRY darkness 0 1
	( _ "Darkness")
	( _ "The aspect of the free will necessary for life to progress, the precursor and successor of light in a reality devoid of ultimate intent. Incarnated by the Guardian of Darkness, also known as <b>Merthiaal</b>, Guardian of Darkness and Shadows, Eater of Souls, Goddess of Free Will.")}

	{_GUARDIAN_JOURNEYLOG_ENTRY light 1 1
	( _ "Light")
	( _ "The aspect of the constancy from which life springs, the successor and precursor of darkness in a reality unprepared for its end. Incarnated by the Guardian of Light, also known as <b>Luceith’el</b>, Guardian of Light and Metal, Star of the Morning, Healer of Souls.")}

	# wmllint: local spelling insufflates
    {_GUARDIAN_JOURNEYLOG_ENTRY air 2 1
	( _ "Air")
	( _ "The aspect of the kiss that insufflates life, the breath that preserves life in a decaying reality. Incarnated by the Guardian of Air, also known as <b>Kazith</b>, Guardian of Air and Breath, Lady of the Skies, Messenger of the Ether.")}

	{_GUARDIAN_JOURNEYLOG_ENTRY ice 3 1
	( _ "Ice")
	( _ "The aspect that is the cold touch that ends life, the substance that holds treasures for those daring to explore the confines of a shrinking reality. Incarnated by the Guardian of Ice, also known as <b>Yukiria</b>, Guardian of Ice and Mirrors, Queen of the White Expanse, Keeper of Death.")}

	{_GUARDIAN_JOURNEYLOG_ENTRY existence 4 1
	( _ "Existence")
	( _ "The aspect that binds all life together, the empty canvas from which a corrupted reality was created. Incarnated by the Guardian of Existence, also known as <b>Delethia</b>, Guardian of Secrets and Time, the Faceless Woman, Seer of the Tree.")}
[/world_entry]

#undef _GUARDIAN_JOURNEYLOG_ENTRY

[world_entry]
	id="aspect_info_life"
	title= _ "Aspects: Life"
	source=08A_Interim
	requires_milestone=aspect_info_life
	text= _ "The aspect of <b>Life</b> deals primarily with the creation and sustainment of life, as well as the very essence of being in all of its manifestations.

All non-faerie human and human-like creatures were created in the image of the first <b>Guardian of Life</b>, who governed over <b>Ethea</b> during the First Cycle. This incarnation of <b>Uria</b> would prove essential for defeating the corrupted <b>Yarae</b> by using her great might to vanqiush his allies one by one, at the cost of countless innocent lives.

Her next incarnation came into existence on a world other than Ethea due to unknown reasons."
[/world_entry]

[world_entry]
	id="aspect_info_earth"
	title= _ "Aspects: Earth"
	source=08A_Interim
	requires_milestone=aspect_info_earth
	text= _ "The aspect of <b>Earth</b> is one of four aspects which directly support Life, paving the way for creation.

All faeriekind creatures were created in the image of the first <b>Guardian of Earth</b>, who was tasked with ruling over <b>Irdya</b> during the First Cycle.

Some myths claim that faeriekind beings were fully incorporeal until after the ascension of the first incarnation of <b>Xia’el</b>, a woman said to have been created out of golden dust by <b>Yarae</b> himself. The god fell in love with his own creation, and desperately wanted her affection; the goddess, however, did not reciprocate, spending the days instead lamenting her subjects’ inability to fully bask in the wonders of the physical realm. As a favor, Yarae granted them physical bodies made from the same fine dust.

Her next incarnation came into existence on a world other than Irdya due to unknown reasons."
[/world_entry]

[world_entry]
	id="aspect_info_darkness"
	title= _ "Aspects: Darkness"
	source=08A_Interim
	requires_milestone=aspect_info_darkness
	# wmllint: local spelling Yrathidians
	text= _ "Unlike the majority of the aspects constituting reality, Darkness and Light are derived from the nature of the First Gods themselves, stemming from Existence, and connected to Life in a structural role.

Just like Darkness precedes and succeeds Light from a physical standpoint, it also deals with matters of the mind, whereas Light deals with the soul of every being born under the Tree of Life. However, just as both aspects complement each other, they may also exchange places according to the circumstances.

Merthiaal, the Guardian of Darkness on Yrathid, was the last guardian to be born during the First Cycle, and at the same time, she was the first guardian to perish. Although Yarae’s conflict had not yet begun, he did have an indirect role in causing Merthiaal’s downfall. The young guardian’s emotions clouded her reason; jealousy consumed her heart from inside as she watched her creator’s predilection for her sisters Uria and Xia’el.

In a desperate attempt to prove her worth to Yarae and even surpass his own power, the girl subverted her world’s seed and tried to absorb its energy for herself. Alas, even though their blood was always one and the same, the guardian and the Seed of Darkness were never meant to become one.

Not having learned her own song beforehand, Merthiaal could not assume full control of her new powers. Instead of becoming the true goddess she desired to be, the very aspect she controlled was destroyed — her mind succumbed to insanity as her horrifying new body absorbed the souls of each and every one of her fellow Yrathidians.

Uria put an end to Merthiaal’s rampage by ripping her heart out, destroying her body, and sealing her self in the hope that Yarae could do something to remedy the situation. However, Yarae was offended by the proposition; he refused to help with the resurrection and healing, choosing instead to preserve the lifeless world intact as a testament to his child’s hubris.

That incarnation of Uria would never be able to bring Merthiaal back to life, and the Guardian of Darkness would come to be known as the Eater of Souls, the antithesis of the Guardian of Light. Now lacking a distinct seed, Yrathid would not be restored at the end of the First Cycle, remaining instead a graveyard world per Yarae’s wishes."
[/world_entry]

[world_entry]
	id="E3S8B_prophecy1"
	title= _ "Lost Prophecy"
	source=08B_Destiny_part_1
	requires_milestone=E3S8B_prophecy1
	# po: Line 1: the ‘Four’ are individuals of indeterminate genders.
	# po: Line 2: except for the ‘Four’, these names refer to inanimate objects.
	# po: Line 3: these names also refer to inanimate objects.
	text= _ "The Infertile Mother shall give birth to Four.

These Four shall seek shelter in the Second. The First shall be consumed, the Tree shall be infected.

The missing Fifth shall provide knowledge. The Eleventh and the Twelfth shall provide hope."
[/world_entry]

[world_entry]
	id="aspect_info_darkness_and_light"
	title= _ "Aspects: Darkness and Light"
	source=08C_Breakdown
	requires_milestone=aspect_info_darkness_and_light
	text= _ "The Aspects of Darkness and Light are both interwoven in the very fabric of our reality. Although the powers they confer are often underestimated on their own, the combination of either aspect with any other can have formidable effects. It is generally agreed that the combination of Darkness and Light in particular serves as a connection to the power of the Union — a power most intimately related to Creation itself."
[/world_entry]

[world_entry]
	id="aspect_info_pairs"
	title= _ "Aspects: Pairs"
	source=08C_Breakdown
	requires_milestone=aspect_info_pairs
	text= _ "Life draws from Light and Darknesss, Existence draws from Darkness and Light. Fire and Water oppose each other just as Creation and Destruction do. Thunder and Ice are opposites in the same sense as Earth and Air complement each other.

All the aspects that govern our universe are closely related and equally important to the continuance of reality. Their roles are as flexible as necessary to accomplish the ultimate goal of preserving the First Gods’ legacy, no matter the cost."
[/world_entry]

[world_entry]
	id="aspect_info_knowledge"
	title= _ "Aspects: Knowledge"
	source=08C_Breakdown
	requires_milestone=aspect_info_knowledge
	# po: “To brook” below is used in an obsolete sense; namely
	# po: “to use/enjoy/have the full employment of” (from wiktionary).
	# po: It also serves as a pun.
	text= _ "Fire forges knowledge.

Light wards knowledge.

Darkness craves knowledge.

Water brooks knowledge."
[/world_entry]

[world_entry]
	id="tech_energy_heart"
	title= _ "On the Energy Heart"
	source=08C_Breakdown
	requires_milestone=tech_energy_heart
	text= _ "Guardian-class beings are distinguished by the existence of a special organ in their bodies called the Energy Heart. The organ acts as a virtuallly unlimited source of energy and sustenance for the creature, able to keep it alive under circumstances that would otherwise result in permanent damage or even death. In fact, the host body can suffer any kind of injuries and they will be gradually healed by the Energy Heart, the healing rate depending on the severity of the damage as well as the host’s contamination level.

The organ goes through its own growth and maturation process independent from the host body. Norsulan studies conducted on the Seed of Fire during the Second Cycle have shown that it is possible to artificially grow the organ in the bodies of non-Guardians, albeit with disastrous effects. An alternative approach was used to build the first prototype of an artificial Guardian, keeping the Energy Heart in a separate insulated container with a direct pathway to the host’s nervous system, and an electronic control unit.

The research subjects were all deceased Norsulans, and none of them managed to establish a stable connection with their Energy Hearts. It is suspected that there is a less evident connection between the body, Energy Heart, and spirit of a real Guardian that allows them to fully control their three constituent parts — a connection to the seed that gave them birth, and the Greater Design laid out first by Yarae, and then by Delethia."
[/world_entry]

[world_entry]
	id="tech_union"
	title= _ "On the Union"
	source=08C_Breakdown
	requires_milestone=tech_union
	text= _ "The Orbs of Light and Darkness do not just allow those blessed by Iluvia to summon the Union itself. Given every aspect’s individual affiliation with either path, it may be possible to use the Orbs as instruments to tap into the powers of the other aspects.

As the first Avatar of the Union herself, Iluvia made use of this mechanism to aid Uria and Xia’el in destroying every other corrupted guardian before banishing Yarae from our universe."
[/world_entry]

[world_entry]
	id="e3s12_argan_1"
	title= _ "On Creation"
	source=12_Destiny_part_3
	requires_milestone=e3s12_argan_1
	text= _ "<i>(This entry has Argan’s name attached to it.)</i>

Her mission as the Guardian of Life of our cycle was subverted through a series of unfortunate circumstances, but it is quite inaccurate to claim that she only ever destroys life.

Certainly, countless lives on both Urvatha and Irdya have been felled by her hands or those of her subordinates, but she has also <i>created</i> life in her pursuit of power by adapting the creations of Norsula and the Argazar civilization.

The scriptures say that the Guardian of Life should not be able to create life, only guard it; her achievements in this regard only prove beyond a doubt that she is worthy of becoming the god who shall guide us to paradise."
[/world_entry]

[world_entry]
	id="e3s12_argan_2"
	title= _ "On the Seer"
	source=12_Destiny_part_3
	requires_milestone=e3s12_argan_2
	text= _ "<i>(This entry has Argan’s name attached to it.)</i>

The fact that the Norsulans have access to in-depth knowledge of the guardians’ biology has been quite useful to Uria thus far, but she knows this will become a double-edged sword very soon.

Even more worrying yet is the Seer’s prophecy: “the new Guardian of Water will rise once more and attempt to rob the Guardian of Life of her rightful prize”. Although Uria has agents on Norsula trying to locate this man—or beast—before his awakening can take place, it is a foolish endeavor to attempt preventing events foretold by the Seer. Elyssa and I know this too well."
[/world_entry]

[world_entry]
	id="e3s12_argan_3"
	title= _ "On a Distant Past"
	source=12_Destiny_part_3
	requires_milestone=e3s12_argan_3
	text= _ "<i>(This entry has Argan’s name attached to it.)</i>

Around the time I first arrived on Irdya, Norsulans were still a largely ignorant bunch, their knowledge of magic majorly lacking compared to the Irdyans, and their mastery of the worldly sciences barely meeting expectations when measured against the Etheans.

And yet, now that I finally make contact with “my” people again, I find out everything has drastically changed. Their magic still pales in comparison to the world-transforming feats performed by the likes of Wesnoth or their predecessors, yet they have built a technological paradise amidst a universe plagued by stagnation; their advancements now eclipse those of Ethea. Some claim that an external influence contributed to their massively accelerated evolution.

My memories have become too hazy after millennia of stumbling around, but I recall feeling some kind of attachment to that world before meeting Elynia, despite their intolerance for my endeavors; I could swear there even was a person who was very precious to me. I wish I could remember."
[/world_entry]

[world_entry]
	id="e3s12_elyssa_1"
	title= _ "Untitled #43"
	source=12_Destiny_part_3
	requires_milestone=e3s12_elyssa_1
	text= _ "<i>(This entry has Elyssa’s name attached to it but lacks an actual title. It seems much more recent than the other entries.)</i>

Just as Norsula’s technological advancements were without a doubt the consequence of external meddling, much of Ethea’s own over the past few centuries were meticulously orchestrated by Norsulan agents. To her credit, the previous Norsulan empress clearly only wanted to share her people’s boon with the Etheans, perhaps in the hope of securing a new stable trading partner, nothing else.

However, I’m not so sure about the new regime’s intentions. Their decision to reveal Norsula’s existence right at the end of Ethea’s most devastating war yet seems far too convenient, too much of a coincidence.

Valdir’s successor... Uria is right to have misgivings about him; his decision to secure the Seed of Life is confirmation enough that he has an agenda of his own. Sadly, we have never been able to infiltrate his close circles. It truly makes me wonder... have he and his precessors been intentionally drip-feeding us information so we would get to this point?

The Seer’s ramblings on the matter get hazier and more confusing the closer we get to that pivotal moment, starting from the Day of the Longest Night on Irdya. The only thing we know for sure is that she will eventually be slain—not sure by who—at which point there is no more information she can provide since her vision is bound by her mortal existence."
[/world_entry]
